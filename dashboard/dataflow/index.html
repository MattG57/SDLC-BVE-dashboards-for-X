<!DOCTYPE html>
<html lang="en" data-color-mode="dark" data-dark-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BVE Dataflow & Coverage</title>
<link rel="stylesheet" href="https://unpkg.com/@primer/css@21.3.1/dist/primer.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { background: var(--bgColor-default); }
  .dataflow-page { max-width: 1400px; margin: 0 auto; padding: 24px 16px; }

  /* Flow diagram */
  .flow-container { position: relative; }
  .flow-column { display: flex; flex-direction: column; gap: 12px; min-width: 200px; }
  .flow-columns { display: flex; gap: 48px; align-items: flex-start; justify-content: center; }
  .flow-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--fgColor-muted); font-weight: 600; margin-bottom: 8px; text-align: center; }

  /* Boxes */
  .flow-box { border: 2px solid var(--borderColor-default); border-radius: 8px; padding: 12px 14px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; position: relative; }
  .flow-box:hover { border-color: var(--fgColor-accent); box-shadow: 0 0 0 1px var(--fgColor-accent); }
  .flow-box.selected { border-color: var(--fgColor-accent); background: var(--bgColor-accent-muted); }
  .flow-box .box-title { font-size: 13px; font-weight: 600; color: var(--fgColor-default); line-height: 1.3; }
  .flow-box .box-sub { font-size: 11px; color: var(--fgColor-muted); margin-top: 2px; }
  .flow-box .box-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 10px; margin-top: 4px; }

  .flow-box.raw { border-left: 3px solid #3fb950; }
  .flow-box.materialized { border-left: 3px solid #58a6ff; }
  .flow-box.dashboard { border-left: 3px solid #d29922; border-style: dashed; }
  .flow-box.dashboard .box-badge { background: #d29922; color: #000; }

  /* Drill-down panel */
  .drill-panel { border: 1px solid var(--borderColor-default); border-radius: 8px; padding: 20px; margin-top: 16px; }
  .drill-panel h3 { margin: 0 0 12px 0; }
  .drill-section { margin-bottom: 16px; }
  .drill-section h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--fgColor-muted); margin: 0 0 6px 0; font-weight: 600; }
  .drill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
  .drill-stat { background: var(--bgColor-muted); border-radius: 6px; padding: 8px 12px; }
  .drill-stat .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--fgColor-muted); }
  .drill-stat .stat-value { font-size: 16px; font-weight: 600; color: var(--fgColor-default); }
  .drill-stat .stat-sub { font-size: 11px; color: var(--fgColor-muted); }

  /* Arrow connectors (CSS-only) */
  .connector-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--borderColor-default); position: absolute; }
  .connector-dot.right { right: -5px; top: 50%; transform: translateY(-50%); }
  .connector-dot.left { left: -5px; top: 50%; transform: translateY(-50%); }

  .flow-arrow { display: flex; align-items: center; color: var(--fgColor-muted); font-size: 11px; padding: 0 8px; }
  .flow-arrow-line { flex: 1; height: 1px; background: var(--borderColor-default); margin: 0 4px; }

  /* Collection history */
  .history-item { display: flex; align-items: center; gap: 12px; padding: 6px 12px; border-radius: 6px; font-size: 13px; }
  .history-item:hover { background: var(--bgColor-muted); }
  .history-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* Consumers list */
  .consumer-list { list-style: none; padding: 0; margin: 0; }
  .consumer-list li { font-size: 12px; padding: 2px 0; color: var(--fgColor-muted); }
  .consumer-list li::before { content: '→ '; color: var(--fgColor-accent); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

/* ═══════════════════════════════════════════════════════════════════
   UTILITIES
   ═══════════════════════════════════════════════════════════════════ */

function timeAgo(ts) {
  if (!ts) return '—';
  const diff = Date.now() - new Date(ts).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function fmtBytes(bytes) {
  if (!bytes) return '—';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function fmtCompact(v) {
  if (v == null) return '—';
  if (Math.abs(v) >= 1e6) return (v / 1e6).toFixed(1) + 'M';
  if (Math.abs(v) >= 1e3) return (v / 1e3).toFixed(1) + 'k';
  return v.toFixed(0);
}

/* Dashboard consumption map — which dashboards use which artifacts */
const CONSUMERS = {
  'ai-assisted-efficiency-days.json': [
    { name: 'AI-Assisted Efficiency', sections: ['Impact', 'Drivers', 'Confidence'], path: '../ai-assisted-coding/efficiency/' },
    { name: 'AI-Assisted Element', sections: ['Leverage Summary', 'Insights'], path: '../ai-assisted-coding/element/' },
    { name: 'Integrated', sections: ['AI sub-rectangle'], path: '../integrated/' },
  ],
  'ai-assisted-structural-days.json': [
    { name: 'AI-Assisted Structural', sections: ['Completeness', 'Consistency', 'Impact', 'Prioritized'], path: '../ai-assisted-coding/structural/' },
    { name: 'AI-Assisted Element', sections: ['Factor donuts', 'Insights trends'], path: '../ai-assisted-coding/element/' },
    { name: 'Integrated', sections: ['AI structural factors'], path: '../integrated/' },
  ],
  'agentic-efficiency-days.json': [
    { name: 'Agentic Efficiency', sections: ['Impact', 'Drivers', 'Confidence'], path: '../agentic-coding/efficiency/' },
    { name: 'Agentic Element', sections: ['Factor donuts', 'Insights trends'], path: '../agentic-coding/element/' },
    { name: 'Integrated', sections: ['Agentic adoption'], path: '../integrated/' },
  ],
  'agentic-pr-sessions.json': [
    { name: 'Agentic Efficiency', sections: ['Confidence (PR detail)'], path: '../agentic-coding/efficiency/' },
    { name: 'Agentic Element', sections: ['Leverage rectangle', 'Completions'], path: '../agentic-coding/element/' },
    { name: 'Integrated', sections: ['Agentic dev-hours, completions'], path: '../integrated/' },
  ],
};


/* ═══════════════════════════════════════════════════════════════════
   COMPONENTS
   ═══════════════════════════════════════════════════════════════════ */

function RawFileBox({ file, selected, onClick }) {
  return (
    <div className={`flow-box raw${selected ? ' selected' : ''}`} onClick={onClick}>
      <div className="box-title">{file.name}</div>
      <div className="box-sub">
        {file.metadata?.date_range
          ? `${file.metadata.date_range.since || '?'} → ${file.metadata.date_range.until || file.metadata.date_range.days + 'd'}`
          : 'raw query output'}
      </div>
      {file.metadata?.counts && (
        <div className="box-sub">
          {Object.entries(file.metadata.counts).slice(0, 3).map(([k, v]) => `${v} ${k.replace(/_/g, ' ')}`).join(' · ')}
        </div>
      )}
    </div>
  );
}

function ArtifactBox({ artifact, selected, onClick }) {
  const p = artifact.profile;
  return (
    <div className={`flow-box materialized${selected ? ' selected' : ''}`} onClick={onClick}>
      <div className="box-title">{artifact.name.replace(/-/g, ' ')}</div>
      <div className="box-sub">{p.record_count} records</div>
      {p.date_range && (
        <div className="box-sub">{p.date_range.first} → {p.date_range.last}</div>
      )}
      <div className="box-badge" style={{ background: '#58a6ff', color: '#000' }}>materialized</div>
    </div>
  );
}

function DashboardBox({ consumer, artifact }) {
  return (
    <div className="flow-box dashboard">
      <div className="box-title">{consumer.name}</div>
      <div className="box-sub">{consumer.sections.join(', ')}</div>
      <div className="box-badge">live calcs</div>
    </div>
  );
}

function RawFileDrillDown({ file }) {
  const m = file.metadata;
  return (
    <div className="drill-panel">
      <h3 className="f4 color-fg-accent">📄 {file.name}</h3>
      {m ? (
        <>
          <div className="drill-section">
            <h4>Collection</h4>
            <div className="drill-grid">
              {m.collected_at && <div className="drill-stat"><div className="stat-label">Collected</div><div className="stat-value">{new Date(m.collected_at).toLocaleString()}</div><div className="stat-sub">{timeAgo(m.collected_at)}</div></div>}
              {m.elapsed_seconds != null && <div className="drill-stat"><div className="stat-label">Elapsed</div><div className="stat-value">{m.elapsed_seconds}s</div></div>}
              {m.source && <div className="drill-stat"><div className="stat-label">Source</div><div className="stat-value">{m.source}</div></div>}
            </div>
          </div>
          {m.date_range && (
            <div className="drill-section">
              <h4>Date Range</h4>
              <div className="drill-grid">
                {m.date_range.since && <div className="drill-stat"><div className="stat-label">Since</div><div className="stat-value">{m.date_range.since}</div></div>}
                {m.date_range.until && <div className="drill-stat"><div className="stat-label">Until</div><div className="stat-value">{m.date_range.until}</div></div>}
                {m.date_range.days && <div className="drill-stat"><div className="stat-label">Days</div><div className="stat-value">{m.date_range.days}</div></div>}
              </div>
            </div>
          )}
          {m.counts && (
            <div className="drill-section">
              <h4>Record Counts</h4>
              <div className="drill-grid">
                {Object.entries(m.counts).map(([k, v]) => (
                  <div key={k} className="drill-stat"><div className="stat-label">{k.replace(/_/g, ' ')}</div><div className="stat-value">{fmtCompact(v)}</div></div>
                ))}
              </div>
            </div>
          )}
          {m.scope_name && (
            <div className="drill-section">
              <h4>Scope</h4>
              <div className="drill-grid">
                <div className="drill-stat"><div className="stat-label">Scope</div><div className="stat-value">{m.scope || '—'}</div></div>
                <div className="drill-stat"><div className="stat-label">Name</div><div className="stat-value">{m.scope_name}</div></div>
              </div>
            </div>
          )}
          {m.completeness && (
            <div className="drill-section">
              <h4>Completeness</h4>
              <div className={`flash f6 ${m.completeness === 'complete' ? 'flash-success' : 'flash-warn'}`}>
                {m.completeness === 'complete' ? '✅' : '⚠️'} {m.completeness}
              </div>
            </div>
          )}
        </>
      ) : (
        <p className="f6 color-fg-muted">No embedded metadata in this file.</p>
      )}
    </div>
  );
}

function ArtifactDrillDown({ artifact }) {
  const p = artifact.profile;
  const consumers = CONSUMERS[artifact.name.replace(/ /g, '-') + '.json'] || CONSUMERS[artifact.fileName] || [];

  return (
    <div className="drill-panel">
      <h3 className="f4 color-fg-accent">🔷 {artifact.name.replace(/-/g, ' ')}</h3>
      <div className="f6 color-fg-muted mb-3">Materialized at {new Date(artifact.computed_at).toLocaleString()} · {artifact.compute_ms}ms</div>

      <div className="drill-section">
        <h4>Records & Coverage</h4>
        <div className="drill-grid">
          <div className="drill-stat"><div className="stat-label">Records</div><div className="stat-value">{fmtCompact(p.record_count)}</div></div>
          {p.date_range?.first && <div className="drill-stat"><div className="stat-label">Date Range</div><div className="stat-value">{p.date_range.first} → {p.date_range.last}</div><div className="stat-sub">{p.date_range.days_with_data} days with data</div></div>}
        </div>
      </div>

      {/* Dedup stats */}
      {(p.enterprise_dedup || p.devday_dedup || p.session_dedup) && (
        <div className="drill-section">
          <h4>Processing</h4>
          <div className="drill-grid">
            {p.enterprise_dedup && (
              <div className="drill-stat"><div className="stat-label">Enterprise Dedup</div><div className="stat-value">{p.enterprise_dedup.before} → {p.enterprise_dedup.after}</div><div className="stat-sub">{p.enterprise_dedup.removed} removed · key: {p.enterprise_dedup.key}</div></div>
            )}
            {p.user_dedup && (
              <div className="drill-stat"><div className="stat-label">User-Day Dedup</div><div className="stat-value">{p.user_dedup.before} → {p.user_dedup.after}</div><div className="stat-sub">{p.user_dedup.removed} removed · {p.user_dedup.unique_logins} logins</div></div>
            )}
            {p.devday_dedup && (
              <div className="drill-stat"><div className="stat-label">Dev-Day Dedup</div><div className="stat-value">{p.devday_dedup.before} → {p.devday_dedup.after}</div><div className="stat-sub">{p.devday_dedup.removed} removed · {p.devday_dedup.unique_developers} devs</div></div>
            )}
            {p.aggregation && (
              <div className="drill-stat"><div className="stat-label">Aggregation</div><div className="stat-value">{p.aggregation.devday_rows} → {p.aggregation.day_rows} days</div></div>
            )}
            {p.session_dedup && (
              <div className="drill-stat"><div className="stat-label">Session Dedup</div><div className="stat-value">{p.session_dedup.before} → {p.session_dedup.after}</div><div className="stat-sub">{p.session_dedup.removed} removed · key: {p.session_dedup.key}</div></div>
            )}
          </div>
        </div>
      )}

      {/* PR processing */}
      {p.pr_processing && (
        <div className="drill-section">
          <h4>PR Processing</h4>
          <div className="drill-grid">
            <div className="drill-stat"><div className="stat-label">Dedup</div><div className="stat-value">{p.pr_processing.before_dedup} → {p.pr_processing.after_dedup}</div><div className="stat-sub">{p.pr_processing.duplicates_removed} duplicates</div></div>
            <div className="drill-stat"><div className="stat-label">Bot Filter</div><div className="stat-value">{p.pr_processing.after_dedup} → {p.pr_processing.after_filter}</div><div className="stat-sub">{p.pr_processing.bots_removed} bots removed</div></div>
          </div>
        </div>
      )}

      {/* PR classification */}
      {p.pr_classification && p.has_pr_data && (
        <div className="drill-section">
          <h4>PR-Assist Classification</h4>
          <div className="drill-grid">
            <div className="drill-stat"><div className="stat-label">Lookback</div><div className="stat-value">{p.pr_classification.lookback_days} days</div></div>
            <div className="drill-stat"><div className="stat-label">Assisted</div><div className="stat-value">{p.pr_classification.assisted_prs} of {p.pr_classification.total_merged_prs}</div><div className="stat-sub">{p.period_prs_assisted_pct != null ? (p.period_prs_assisted_pct * 100).toFixed(1) + '%' : '—'}</div></div>
            <div className="drill-stat"><div className="stat-label">PR Authors</div><div className="stat-value">{p.pr_classification.unique_pr_authors}</div></div>
            <div className="drill-stat"><div className="stat-label">Copilot Users</div><div className="stat-value">{p.pr_classification.unique_copilot_users}</div></div>
          </div>
        </div>
      )}

      {/* Status breakdown (agentic sessions) */}
      {p.status_breakdown && (
        <div className="drill-section">
          <h4>Status Breakdown</h4>
          <div className="drill-grid">
            <div className="drill-stat"><div className="stat-label">Merged</div><div className="stat-value" style={{color:'#3fb950'}}>{p.status_breakdown.merged}</div></div>
            <div className="drill-stat"><div className="stat-label">Open</div><div className="stat-value" style={{color:'#58a6ff'}}>{p.status_breakdown.open}</div></div>
            <div className="drill-stat"><div className="stat-label">Closed (no merge)</div><div className="stat-value" style={{color:'#f85149'}}>{p.status_breakdown.closed_no_merge}</div></div>
            {p.with_duration != null && <div className="drill-stat"><div className="stat-label">With Duration</div><div className="stat-value">{p.with_duration}</div><div className="stat-sub">{p.without_duration} without</div></div>}
          </div>
        </div>
      )}

      {/* Reconciliation */}
      {p.reconciliation_summary && (
        <div className="drill-section">
          <h4>Reconciliation</h4>
          <div className="drill-grid">
            {Object.entries(p.reconciliation_summary).map(([status, count]) => (
              <div key={status} className="drill-stat">
                <div className="stat-label">{status.replace(/_/g, ' ')}</div>
                <div className="stat-value" style={{ color: status === 'match' ? '#3fb950' : status === 'material_difference' ? '#f85149' : '#d29922' }}>{count}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Entity stats */}
      {(p.unique_repos || p.unique_authors || p.loc_summary) && (
        <div className="drill-section">
          <h4>Entities</h4>
          <div className="drill-grid">
            {p.unique_repos != null && <div className="drill-stat"><div className="stat-label">Unique Repos</div><div className="stat-value">{p.unique_repos}</div></div>}
            {p.unique_authors != null && <div className="drill-stat"><div className="stat-label">Unique Authors</div><div className="stat-value">{p.unique_authors}</div></div>}
            {p.loc_summary && <div className="drill-stat"><div className="stat-label">Total LoC</div><div className="stat-value">+{fmtCompact(p.loc_summary.total_additions)} / -{fmtCompact(p.loc_summary.total_deletions)}</div></div>}
          </div>
        </div>
      )}

      {/* Consumers */}
      {consumers.length > 0 && (
        <div className="drill-section">
          <h4>Consumed By</h4>
          <ul className="consumer-list">
            {consumers.map((c, i) => (
              <li key={i}><strong>{c.name}</strong> ({c.sections.join(', ')})</li>
            ))}
          </ul>
        </div>
      )}

      {/* Inputs */}
      {artifact.inputs && artifact.inputs.length > 0 && (
        <div className="drill-section">
          <h4>Inputs</h4>
          {artifact.inputs.map((inp, i) => (
            <div key={i} className="f6 color-fg-muted">📄 {inp.file} {inp.hash ? <code className="f6">#{inp.hash.slice(0, 8)}</code> : ''}</div>
          ))}
        </div>
      )}
    </div>
  );
}


/* ═══════════════════════════════════════════════════════════════════
   FLOW DIAGRAM
   ═══════════════════════════════════════════════════════════════════ */

function FlowDiagram({ manifest, artifactMeta, selected, onSelect }) {
  const rawFiles = manifest.raw_files.map(name => {
    const matchingArtifact = Object.values(artifactMeta).find(a =>
      a.inputs?.some(inp => inp.file === name)
    );
    const metadata = matchingArtifact?.inputs?.find(inp => inp.file === name)?.metadata || null;
    return { name, metadata };
  });

  const artifacts = manifest.artifacts.map(name => {
    const key = name.replace('.json', '');
    return { name: key, fileName: name, ...(artifactMeta[key]?.artifact || {}) };
  });

  // Build edge map for highlighting
  const edgeMap = {};
  for (const e of manifest.edges) {
    if (!edgeMap[e.from]) edgeMap[e.from] = [];
    edgeMap[e.from].push(e.to);
  }

  return (
    <div className="Box color-shadow-medium p-4 mb-4">
      <h3 className="f4 mb-1">Pipeline Flow</h3>
      <p className="f6 color-fg-muted mb-3">Click any box to see its profile. <span style={{color:'#3fb950'}}>■</span> Raw files → <span style={{color:'#58a6ff'}}>■</span> Materialized artifacts → <span style={{color:'#d29922'}}>□</span> Dashboard (live calcs)</p>

      <div className="flow-columns">
        {/* Column 1: Raw Files */}
        <div className="flow-column">
          <div className="flow-label">Query Output</div>
          {rawFiles.map((f, i) => (
            <RawFileBox key={i} file={f}
              selected={selected?.type === 'raw' && selected.name === f.name}
              onClick={() => onSelect({ type: 'raw', name: f.name, data: f })} />
          ))}
        </div>

        {/* Arrow column */}
        <div style={{ display: 'flex', flexDirection: 'column', justifyContent: 'center', gap: '8px', padding: '28px 0' }}>
          {manifest.edges.slice(0, 3).map((_, i) => (
            <div key={i} className="flow-arrow">
              <div className="flow-arrow-line" />
              <span>▶</span>
            </div>
          ))}
        </div>

        {/* Column 2: Materialized Artifacts */}
        <div className="flow-column">
          <div className="flow-label">Materialized Artifacts</div>
          {artifacts.map((a, i) => (
            <ArtifactBox key={i} artifact={{ ...a, profile: a.profile || {} }}
              selected={selected?.type === 'artifact' && selected.name === a.name}
              onClick={() => onSelect({ type: 'artifact', name: a.name, fileName: a.fileName, data: a })} />
          ))}
        </div>

        {/* Arrow column */}
        <div style={{ display: 'flex', flexDirection: 'column', justifyContent: 'center', gap: '8px', padding: '28px 0' }}>
          {[0, 1, 2].map(i => (
            <div key={i} className="flow-arrow">
              <div className="flow-arrow-line" style={{ borderTop: '1px dashed var(--borderColor-default)', background: 'none' }} />
              <span style={{ color: '#d29922' }}>▶</span>
            </div>
          ))}
        </div>

        {/* Column 3: Dashboards (unique consumer dashboards) */}
        <div className="flow-column">
          <div className="flow-label">Dashboards (Live Calcs)</div>
          {['AI-Assisted Efficiency', 'AI-Assisted Structural', 'AI-Assisted Element', 'Agentic Efficiency', 'Agentic Element', 'Integrated'].map(name => (
            <div key={name} className="flow-box dashboard">
              <div className="box-title">{name}</div>
              <div className="box-badge">config-reactive</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════════════════════════════
   APP
   ═══════════════════════════════════════════════════════════════════ */

function App() {
  const [manifest, setManifest] = useState(null);
  const [artifactMeta, setArtifactMeta] = useState({});
  const [selected, setSelected] = useState(null);
  const [error, setError] = useState(null);

  useEffect(() => {
    async function load() {
      try {
        // Load manifest
        const mRes = await fetch('../../_data/pipeline-manifest.json');
        if (!mRes.ok) throw new Error(`Manifest: HTTP ${mRes.status}`);
        const m = await mRes.json();
        setManifest(m);

        // Load artifact headers (just the .artifact block, not the full data)
        const meta = {};
        for (const name of m.artifacts) {
          try {
            const res = await fetch(`../../_data/${name}`);
            if (res.ok) {
              const full = await res.json();
              const key = name.replace('.json', '');
              meta[key] = { artifact: full.artifact };
            }
          } catch {}
        }
        setArtifactMeta(meta);
      } catch (e) {
        setError(e.message);
      }
    }
    load();
  }, []);

  return (
    <div className="dataflow-page">
      <div className="d-flex flex-items-center flex-justify-between mb-4">
        <div>
          <h1 className="f1 color-fg-default">Dataflow & Coverage</h1>
          <p className="f5 color-fg-muted">Pipeline flow from query output → materialized artifacts → dashboard visualizations</p>
        </div>
        <div className="f6 color-fg-muted">
          {manifest && <>Materialized: {new Date(manifest.materialized_at).toLocaleString()} · {manifest.artifacts.length} artifacts</>}
        </div>
      </div>

      {error && (
        <div className="flash flash-error mb-4">
          <p className="f5">Failed to load pipeline data</p>
          <p className="f6 color-fg-muted mt-1">{error}</p>
          <p className="f6 color-fg-muted mt-2">Run <code>node scripts/materialize.js</code> to generate artifacts, then ensure they're accessible at <code>_data/</code>.</p>
        </div>
      )}

      {!manifest && !error && (
        <div className="Box p-4 text-center color-fg-muted">
          <p className="f4">Loading pipeline manifest…</p>
        </div>
      )}

      {manifest && (
        <>
          {/* Collection summary */}
          <div className="Box color-shadow-medium p-4 mb-4">
            <h3 className="f4 mb-2">📡 Collection Summary</h3>
            <div className="d-flex flex-wrap" style={{ gap: '16px' }}>
              <div className="drill-stat"><div className="stat-label">Raw Files</div><div className="stat-value">{manifest.raw_files.length}</div></div>
              <div className="drill-stat"><div className="stat-label">Artifacts</div><div className="stat-value">{manifest.artifacts.length}</div></div>
              <div className="drill-stat"><div className="stat-label">Data Flows</div><div className="stat-value">{manifest.edges.length}</div></div>
              <div className="drill-stat"><div className="stat-label">Dashboards Served</div><div className="stat-value">6</div></div>
            </div>
          </div>

          {/* Flow diagram */}
          <FlowDiagram
            manifest={manifest}
            artifactMeta={artifactMeta}
            selected={selected}
            onSelect={setSelected}
          />

          {/* Drill-down panel */}
          {selected?.type === 'raw' && (
            <RawFileDrillDown file={selected.data} />
          )}
          {selected?.type === 'artifact' && artifactMeta[selected.name] && (
            <ArtifactDrillDown artifact={{
              ...artifactMeta[selected.name].artifact,
              fileName: selected.fileName,
            }} />
          )}

          {/* Materialization boundary explanation */}
          <div className="Box p-4 mt-4 color-fg-muted f6">
            <strong className="color-fg-default">Materialization boundary:</strong> Everything left of the dashed arrows is <strong>observed data</strong> — deterministic from the raw query output, same for all viewers, cacheable. Everything right is <strong>live calculation</strong> — depends on config parameters (est_hrs_per_kloc, cfg_total_developers, etc.), changes instantly when the user adjusts settings.
          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
