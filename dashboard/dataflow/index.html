<!DOCTYPE html>
<html lang="en" data-color-mode="dark" data-dark-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BVE Dataflow &amp; Coverage</title>
<link rel="stylesheet" href="https://unpkg.com/@primer/css@21.3.1/dist/primer.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { background: var(--bgColor-default); margin: 0; }
  .dataflow-page { max-width: 1600px; margin: 0 auto; padding: 24px 16px; }
  .main-layout { display: grid; grid-template-columns: 1fr 420px; gap: 20px; align-items: start; }
  .main-layout.no-detail { grid-template-columns: 1fr; }
  @media (max-width: 1100px) { .main-layout { grid-template-columns: 1fr; } }
  .flow-column { display: flex; flex-direction: column; gap: 10px; }
  .flow-columns { display: grid; grid-template-columns: 1fr auto 1fr auto 1fr; gap: 0; align-items: start; }
  .flow-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--fgColor-muted); font-weight: 600; margin-bottom: 8px; text-align: center; }
  .flow-box { border: 2px solid var(--borderColor-default); border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: all 0.15s; position: relative; }
  .flow-box:hover { border-color: var(--fgColor-accent); }
  .flow-box.selected { border-color: #58a6ff !important; background: rgba(88,166,255,0.08); box-shadow: 0 0 0 2px rgba(88,166,255,0.3); }
  .flow-box.connected { border-color: rgba(88,166,255,0.5); background: rgba(88,166,255,0.04); }
  .flow-box.dimmed { opacity: 0.35; }
  .flow-box .box-title { font-size: 12px; font-weight: 600; color: var(--fgColor-default); line-height: 1.3; }
  .flow-box .box-sub { font-size: 10px; color: var(--fgColor-muted); margin-top: 1px; line-height: 1.4; }
  .flow-box .box-badge { display: inline-block; font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 10px; margin-top: 3px; }
  .flow-box .box-counts { font-size: 11px; color: var(--fgColor-default); font-weight: 500; margin-top: 4px; line-height: 1.5; }
  .flow-box .count-row { display: flex; gap: 6px; align-items: baseline; }
  .flow-box .count-num { font-weight: 700; font-size: 13px; color: var(--fgColor-default); }
  .flow-box .count-label { font-size: 10px; color: var(--fgColor-muted); }
  .flow-box .box-source { font-size: 9px; color: var(--fgColor-muted); margin-top: 3px; font-style: italic; }
  .flow-box.raw { border-left: 3px solid #3fb950; }
  .flow-box.materialized { border-left: 3px solid #58a6ff; }
  .flow-box.dashboard { border-left: 3px solid #d29922; border-style: dashed; }

  /* Color-coded connector dots for edge tracing */
  .edge-dots { display: flex; gap: 3px; margin-top: 4px; flex-wrap: wrap; }
  .edge-dot { width: 8px; height: 8px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }

  .arrow-col { display: flex; flex-direction: column; justify-content: center; padding: 28px 2px 0; gap: 20px; min-width: 20px; }
  .arrow-mark { color: var(--borderColor-default); font-size: 10px; text-align: center; }
  .arrow-mark.active { color: #58a6ff; }
  .arrow-mark.dashed { color: #d29922; opacity: 0.4; }
  .detail-panel { border: 1px solid var(--borderColor-default); border-radius: 8px; padding: 16px; position: sticky; top: 24px; max-height: calc(100vh - 48px); overflow-y: auto; }
  .detail-panel h3 { margin: 0 0 4px 0; font-size: 15px; }
  .detail-panel .detail-sub { font-size: 11px; color: var(--fgColor-muted); margin-bottom: 12px; }
  .detail-section { margin-bottom: 14px; }
  .detail-section:last-child { margin-bottom: 0; }
  .detail-section h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--fgColor-muted); margin: 0 0 6px 0; font-weight: 600; border-bottom: 1px solid var(--borderColor-muted); padding-bottom: 4px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .detail-grid.wide { grid-template-columns: 1fr; }
  .detail-stat { background: var(--bgColor-muted); border-radius: 6px; padding: 6px 10px; }
  .detail-stat .stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--fgColor-muted); }
  .detail-stat .stat-value { font-size: 14px; font-weight: 600; color: var(--fgColor-default); }
  .detail-stat .stat-sub { font-size: 10px; color: var(--fgColor-muted); }
  .detail-stat.full { grid-column: 1 / -1; }
  .consumer-tag { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin: 2px 2px; }
  .close-btn { position: absolute; top: 8px; right: 8px; background: none; border: none; color: var(--fgColor-muted); cursor: pointer; font-size: 16px; padding: 4px; border-radius: 4px; }
  .close-btn:hover { background: var(--bgColor-muted); color: var(--fgColor-default); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

function timeAgo(ts) {
  if (!ts) return '\u2014';
  const diff = Date.now() - new Date(ts).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}
function fmtBytes(bytes) { if (!bytes) return '\u2014'; if (bytes < 1024) return bytes + ' B'; if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB'; return (bytes / 1048576).toFixed(1) + ' MB'; }
function fmtCompact(v) { if (v == null) return '\u2014'; if (Math.abs(v) >= 1e6) return (v / 1e6).toFixed(1) + 'M'; if (Math.abs(v) >= 1e3) return (v / 1e3).toFixed(1) + 'k'; return String(v); }

const CONSUMERS = {
  'ai-assisted-efficiency-days': [
    { name: 'AI-Assisted Efficiency', sections: 'Impact \u00b7 Drivers \u00b7 Confidence' },
    { name: 'AI-Assisted Element', sections: 'Leverage \u00b7 Insights' },
    { name: 'Integrated', sections: 'AI sub-rectangle' },
    { name: 'AI Efficiency v2', sections: 'Impact \u00b7 Drivers \u00b7 Confidence', v2: true },
    { name: 'AI Element v2', sections: 'Leverage \u00b7 Insights', v2: true },
    { name: 'Integrated v2', sections: 'AI sub-rectangle', v2: true },
  ],
  'ai-assisted-structural-days': [
    { name: 'AI-Assisted Structural', sections: 'Completeness \u00b7 Consistency \u00b7 Impact' },
    { name: 'AI-Assisted Element', sections: 'Factor donuts \u00b7 Insights' },
    { name: 'Integrated', sections: 'AI structural factors' },
    { name: 'AI Structural v2', sections: 'Overview \u00b7 Trends \u00b7 PR Analysis', v2: true },
    { name: 'AI Element v2', sections: 'Structural factors \u00b7 Insights', v2: true },
    { name: 'Integrated v2', sections: 'AI structural factors', v2: true },
  ],
  'agentic-efficiency-days': [
    { name: 'Agentic Efficiency', sections: 'Impact \u00b7 Drivers \u00b7 Confidence' },
    { name: 'Agentic Element', sections: 'Factor donuts \u00b7 Insights' },
    { name: 'Integrated', sections: 'Agentic adoption' },
    { name: 'Agentic Efficiency v2', sections: 'Impact \u00b7 Drivers \u00b7 Confidence', v2: true },
    { name: 'Agentic Element v2', sections: 'Leverage \u00b7 Insights', v2: true },
    { name: 'Integrated v2', sections: 'Agentic adoption', v2: true },
  ],
  'agentic-pr-sessions': [
    { name: 'Agentic Efficiency', sections: 'Confidence (PR detail)' },
    { name: 'Agentic Element', sections: 'Leverage rectangle \u00b7 Completions' },
    { name: 'Integrated', sections: 'Agentic dev-hours \u00b7 completions' },
    { name: 'Agentic Efficiency v2', sections: 'PR sessions', v2: true },
    { name: 'Agentic Element v2', sections: 'Leverage \u00b7 PR Analysis', v2: true },
    { name: 'Integrated v2', sections: 'Agentic completions', v2: true },
  ],
};

// Reverse map: dashboard name -> artifact base names it depends on
var DASHBOARD_ARTIFACTS = {};
Object.keys(CONSUMERS).forEach(function(artName) {
  CONSUMERS[artName].forEach(function(c) {
    if (!DASHBOARD_ARTIFACTS[c.name]) DASHBOARD_ARTIFACTS[c.name] = [];
    if (DASHBOARD_ARTIFACTS[c.name].indexOf(artName) < 0) DASHBOARD_ARTIFACTS[c.name].push(artName);
  });
});

var DASHBOARD_NAMES = ['AI-Assisted Efficiency','AI-Assisted Structural','AI-Assisted Element','Agentic Efficiency','Agentic Element','Integrated','AI Efficiency v2','AI Structural v2','AI Element v2','Agentic Efficiency v2','Agentic Element v2','Integrated v2'];

// Stable colors for edge tracing (assigned to raw files by index)
var EDGE_COLORS = ['#3fb950', '#58a6ff', '#d29922', '#bc8cff', '#f85149', '#f778ba'];

function shortName(filename) {
  return filename
    .replace(/^octodemo-/, '')
    .replace(/-\d{8}T\d{4}Z/, '')
    .replace('.json', '');
}

function RawFileBox({ file, selected, onClick, connected, dimmed, edgeColor, downstreamColors }) {
  const m = file.metadata || {};
  const d = file.derived || {};
  const scope = m.scope_name || m.org || '';
  const dr = m.date_range;
  const counts = Object.entries(m.counts || {}).slice(0, 3);
  var cls = 'flow-box raw';
  if (selected) cls += ' selected';
  else if (connected) cls += ' connected';
  else if (dimmed) cls += ' dimmed';
  // Build derived entity line
  var hasDerived = d.unique_people || d.detail_rows || d.prs;
  return (
    <div className={cls} onClick={onClick} style={edgeColor ? {borderLeftColor: edgeColor} : {}}>
      <div className="box-title">{shortName(file.name)}</div>
      {scope && <div className="box-sub">scope: <strong style={{color:'var(--fgColor-default)'}}>{scope}</strong></div>}
      {dr && <div className="box-sub">{(dr.since||'?').slice(0,10)} {'\u2192'} {(dr.until||'?').slice(0,10)}{dr.days ? ' ('+dr.days+'d)':''}</div>}
      {counts.length > 0 && <div className="box-counts">
        <div className="count-row">{counts.map(function(e, i){ return <React.Fragment key={i}><span className="count-num">{fmtCompact(e[1])}</span><span className="count-label">{e[0].replace(/_/g,' ')}</span></React.Fragment>; })}</div>
      </div>}
      {hasDerived && <div className="box-counts" style={{borderTop:'1px solid var(--borderColor-muted)', paddingTop:'3px', marginTop:'3px'}}>
        <div className="count-row">
          {d.unique_people > 0 && <><span className="count-num" style={{color:'#3fb950'}}>{fmtCompact(d.unique_people)}</span><span className="count-label">{d.people_label || 'people'}</span></>}
          {d.unique_pr_authors > 0 && <><span className="count-num" style={{color:'#3fb950'}}>{fmtCompact(d.unique_pr_authors)}</span><span className="count-label">PR authors</span></>}
          {d.detail_rows > 0 && <><span className="count-num" style={{color:'#58a6ff'}}>{fmtCompact(d.detail_rows)}</span><span className="count-label">{d.detail_label || 'detail rows'}</span></>}
          {d.prs > 0 && <><span className="count-num" style={{color:'#58a6ff'}}>{fmtCompact(d.prs)}</span><span className="count-label">PRs</span></>}
          {d.unique_repos > 0 && <><span className="count-num" style={{color:'#d29922'}}>{fmtCompact(d.unique_repos)}</span><span className="count-label">repos</span></>}
        </div>
      </div>}
      {m.collected_at && <div className="box-sub">{timeAgo(m.collected_at)}</div>}
      {file.downstreamArtifacts && file.downstreamArtifacts.length > 0 && (
        <div className="box-sub" style={{marginTop:'3px'}}>
          {'\u2192 '}{file.downstreamArtifacts.map(function(a){return a.replace(/-/g,' ')}).join(', ')}
        </div>
      )}
    </div>
  );
}

function ArtifactBox({ artifact, selected, onClick, connected, dimmed, sourceColors }) {
  const p = artifact.profile || {};
  var cls = 'flow-box materialized';
  if (selected) cls += ' selected';
  else if (connected) cls += ' connected';
  else if (dimmed) cls += ' dimmed';
  return (
    <div className={cls} onClick={onClick}>
      <div className="box-title">{(artifact.name||'').replace(/-/g, ' ')}</div>
      <div className="box-counts">
        <div className="count-row">
          <span className="count-num">{fmtCompact(p.record_count)}</span>
          <span className="count-label">{p.status_breakdown ? 'sessions' : 'day rows'}</span>
          {p.detail_row_count > 0 && <><span className="count-num" style={{color:'#58a6ff'}}>{fmtCompact(p.detail_row_count)}</span><span className="count-label">{p.detail_label || 'detail rows'}</span></>}
          {p.pr_record_count > 0 && <><span className="count-num" style={{color:'#58a6ff'}}>{fmtCompact(p.pr_record_count)}</span><span className="count-label">PRs</span></>}
        </div>
        <div className="count-row">
          {p.unique_people > 0 && <><span className="count-num" style={{color:'#3fb950'}}>{fmtCompact(p.unique_people)}</span><span className="count-label">{p.people_label || 'people'}</span></>}
          {p.unique_repos > 0 && <><span className="count-num" style={{color:'#d29922'}}>{fmtCompact(p.unique_repos)}</span><span className="count-label">repos</span></>}
        </div>
      </div>
      {p.date_range && p.date_range.first && <div className="box-sub">{p.date_range.first} {'\u2192'} {p.date_range.last}</div>}
      {sourceColors && sourceColors.length > 0 && (
        <div className="edge-dots">
          {sourceColors.map(function(sc, i) {
            return <div key={i} className="edge-dot" style={{background: sc.color}} title={shortName(sc.file)} />;
          })}
          <span style={{fontSize:'9px', color:'var(--fgColor-muted)', marginLeft:'2px'}}>
            {'\u2190 '}{sourceColors.map(function(sc){return shortName(sc.file)}).join(', ')}
          </span>
        </div>
      )}
      <div className="box-badge" style={{background:'#58a6ff',color:'#000'}}>materialized</div>
    </div>
  );
}

function DashboardBox({ name, selected, onClick, connected, dimmed }) {
  var cls = 'flow-box dashboard';
  if (selected) cls += ' selected';
  else if (connected) cls += ' connected';
  else if (dimmed) cls += ' dimmed';
  return React.createElement('div', {className: cls, onClick: onClick},
    React.createElement('div', {className:'box-title'}, name),
    React.createElement('div', {className:'box-badge', style:{background:'#d29922',color:'#000'}}, 'live calcs')
  );
}

function StatCard({ label, value, sub, color }) {
  return React.createElement('div', {className:'detail-stat'},
    React.createElement('div', {className:'stat-label'}, label),
    React.createElement('div', {className:'stat-value', style: color ? {color} : {}}, value),
    sub ? React.createElement('div', {className:'stat-sub'}, sub) : null
  );
}

function RawFileDetail({ file, queryRun, onClose }) {
  const m = file.metadata || {};
  const target = (queryRun && queryRun.targets || []).find(function(t) { return file.name.indexOf(t.output_file ? t.output_file.replace(/\.json$/,'') : '') >= 0; });
  return (
    <div className="detail-panel" style={{position:'relative'}}>
      <button className="close-btn" onClick={onClose}>{'\u2715'}</button>
      <h3 className="color-fg-accent">{'\ud83d\udcc4 ' + file.name.replace(/^octodemo-/,'')}</h3>
      <div className="detail-sub">{file.name}</div>
      <div className="detail-section">
        <h4>Query Parameters</h4>
        <div className="detail-grid">
          {m.scope && <StatCard label="Scope" value={m.scope} />}
          {(m.scope_name||m.org) && <StatCard label={m.scope==='enterprise'?'Enterprise':'Org'} value={m.scope_name||m.org} />}
          {m.repo && m.repo !== 'null' && <StatCard label="Repo" value={m.repo} />}
          {m.date_range && m.date_range.days && <StatCard label="DAYS" value={String(m.date_range.days)} />}
          {m.date_range && m.date_range.since && <StatCard label="Since" value={(m.date_range.since||'').slice(0,10)} />}
          {m.date_range && m.date_range.until && <StatCard label="Until" value={m.date_range.until.slice(0,10)} />}
          {queryRun && queryRun.profile && <StatCard label="Profile" value={queryRun.profile} />}
        </div>
      </div>
      <div className="detail-section">
        <h4>Collection</h4>
        <div className="detail-grid">
          {m.collected_at && <StatCard label="Collected" value={new Date(m.collected_at).toLocaleString()} sub={timeAgo(m.collected_at)} />}
          {m.elapsed_seconds!=null && <StatCard label="Duration" value={m.elapsed_seconds+'s'} />}
          {m.api_calls!=null && <StatCard label="API Calls" value={String(m.api_calls)} />}
          {target && target.file_size_bytes && <StatCard label="File Size" value={fmtBytes(target.file_size_bytes)} />}
          {m.source && <StatCard label="Script" value={m.source} />}
          {target && target.status && <StatCard label="Status" value={target.status} color={target.status==='success'?'#3fb950':'#f85149'} />}
        </div>
      </div>
      {m.counts && <div className="detail-section">
        <h4>Raw Record Counts</h4>
        <div className="detail-grid">
          {Object.entries(m.counts).map(function(e) { return <StatCard key={e[0]} label={e[0].replace(/_/g,' ')} value={fmtCompact(e[1])} />; })}
        </div>
      </div>}
      {file.derived && (file.derived.unique_people || file.derived.detail_rows || file.derived.prs) && <div className="detail-section">
        <h4>Entity Counts (from materialization)</h4>
        <div className="detail-grid">
          {file.derived.unique_people > 0 && <StatCard label={'Unique '+(file.derived.people_label||'people')} value={fmtCompact(file.derived.unique_people)} color="#3fb950" />}
          {file.derived.unique_pr_authors > 0 && <StatCard label="Unique PR Authors" value={fmtCompact(file.derived.unique_pr_authors)} color="#3fb950" />}
          {file.derived.detail_rows > 0 && <StatCard label={file.derived.detail_label||'Detail rows'} value={fmtCompact(file.derived.detail_rows)} color="#58a6ff" />}
          {file.derived.prs > 0 && <StatCard label="PR Records" value={fmtCompact(file.derived.prs)} color="#58a6ff" />}
          {file.derived.unique_repos > 0 && <StatCard label="Unique Repos" value={fmtCompact(file.derived.unique_repos)} color="#d29922" />}
        </div>
      </div>}
      {m.completeness && <div className="detail-section">
        <h4>Completeness</h4>
        <div className={'flash f6 ' + (m.completeness==='complete'?'flash-success':'flash-warn')}>{m.completeness==='complete'?'\u2705 Complete':'\u26a0\ufe0f '+m.completeness}</div>
      </div>}
      {file.downstreamArtifacts && file.downstreamArtifacts.length > 0 && <div className="detail-section">
        <h4>Feeds Artifacts</h4>
        <div className="detail-grid wide">
          {file.downstreamArtifacts.map(function(a) { return <div key={a} className="detail-stat"><div className="stat-value" style={{fontSize:'11px'}}>{'\u2192 '+a.replace(/-/g,' ')}</div></div>; })}
        </div>
      </div>}
    </div>
  );
}

function ArtifactDetail({ artifact, onClose }) {
  const p = artifact.profile || {};
  const consumers = CONSUMERS[artifact.name] || [];
  return (
    <div className="detail-panel" style={{position:'relative'}}>
      <button className="close-btn" onClick={onClose}>{'\u2715'}</button>
      <h3 className="color-fg-accent">{'\ud83d\udd37 '+(artifact.name||'').replace(/-/g,' ')}</h3>
      <div className="detail-sub">Materialized {artifact.computed_at ? new Date(artifact.computed_at).toLocaleString() : '\u2014'} {'\u00b7'} {artifact.compute_ms||0}ms</div>
      <div className="detail-section"><h4>Records &amp; Coverage</h4><div className="detail-grid">
        <StatCard label={p.status_breakdown ? 'PR Sessions' : 'Day Rows'} value={fmtCompact(p.record_count)} />
        {p.detail_row_count != null && p.detail_row_count > 0 && <StatCard label={p.detail_label ? (p.detail_label.charAt(0).toUpperCase()+p.detail_label.slice(1)) : 'Detail Rows'} value={fmtCompact(p.detail_row_count)} />}
        {p.pr_record_count != null && p.pr_record_count > 0 && <StatCard label="PR Records" value={fmtCompact(p.pr_record_count)} />}
        {p.unique_people != null && p.unique_people > 0 && <StatCard label={'Unique '+(p.people_label ? p.people_label.charAt(0).toUpperCase()+p.people_label.slice(1) : 'People')} value={String(p.unique_people)} />}
        {p.unique_repos != null && p.unique_repos > 0 && <StatCard label="Unique Repos" value={String(p.unique_repos)} />}
        {p.date_range && p.date_range.first && <StatCard label="Date Range" value={p.date_range.first+' \u2192 '+p.date_range.last} sub={p.date_range.days_with_data+' days'} />}
      </div></div>
      {(p.enterprise_dedup||p.user_dedup||p.devday_dedup||p.session_dedup||p.aggregation) && <div className="detail-section"><h4>Processing Pipeline</h4><div className="detail-grid">
        {p.enterprise_dedup && <StatCard label="Enterprise Dedup" value={p.enterprise_dedup.before+'\u2192'+p.enterprise_dedup.after} sub={p.enterprise_dedup.removed+' removed'} />}
        {p.user_dedup && <StatCard label="User-Day Dedup" value={p.user_dedup.before+'\u2192'+p.user_dedup.after} sub={p.user_dedup.unique_logins+' logins'} />}
        {p.devday_dedup && <StatCard label="Dev-Day Dedup" value={p.devday_dedup.before+'\u2192'+p.devday_dedup.after} sub={p.devday_dedup.unique_developers+' devs'} />}
        {p.aggregation && <StatCard label="Aggregation" value={p.aggregation.devday_rows+'\u2192'+p.aggregation.day_rows+' days'} />}
        {p.session_dedup && <StatCard label="Session Dedup" value={p.session_dedup.before+'\u2192'+p.session_dedup.after} sub={p.session_dedup.removed+' removed'} />}
      </div></div>}
      {p.pr_processing && <div className="detail-section"><h4>PR Processing</h4><div className="detail-grid">
        <StatCard label="Dedup" value={p.pr_processing.before_dedup+'\u2192'+p.pr_processing.after_dedup} />
        <StatCard label="Bot Filter" value={'-'+p.pr_processing.bots_removed+' bots'} sub={p.pr_processing.after_filter+' remain'} />
      </div></div>}
      {p.pr_classification && p.has_pr_data && <div className="detail-section"><h4>PR-Assist Classification</h4><div className="detail-grid">
        <StatCard label="Lookback" value={p.pr_classification.lookback_days+' days'} />
        <StatCard label="Assisted Rate" value={p.period_prs_assisted_pct!=null?(p.period_prs_assisted_pct*100).toFixed(1)+'%':'\u2014'} sub={p.pr_classification.assisted_prs+' of '+p.pr_classification.total_merged_prs} />
        <StatCard label="PR Authors" value={String(p.pr_classification.unique_pr_authors)} />
        <StatCard label="Copilot Users" value={String(p.pr_classification.unique_copilot_users)} />
      </div></div>}
      {p.status_breakdown && <div className="detail-section"><h4>PR Status</h4><div className="detail-grid">
        <StatCard label="Merged" value={String(p.status_breakdown.merged)} color="#3fb950" />
        <StatCard label="Open" value={String(p.status_breakdown.open)} color="#58a6ff" />
        <StatCard label="Closed" value={String(p.status_breakdown.closed_no_merge)} color="#f85149" />
        {p.with_duration!=null && <StatCard label="With Duration" value={String(p.with_duration)} sub={p.without_duration+' without'} />}
      </div></div>}
      {(p.unique_repos!=null||p.loc_summary) && <div className="detail-section"><h4>Entities</h4><div className="detail-grid">
        {p.loc_summary && <div className="detail-stat full"><div className="stat-label">LoC</div><div className="stat-value">+{fmtCompact(p.loc_summary.total_additions)} / -{fmtCompact(p.loc_summary.total_deletions)}</div></div>}
      </div></div>}
      {p.reconciliation_summary && <div className="detail-section"><h4>Reconciliation</h4><div className="detail-grid">
        {Object.entries(p.reconciliation_summary).filter(function(e){return e[1]>0}).map(function(e){ return <StatCard key={e[0]} label={e[0].replace(/_/g,' ')} value={String(e[1])} color={e[0]==='match'?'#3fb950':e[0]==='material_difference'?'#f85149':'#d29922'} />; })}
      </div></div>}
      {artifact.inputs && artifact.inputs.length>0 && <div className="detail-section"><h4>Source Files</h4><div className="detail-grid wide">
        {artifact.inputs.map(function(inp,i){ return <div key={i} className="detail-stat"><div className="stat-value" style={{fontSize:'11px'}}>{'\ud83d\udcc4 '+inp.file}</div>{inp.hash && <div className="stat-sub">#{inp.hash.slice(0,12)}</div>}</div>; })}
      </div></div>}
      {consumers.length>0 && <div className="detail-section"><h4>Consumed By</h4>
        {consumers.map(function(c,i){ return <div key={i} style={{marginBottom:'4px'}}>
          <span className="consumer-tag" style={{background:'rgba(210,153,34,0.15)',color:'#d29922',fontWeight:600}}>{c.name}</span>
          <span style={{fontSize:'10px',color:'var(--fgColor-muted)',marginLeft:'4px'}}>{c.sections}</span>
        </div>; })}
      </div>}
    </div>
  );
}

function App() {
  const [manifest, setManifest] = useState(null);
  const [artifactMeta, setArtifactMeta] = useState({});
  const [queryRun, setQueryRun] = useState(null);
  const [selected, setSelected] = useState(null);
  const [error, setError] = useState(null);

  useEffect(function() {
    (async function() {
      try {
        var mRes = await fetch('data/pipeline-manifest.json');
        if (!mRes.ok) throw new Error('Manifest not found');
        var m = await mRes.json();
        setManifest(m);

        var meta = {};
        for (var name of m.artifacts) {
          try {
            var subdir = m.materialized_dir || '';
            var prefix = subdir ? subdir + '/' : '';
            var res = await fetch('data/' + prefix + name);
            if (res.ok) {
              var full = await res.json();
              var key = name.replace(/-\d{4}-\d{2}-\d{2}T\d{4}Z\.json$/, '').replace('.json', '');
              meta[key] = full.artifact;
            }
          } catch(e2) {}
        }
        setArtifactMeta(meta);

        try {
          var qRes = await fetch('data/query-status.json');
          if (qRes.ok) setQueryRun(await qRes.json());
        } catch(e3) {}
      } catch (e) { setError(e.message); }
    })();
  }, []);

  var rawFiles = useMemo(function() {
    if (!manifest) return [];
    return manifest.raw_files.map(function(name) {
      var metadata = null;
      Object.values(artifactMeta).forEach(function(art) {
        var inp = (art.inputs||[]).find(function(i){return i.file === name});
        if (inp && inp.metadata) metadata = inp.metadata;
      });
      var downstreamArtifacts = (manifest.edges||[]).filter(function(e){return e.from===name}).map(function(e){return e.to.replace(/-\d{4}-\d{2}-\d{2}T\d{4}Z\.json$/,'').replace('.json','')});
      // Derive entity counts from downstream artifact profiles
      var derived = {};
      downstreamArtifacts.forEach(function(artName) {
        var art = artifactMeta[artName];
        if (!art || !art.profile) return;
        var p = art.profile;
        if (p.unique_people && (!derived.unique_people || p.unique_people > derived.unique_people)) {
          derived.unique_people = p.unique_people;
          derived.people_label = p.people_label || 'people';
        }
        var prAuthors = p.unique_pr_authors || 0;
        if (prAuthors && (!derived.unique_pr_authors || prAuthors > derived.unique_pr_authors)) derived.unique_pr_authors = prAuthors;
        if (p.unique_repos && (!derived.unique_repos || p.unique_repos > derived.unique_repos)) derived.unique_repos = p.unique_repos;
        if (p.detail_row_count && (!derived.detail_rows || p.detail_row_count > derived.detail_rows)) {
          derived.detail_rows = p.detail_row_count;
          derived.detail_label = p.detail_label || 'detail rows';
        }
        if (p.pr_record_count && (!derived.prs || p.pr_record_count > derived.prs)) derived.prs = p.pr_record_count;
      });
      return { name: name, metadata: metadata, downstreamArtifacts: downstreamArtifacts, derived: derived };
    });
  }, [manifest, artifactMeta]);

  var artifacts = useMemo(function() {
    if (!manifest) return [];
    // Use artifact_map if available (maps base name → timestamped filename)
    var map = manifest.artifact_map || {};
    var names = Object.keys(map).length > 0 ? Object.keys(map) : manifest.artifacts.map(function(n) { return n.replace(/-\d{4}-\d{2}-\d{2}T\d{4}Z\.json$/, '').replace('.json',''); });
    return names.map(function(baseName) {
      return Object.assign({ name: baseName, fileName: map[baseName] || baseName + '.json' }, artifactMeta[baseName] || {});
    });
  }, [manifest, artifactMeta]);

  function handleSelect(sel) {
    if (selected && selected.type === sel.type && selected.name === sel.name) setSelected(null);
    else setSelected(sel);
  }

  if (error) return (<div className="dataflow-page"><h1 className="f1 color-fg-default mb-2">Dataflow &amp; Coverage</h1><div className="flash flash-error"><p>Failed: {error}</p><p className="f6 color-fg-muted mt-2">Run <code>node scripts/materialize.js</code></p></div></div>);
  if (!manifest) return (<div className="dataflow-page"><h1 className="f1 color-fg-default mb-2">Dataflow &amp; Coverage</h1><div className="Box p-4 text-center color-fg-muted">Loading{'\u2026'}</div></div>);

  // Compute connected nodes based on selection
  var connectedRaw = new Set();
  var connectedArt = new Set();
  var connectedDash = new Set();
  var hasSelection = !!selected;
  if (selected && manifest.edges) {
    if (selected.type === 'raw') {
      manifest.edges.forEach(function(e) {
        if (e.from === selected.name) {
          var artBase = e.to.replace(/-\d{4}-\d{2}-\d{2}T\d{4}Z\.json$/, '').replace('.json', '');
          connectedArt.add(artBase);
          // Also highlight dashboards that consume this artifact
          (CONSUMERS[artBase] || []).forEach(function(c) { connectedDash.add(c.name); });
        }
      });
    } else if (selected.type === 'artifact') {
      manifest.edges.forEach(function(e) {
        var artBase = e.to.replace(/-\d{4}-\d{2}-\d{2}T\d{4}Z\.json$/, '').replace('.json', '');
        if (artBase === selected.name) connectedRaw.add(e.from);
      });
      // Also highlight dashboards that consume this artifact
      (CONSUMERS[selected.name] || []).forEach(function(c) { connectedDash.add(c.name); });
    } else if (selected.type === 'dashboard') {
      // Highlight upstream artifacts and their raw sources
      (DASHBOARD_ARTIFACTS[selected.name] || []).forEach(function(artName) {
        connectedArt.add(artName);
        manifest.edges.forEach(function(e) {
          var artBase = e.to.replace(/-\d{4}-\d{2}-\d{2}T\d{4}Z\.json$/, '').replace('.json', '');
          if (artBase === artName) connectedRaw.add(e.from);
        });
      });
    }
  }

  // Build edge color map: each raw file gets a stable color
  var rawColorMap = {};
  rawFiles.forEach(function(f, i) { rawColorMap[f.name] = EDGE_COLORS[i % EDGE_COLORS.length]; });

  // For each artifact, collect the colors of its source raw files
  var artifactSourceColors = {};
  artifacts.forEach(function(a) {
    var colors = [];
    (manifest.edges || []).forEach(function(e) {
      var artBase = e.to.replace(/-\d{4}-\d{2}-\d{2}T\d{4}Z\.json$/, '').replace('.json', '');
      if (artBase === a.name && rawColorMap[e.from]) {
        colors.push({ file: e.from, color: rawColorMap[e.from] });
      }
    });
    artifactSourceColors[a.name] = colors;
  });

  return (
    <div className="dataflow-page">
      <div className="d-flex flex-items-center flex-justify-between mb-3">
        <div>
          <h1 className="f1 color-fg-default" style={{margin:0}}>Dataflow &amp; Coverage</h1>
          <p className="f6 color-fg-muted mt-1">
            <span style={{color:'#3fb950'}}>{'\u25a0'}</span> Query output {'\u2192'}
            <span style={{color:'#58a6ff'}}> {'\u25a0'}</span> Materialized {'\u2192'}
            <span style={{color:'#d29922'}}> {'\u25a1'}</span> Live calcs {'\u00b7 '}
            {timeAgo(manifest.materialized_at)}
            {queryRun && queryRun.profile && <span> {'\u00b7'} profile: <strong>{queryRun.profile}</strong></span>}
          </p>
        </div>
        <div className="d-flex" style={{gap:'16px'}}>
          <div className="text-center"><div className="f6 color-fg-muted">Files</div><div className="f3 text-bold">{manifest.raw_files.length}</div></div>
          <div className="text-center"><div className="f6 color-fg-muted">Artifacts</div><div className="f3 text-bold">{manifest.artifacts.length}</div></div>
          <div className="text-center"><div className="f6 color-fg-muted">Flows</div><div className="f3 text-bold">{(manifest.edges||[]).length}</div></div>
          <div className="text-center"><div className="f6 color-fg-muted">Dashboards</div><div className="f3 text-bold">6</div></div>
        </div>
      </div>

      <div className={'main-layout' + (!selected ? ' no-detail' : '')}>
        <div className="Box color-shadow-medium p-4">
          <div className="flow-columns">
            <div className="flow-column">
              <div className="flow-label">Query Output</div>
              {rawFiles.map(function(f,i) {
                var isSel = selected && selected.type==='raw' && selected.name===f.name;
                var isCon = connectedRaw.has(f.name);
                var isDim = hasSelection && !isSel && !isCon;
                return <RawFileBox key={i} file={f} selected={isSel} connected={isCon} dimmed={isDim} edgeColor={rawColorMap[f.name]} onClick={function(){handleSelect({type:'raw',name:f.name,data:f})}} />;
              })}
            </div>
            <div className="arrow-col">{rawFiles.map(function(_,i){return <div key={i} className="arrow-mark">{'\u25b6'}</div>})}</div>
            <div className="flow-column">
              <div className="flow-label">Materialized Artifacts</div>
              {artifacts.map(function(a,i) {
                var isSel = selected && selected.type==='artifact' && selected.name===a.name;
                var isCon = connectedArt.has(a.name);
                var isDim = hasSelection && !isSel && !isCon;
                return <ArtifactBox key={i} artifact={a} selected={isSel} connected={isCon} dimmed={isDim} sourceColors={artifactSourceColors[a.name]} onClick={function(){handleSelect({type:'artifact',name:a.name,data:a})}} />;
              })}
            </div>
            <div className="arrow-col">{[0,1,2,3,4,5].map(function(i){return <div key={i} className="arrow-mark dashed">{'\u25b6'}</div>})}</div>
            <div className="flow-column">
              <div className="flow-label">Dashboards</div>
              {DASHBOARD_NAMES.map(function(n) {
                var isSel = selected && selected.type==='dashboard' && selected.name===n;
                var isCon = connectedDash.has(n);
                var isDim = hasSelection && !isSel && !isCon;
                return <DashboardBox key={n} name={n} selected={isSel} connected={isCon} dimmed={isDim} onClick={function(){handleSelect({type:'dashboard',name:n})}} />;
              })}
            </div>
          </div>
        </div>

        {selected && selected.type === 'raw' && (
          <RawFileDetail file={selected.data} queryRun={queryRun} onClose={function(){setSelected(null)}} />
        )}
        {selected && selected.type === 'artifact' && selected.data && (
          <ArtifactDetail artifact={selected.data} onClose={function(){setSelected(null)}} />
        )}
        {selected && selected.type === 'dashboard' && (
          <div className="detail-panel" style={{position:'relative'}}>
            <button className="close-btn" onClick={function(){setSelected(null)}}>{'\u2715'}</button>
            <h3 className="color-fg-accent">{'\ud83d\udcca '}{selected.name}</h3>
            <div className="detail-sub">Dashboard with live config-reactive calculations</div>
            <div className="detail-section">
              <h4>Consumes Artifacts</h4>
              <div className="detail-grid wide">
                {(DASHBOARD_ARTIFACTS[selected.name] || []).map(function(artName) {
                  var art = artifactMeta[artName];
                  var p = art && art.profile ? art.profile : {};
                  return <div key={artName} className="detail-stat">
                    <div className="stat-label">{artName.replace(/-/g,' ')}</div>
                    <div className="stat-value">{fmtCompact(p.record_count)} records</div>
                    {p.date_range && p.date_range.first && <div className="stat-sub">{p.date_range.first} {'\u2192'} {p.date_range.last}</div>}
                  </div>;
                })}
              </div>
            </div>
            <div className="detail-section">
              <h4>Sections</h4>
              <div className="detail-grid wide">
                {(DASHBOARD_ARTIFACTS[selected.name] || []).map(function(artName) {
                  var consumers = CONSUMERS[artName] || [];
                  var match = consumers.find(function(c){return c.name === selected.name});
                  return match ? <div key={artName} className="detail-stat"><div className="stat-label">from {artName.replace(/-/g,' ')}</div><div className="stat-value" style={{fontSize:'12px'}}>{match.sections}</div></div> : null;
                })}
              </div>
            </div>
          </div>
        )}
      </div>

      <div className="Box p-3 mt-3 f6 color-fg-muted">
        <strong className="color-fg-default">Materialization boundary:</strong> Solid boxes = <strong>observed data</strong> (deterministic, cacheable). Dashed boxes = <strong>live calculations</strong> (config-reactive, per-viewer).
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
