<!DOCTYPE html>
<html lang="en" data-color-mode="dark" data-dark-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BVE — From Activity Metrics to Leverage Signals</title>

<!-- Primer CSS -->
<link rel="stylesheet" href="https://unpkg.com/@primer/css@21.3.1/dist/primer.css">

<!-- Highcharts -->
<script src="https://cdn.jsdelivr.net/npm/highcharts@11.4.8/highcharts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highcharts@11.4.8/highcharts-more.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highcharts@11.4.8/modules/accessibility.js"></script>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  html { scroll-behavior: smooth; }
  body { background: var(--bgColor-default); }

  /* ── Page layout ── */
  .demo-page { max-width: 960px; margin: 0 auto; padding: 48px 24px 80px; }

  /* ── Page header ── */
  .page-header { text-align: center; margin-bottom: 56px; padding-bottom: 40px; border-bottom: 1px solid var(--borderColor-muted); }
  .page-title { font-size: 2rem; font-weight: 700; color: var(--fgColor-default); margin: 0 0 8px; line-height: 1.25; }
  .page-subtitle { font-size: 1rem; color: var(--fgColor-muted); margin: 0; max-width: 640px; margin: 0 auto; line-height: 1.5; }

  /* ── Demo data badge ── */
  .demo-badge { display: inline-block; padding: 3px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 600;
    background: var(--bgColor-attention-muted); color: var(--fgColor-attention); border: 1px solid var(--borderColor-attention-muted);
    margin-bottom: 16px; letter-spacing: 0.3px; text-transform: uppercase; }

  /* ── Narrative sections ── */
  .narrative-section { margin-bottom: 64px; }
  .section-number { font-size: 0.75rem; font-weight: 600; color: var(--fgColor-accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .section-title { font-size: 1.5rem; font-weight: 600; color: var(--fgColor-default); margin: 0 0 12px; }
  .section-explanation { font-size: 0.95rem; color: var(--fgColor-muted); line-height: 1.6; margin-bottom: 24px; max-width: 720px; }

  /* ── Takeaway callout ── */
  .takeaway { border-left: 3px solid var(--borderColor-accent-emphasis); padding: 16px 20px; margin-top: 24px;
    background: var(--bgColor-accent-muted); border-radius: 0 6px 6px 0; }
  .takeaway p { margin: 0; font-size: 0.9rem; color: var(--fgColor-default); line-height: 1.5; font-style: italic; }

  /* ── Metric cards ── */
  .metric-cards { display: grid; gap: 16px; margin-bottom: 24px; }
  .metric-cards.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .metric-cards.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .metric-cards.cols-2 { grid-template-columns: repeat(2, 1fr); }
  .metric-card { background: var(--bgColor-muted); border: 1px solid var(--borderColor-default); border-radius: 8px;
    padding: 20px; text-align: center; }
  .metric-value { font-size: 1.8rem; font-weight: 700; color: var(--fgColor-default); line-height: 1.2; }
  .metric-value.text-value { font-size: 1.1rem; }
  .metric-value .unit { font-size: 1rem; font-weight: 400; opacity: 0.6; margin-left: 2px; }
  .metric-label { font-size: 0.75rem; color: var(--fgColor-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
  .metric-card.accent { border-top: 3px solid var(--borderColor-accent-emphasis); }
  .metric-card.success { border-top: 3px solid var(--borderColor-success-emphasis); }
  .metric-card.attention { border-top: 3px solid var(--borderColor-attention-emphasis); }

  /* ── Decomposition paths ── */
  .decomp-wrap { margin: 28px 0 8px; }
  .decomp-formula { text-align: center; margin-bottom: 20px; }
  .decomp-formula .decomp-frac { display: inline-flex; flex-direction: column; align-items: center; font-family: 'SFMono-Regular', Consolas, monospace; }
  .decomp-formula .decomp-num { padding: 4px 16px; border-bottom: 2px solid var(--borderColor-default); font-size: 1rem; color: #3fb950; font-weight: 600; }
  .decomp-formula .decomp-den { padding: 4px 16px; font-size: 1rem; color: #58a6ff; font-weight: 600; }
  .decomp-formula .decomp-eq { font-size: 1.2rem; color: var(--fgColor-muted); margin: 0 12px; }
  .decomp-paths { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .decomp-path { background: var(--bgColor-muted); border: 1px solid var(--borderColor-default); border-radius: 8px; padding: 20px 24px; }
  .decomp-path h4 { font-size: 0.9rem; font-weight: 600; margin: 0 0 4px; }
  .decomp-path .path-holding { font-size: 0.8rem; color: var(--fgColor-muted); font-style: italic; margin: 0 0 12px; }
  .decomp-path ul { margin: 0; padding: 0 0 0 18px; }
  .decomp-path li { font-size: 0.85rem; color: var(--fgColor-muted); padding: 3px 0; line-height: 1.4; }
  .decomp-path.path-a { border-top: 3px solid #3fb950; }
  .decomp-path.path-b { border-top: 3px solid #58a6ff; }

  /* ── Comparison cards ── */
  .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 8px; }
  .comparison-col { background: var(--bgColor-muted); border: 1px solid var(--borderColor-default); border-radius: 8px; padding: 24px; }
  .comparison-col.highlight { border-color: var(--borderColor-accent-emphasis); background: var(--bgColor-accent-muted); }
  .comparison-col h3 { font-size: 1rem; font-weight: 600; margin: 0 0 16px; }
  .comparison-col.highlight h3 { color: var(--fgColor-accent); }
  .comparison-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--borderColor-muted); font-size: 0.9rem; color: var(--fgColor-muted); }
  .comparison-item:last-child { border-bottom: none; }
  .comparison-icon { font-size: 1.1rem; width: 24px; text-align: center; flex-shrink: 0; }
  .comparison-col.highlight .comparison-item { color: var(--fgColor-default); }

  /* ── Tables ── */
  .demo-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .demo-table th { text-align: left; padding: 8px 12px; border-bottom: 2px solid var(--borderColor-default);
    color: var(--fgColor-muted); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .demo-table th.num { text-align: right; }
  .demo-table td { padding: 8px 12px; border-bottom: 1px solid var(--borderColor-muted); color: var(--fgColor-default); }
  .demo-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .demo-table td.muted { color: var(--fgColor-muted); }
  .demo-table tr:last-child td { border-bottom: none; }
  .table-wrap { background: var(--bgColor-muted); border: 1px solid var(--borderColor-default); border-radius: 8px;
    padding: 4px 0; overflow: hidden; }

  /* ── Formula display ── */
  .formula-box { display: inline-block; padding: 12px 24px; border-radius: 8px; font-family: 'SFMono-Regular', Consolas, monospace;
    font-size: 1rem; background: var(--bgColor-inset); border: 1px solid var(--borderColor-default); color: var(--fgColor-accent);
    margin-bottom: 20px; letter-spacing: 0.5px; }

  /* ── Chart containers ── */
  .chart-container { margin-bottom: 8px; min-height: 280px; }

  /* ── 2×2 matrix ── */
  .matrix-grid { display: grid; grid-template-columns: auto 1fr 1fr; grid-template-rows: auto 1fr 1fr; gap: 0; margin-bottom: 24px; }
  .matrix-header { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--fgColor-muted); padding: 12px; text-align: center; }
  .matrix-row-header { writing-mode: vertical-lr; transform: rotate(180deg); }
  .matrix-cell { background: var(--bgColor-muted); border: 1px solid var(--borderColor-default); padding: 16px; border-radius: 6px;
    text-align: center; font-size: 0.85rem; color: var(--fgColor-muted); }
  .matrix-cell.highlight { background: var(--bgColor-accent-muted); border-color: var(--borderColor-accent-emphasis);
    color: var(--fgColor-default); font-weight: 600; }

  /* ── Summary cards (Section 8) ── */
  .summary-card { background: var(--bgColor-muted); border: 1px solid var(--borderColor-default); border-radius: 8px;
    padding: 24px; text-align: center; }
  .summary-card h3 { font-size: 1.2rem; font-weight: 600; margin: 0 0 8px; color: var(--fgColor-accent); }
  .summary-card p { margin: 0; font-size: 0.9rem; color: var(--fgColor-muted); line-height: 1.5; }

  /* ── Final statement ── */
  .final-statement { text-align: center; padding: 40px 24px; margin-top: 16px;
    border-top: 1px solid var(--borderColor-muted); }
  .final-statement p { font-size: 1.05rem; color: var(--fgColor-default); max-width: 680px; margin: 0 auto;
    line-height: 1.6; font-style: italic; }

  /* ── Intent chain ── */
  .intent-chain { display: flex; align-items: center; justify-content: center; gap: 0; margin: 24px 0; flex-wrap: wrap; }
  .intent-step { padding: 8px 14px; font-size: 0.8rem; font-weight: 500; color: var(--fgColor-muted);
    background: var(--bgColor-muted); border: 1px solid var(--borderColor-default); position: relative; }
  .intent-step:first-child { border-radius: 6px 0 0 6px; }
  .intent-step:last-child { border-radius: 0 6px 6px 0; }
  .intent-step.dim { opacity: 0.45; }
  .intent-step.lit { color: var(--fgColor-accent); background: var(--bgColor-accent-muted); border-color: var(--borderColor-accent-emphasis); font-weight: 600; }
  .intent-arrow { padding: 0 2px; color: var(--fgColor-muted); font-size: 0.85rem; }
  .intent-label { font-size: 0.75rem; text-align: center; margin-top: 6px; color: var(--fgColor-muted); font-style: italic; }

  /* ── Flow indicator ── */
  .flow-bar { display: flex; align-items: center; justify-content: center; gap: 0; margin: 20px 0 32px;
    flex-wrap: wrap; }
  .flow-step { padding: 6px 16px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    background: var(--bgColor-muted); border: 1px solid var(--borderColor-default); color: var(--fgColor-muted); }
  .flow-step:first-child { border-radius: 6px 0 0 6px; }
  .flow-step:last-child { border-radius: 0 6px 6px 0; }
  .flow-step.active { background: var(--bgColor-accent-muted); border-color: var(--borderColor-accent-emphasis); color: var(--fgColor-accent); }
  .flow-arrow { padding: 0 2px; color: var(--fgColor-muted); font-size: 0.9rem; }

  /* ── Before/after table ── */
  .ba-table th.before { color: var(--fgColor-muted); }
  .ba-table th.after { color: #3fb950; }
  .ba-table td.delta { color: #3fb950; font-weight: 600; }
  .ba-table td.delta-neutral { color: var(--fgColor-muted); }

  /* ── Responsive ── */
  @media (max-width: 680px) {
    .demo-page { padding: 24px 16px 48px; }
    .page-title { font-size: 1.5rem; }
    .comparison-grid { grid-template-columns: 1fr; }
    .metric-cards.cols-4 { grid-template-columns: repeat(2, 1fr); }
    .metric-cards.cols-3 { grid-template-columns: 1fr; }
  }

  /* ── Highcharts ── */
  .highcharts-background { fill: transparent !important; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">

/* ═══════════════════════════════════════════════════════
   HIGHCHARTS DARK THEME
   ═══════════════════════════════════════════════════════ */
Highcharts.setOptions({
  chart: { backgroundColor: 'transparent', style: { fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif' } },
  colors: ['#58a6ff','#3fb950','#d29922','#f85149','#bc8cff','#f778ba','#79c0ff','#56d364'],
  title: { style: { color: '#e6edf3', fontSize: '14px', fontWeight: '600' } },
  subtitle: { style: { color: '#8b949e', fontSize: '12px' } },
  xAxis: { labels: { style: { color: '#8b949e' } }, gridLineColor: '#30363d', lineColor: '#30363d', tickColor: '#30363d' },
  yAxis: { labels: { style: { color: '#8b949e' } }, gridLineColor: '#30363d', title: { style: { color: '#8b949e' } } },
  legend: { itemStyle: { color: '#e6edf3' }, itemHoverStyle: { color: '#58a6ff' } },
  tooltip: { backgroundColor: '#161b22', borderColor: '#30363d', style: { color: '#e6edf3' } },
  plotOptions: { series: { animation: { duration: 600 } } },
  credits: { enabled: false },
});

/* ═══════════════════════════════════════════════════════
   STATIC DATA
   ═══════════════════════════════════════════════════════ */
const DEMO_DATA = {
  summary: {
    totalDeveloperHours: 5000,
    modeledDeveloperHours: 3850,
    modeledHoursPercent: 0.77,
    areasModeled: 6,
    largestCapacityArea: 'AI-Assisted Coding',
    combinedLeverageBefore: 0.30,
    combinedLeverageAfter: 0.38,
    projectedSavingsHours: 420,
  },
  areas: [
    { area: 'AI-Assisted Coding',            hours: 1200, attempts: 670, completions: 480, desc: 'AI-assisted PR merged',                   yield: 0.72, leverage: 0.40, efficiencyGain: 0.28, structuralGain: 0.16, leverageDelta: 0.08 },
    { area: 'PR Review',                      hours:  900, attempts: 353, completions: 300, desc: 'Review completed',                         yield: 0.85, leverage: 0.33, efficiencyGain: 0.10, structuralGain: 0.18, leverageDelta: 0.04 },
    { area: 'Vulnerability Remediation',      hours:  700, attempts: 233, completions: 140, desc: 'Vulnerability resolved',                   yield: 0.60, leverage: 0.20, efficiencyGain: 0.08, structuralGain: 0.30, leverageDelta: 0.07 },
    { area: 'Test/CI Execution',              hours:  500, attempts: 400, completions: 340, desc: 'Successful test or CI execution',           yield: 0.85, leverage: 0.68, efficiencyGain: 0.12, structuralGain: 0.22, leverageDelta: 0.06 },
    { area: 'Agentic Coding',                 hours:  300, attempts:  95, completions:  60, desc: 'Copilot-authored PR completed',             yield: 0.63, leverage: 0.20, efficiencyGain: 0.18, structuralGain: 0.22, leverageDelta: 0.05 },
    { area: 'Creating CI/CD/etc Automation',  hours:  250, attempts:  80, completions:  50, desc: 'Reusable automation created or improved',   yield: 0.63, leverage: 0.20, efficiencyGain: 0.10, structuralGain: 0.38, leverageDelta: 0.09 },
  ],
  beforeAfter: {
    before: { modeledHours: 3850, validCompletions: 1155, averageYield: 0.69, combinedLeverage: 0.30 },
    after:  { modeledHours: 3850, validCompletions: 1463, averageYield: 0.76, combinedLeverage: 0.38, projectedSavingsHours: 420 },
  },
};

const AREA_COLORS = ['#58a6ff','#3fb950','#d29922','#f85149','#bc8cff','#f778ba'];

/* ═══════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════ */
const fmt = (n, d = 0) => n == null ? '—' : n.toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d });
const pct = (n) => n == null ? '—' : (n * 100).toFixed(0) + '%';

/* ═══════════════════════════════════════════════════════
   REUSABLE COMPONENTS
   ═══════════════════════════════════════════════════════ */

function NarrativeSection({ number, title, explanation, activeStep, children }) {
  return React.createElement('section', { className: 'narrative-section' },
    React.createElement('div', { className: 'section-number' }, `Section ${number}`),
    React.createElement('h2', { className: 'section-title' }, title),
    explanation && React.createElement('p', { className: 'section-explanation' }, explanation),
    activeStep != null && React.createElement(FlowBar, { active: activeStep }),
    children
  );
}

function FlowBar({ active }) {
  const steps = ['Hours', 'Completions', 'Yield', 'Leverage', 'Decision Signal'];
  return React.createElement('div', { className: 'flow-bar' },
    ...steps.flatMap((s, i) => {
      const isActive = i === active;
      const els = [React.createElement('div', {
        key: s,
        className: `flow-step${isActive ? ' active' : ''}`,
        style: isActive ? { fontWeight: 700, fontSize: '0.85rem' } : {},
      }, s)];
      if (i < steps.length - 1) els.push(React.createElement('span', { key: 'a' + i, className: 'flow-arrow' }, '→'));
      return els;
    })
  );
}

function MetricCard({ value, label, className = '' }) {
  const isText = typeof value === 'string' && value.length > 6;
  return React.createElement('div', { className: `metric-card ${className}` },
    React.createElement('div', { className: `metric-value${isText ? ' text-value' : ''}` }, value),
    React.createElement('div', { className: 'metric-label' }, label),
  );
}

function TakeawayCallout({ text }) {
  return React.createElement('div', { className: 'takeaway' },
    React.createElement('p', null, text)
  );
}

/* ═══════════════════════════════════════════════════════
   CHART HOOKS
   ═══════════════════════════════════════════════════════ */

function useChart(renderFn, deps) {
  const ref = React.useRef(null);
  const chartRef = React.useRef(null);
  React.useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = renderFn(ref.current);
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, deps);
  return ref;
}

/* ═══════════════════════════════════════════════════════
   SECTION 1: WHY ACTIVITY METRICS ARE NOT ENOUGH
   ═══════════════════════════════════════════════════════ */

function Section1() {
  const intentSteps = ['Intent', 'Decisions', 'Activity', 'Usage', 'Output'];

  const traditional = [
    { icon: '📊', text: 'Activity counts' },
    { icon: '📈', text: 'Usage trends' },
    { icon: '📦', text: 'Output volume' },
    { icon: '⚡', text: 'Local productivity' },
    { icon: '📋', text: 'Status reporting' },
  ];
  const leverage = [
    { icon: '🎯', text: 'Capacity allocation' },
    { icon: '✅', text: 'Valid completions' },
    { icon: '📐', text: 'Yield' },
    { icon: '🔗', text: 'Leverage' },
    { icon: '💡', text: 'Decision signal' },
  ];

  return React.createElement(NarrativeSection, {
    number: 1,
    title: 'From Intent to Value',
    explanation: 'Organizations intend to spend developer time in valuable ways. That intention leads to decisions, which lead to activity, usage, and output. The question is whether we can trace that chain — from intent to value — or only see disconnected snapshots at the end.',
  },
    React.createElement('p', { style: { fontSize: '0.9rem', color: 'var(--fgColor-muted)', lineHeight: 1.6, marginBottom: 8 } },
      'Every developer hour starts with an intent to create value. But most measurement systems only capture what happens at the tail end of that chain:'),

    React.createElement('div', null,
      React.createElement('div', { className: 'intent-chain' },
        ...intentSteps.flatMap((s, i) => {
          const isTraditional = i >= 2;
          const els = [React.createElement('div', { key: s, className: `intent-step${isTraditional ? ' dim' : ' lit'}` }, s)];
          if (i < intentSteps.length - 1) els.push(React.createElement('span', { key: 'a' + i, className: 'intent-arrow' }, '→'));
          return els;
        })
      ),
      React.createElement('p', { className: 'intent-label' }, '← Traditional dashboards only see this end'),
    ),

    React.createElement('div', null,
      React.createElement('div', { className: 'intent-chain' },
        ...intentSteps.flatMap((s, i) => {
          const els = [React.createElement('div', { key: s, className: 'intent-step lit' }, s)];
          if (i < intentSteps.length - 1) els.push(React.createElement('span', { key: 'a' + i, className: 'intent-arrow' }, '→'));
          return els;
        })
      ),
      React.createElement('p', { className: 'intent-label' }, 'Leverage view: systematic intent → value conversion'),
    ),

    React.createElement('div', { className: 'comparison-grid', style: { marginTop: 28 } },
      React.createElement('div', { className: 'comparison-col' },
        React.createElement('h3', null, 'Traditional View'),
        React.createElement('p', { style: { fontSize: '0.85rem', color: 'var(--fgColor-muted)', margin: '0 0 12px', fontStyle: 'italic' } }, 'What happened?'),
        ...traditional.map(t => React.createElement('div', { key: t.text, className: 'comparison-item' },
          React.createElement('span', { className: 'comparison-icon' }, t.icon), t.text))
      ),
      React.createElement('div', { className: 'comparison-col highlight' },
        React.createElement('h3', null, 'Leverage View'),
        React.createElement('p', { style: { fontSize: '0.85rem', color: 'var(--fgColor-accent)', margin: '0 0 12px', fontStyle: 'italic' } },
          'Did our decisions improve the value created per developer hour?'),
        ...leverage.map(t => React.createElement('div', { key: t.text, className: 'comparison-item' },
          React.createElement('span', { className: 'comparison-icon' }, t.icon), t.text))
      ),
    ),
    React.createElement(TakeawayCallout, { text: 'Instead of disconnected snapshots of activity, usage, and output, we can look systematically at intent-to-value conversion: how capacity is allocated, what it produces, and whether decisions are making each developer hour more valuable.' })
  );
}

/* ═══════════════════════════════════════════════════════
   SECTION 2: AREAS OF IMPROVEMENT
   ═══════════════════════════════════════════════════════ */

function Section2() {
  const { areas, summary } = DEMO_DATA;
  const totalHours = areas.reduce((s, a) => s + a.hours, 0);

  const chartRef = useChart((el) => {
    return Highcharts.chart(el, {
      chart: { type: 'bar', height: 280, marginRight: 20 },
      title: { text: 'Developer Hours by Area of Improvement' },
      xAxis: { categories: areas.map(a => a.area), lineWidth: 0, tickWidth: 0 },
      yAxis: { title: { text: 'Hours' }, gridLineWidth: 1, maxPadding: 0.15 },
      legend: { enabled: false },
      plotOptions: { bar: { borderWidth: 0, borderRadius: 3, dataLabels: { enabled: true, format: '{y:,.0f} hrs', style: { color: '#8b949e', fontSize: '11px', fontWeight: '400', textOutline: 'none' } } } },
      series: [{ name: 'Hours', data: areas.map((a, i) => ({ y: a.hours, color: AREA_COLORS[i] })) }],
      tooltip: { pointFormat: '<b>{point.y:,.0f}</b> developer hours' },
    });
  }, []);

  return React.createElement(NarrativeSection, {
    number: 2,
    title: 'Work Is Modeled as Areas That Produce Useful Outcomes',
    explanation: 'Each area of improvement consumes developer hours and is modeled as producing a specific kind of useful outcome — a completion. Before we can understand improvement, we need to understand where developer capacity is going and what it produces.',
    activeStep: 0,
  },
