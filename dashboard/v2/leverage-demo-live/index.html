<!DOCTYPE html>
<html lang="en" data-color-mode="dark" data-dark-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BVE — Leverage in Practice</title>

<!-- Primer CSS -->
<link rel="stylesheet" href="https://unpkg.com/@primer/css@21.3.1/dist/primer.css">

<!-- Highcharts -->
<script src="https://cdn.jsdelivr.net/npm/highcharts@11.4.8/highcharts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highcharts@11.4.8/highcharts-more.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highcharts@11.4.8/modules/accessibility.js"></script>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  html { scroll-behavior: smooth; }
  body { background: var(--bgColor-default); }

  .demo-page { max-width: 1200px; margin: 0 auto; padding: 48px 24px 80px; }

  .page-header { text-align: center; margin-bottom: 48px; padding-bottom: 32px; border-bottom: 1px solid var(--borderColor-muted); }
  .page-title { font-size: 2rem; font-weight: 700; color: var(--fgColor-default); margin: 0 0 8px; }
  .page-subtitle { font-size: 1rem; color: var(--fgColor-muted); margin: 0 auto; max-width: 640px; line-height: 1.5; }

  .live-badge { display: inline-block; padding: 3px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 600;
    background: var(--bgColor-success-muted); color: var(--fgColor-success); border: 1px solid var(--borderColor-success-muted);
    margin-bottom: 16px; letter-spacing: 0.3px; text-transform: uppercase; }

  .narrative-section { margin-bottom: 56px; }
  .section-number { font-size: 0.75rem; font-weight: 600; color: var(--fgColor-accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .section-title { font-size: 1.4rem; font-weight: 600; color: var(--fgColor-default); margin: 0 0 8px; }
  .section-intro { font-size: 0.9rem; color: var(--fgColor-muted); line-height: 1.6; margin-bottom: 8px; max-width: 780px; }
  .section-source { font-size: 0.75rem; color: var(--fgColor-muted); font-style: italic; margin-bottom: 16px; }
  .section-insight { border-left: 3px solid var(--borderColor-accent-emphasis); padding: 12px 16px;
    background: var(--bgColor-accent-muted); border-radius: 0 6px 6px 0; margin-top: 16px; }
  .section-insight p { margin: 0; font-size: 0.85rem; color: var(--fgColor-default); line-height: 1.4; font-style: italic; }

  .kpi-card { text-align: center; }
  .kpi-value { font-size: 2rem; font-weight: 600; line-height: 1.2; }
  .kpi-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-sub { font-size: 0.75rem; }
  .kpi-unit { font-size: 1.1rem; font-weight: 400; opacity: 0.65; margin-left: 2px; }
  .kpi-hero { border-top: 3px solid var(--borderColor-accent-emphasis); }
  .kpi-hero .kpi-value { font-size: 3rem; }
  .kpi-hero .kpi-label { font-size: 0.85rem; }
  .kpi-hero .kpi-sub { font-size: 0.85rem; }

  .evidence-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  .evidence-table th { text-align: left; padding: 6px 8px; border-bottom: 2px solid var(--borderColor-default); color: var(--fgColor-muted); font-weight: 600; white-space: nowrap; }
  .evidence-table td { padding: 5px 8px; border-bottom: 1px solid var(--borderColor-muted); }
  .evidence-table select { background: var(--bgColor-muted); color: var(--fgColor-default); border: 1px solid var(--borderColor-default); border-radius: 4px; padding: 2px 4px; font-size: 0.8rem; max-width: 150px; }
  .cell-sublabel { display: block; font-size: 0.7rem; color: var(--fgColor-muted); font-weight: 400; margin-top: 1px; }
  .wip-growing { color: #d29922; }
  .wip-shrinking { color: #3fb950; }
  .wip-neutral { color: var(--fgColor-muted); }

  .time-window-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.8rem; background: var(--bgColor-accent-muted); color: var(--fgColor-accent); border: 1px solid var(--borderColor-accent-emphasis); }

  .mode-toggle { display: inline-flex; border: 1px solid var(--borderColor-default); border-radius: 6px; overflow: hidden; }
  .mode-toggle button {
    padding: 4px 16px; font-size: 0.85rem; border: none; cursor: pointer;
    background: var(--bgColor-muted); color: var(--fgColor-muted); transition: all 0.15s;
  }
  .mode-toggle button + button { border-left: 1px solid var(--borderColor-default); }
  .mode-toggle button.active { background: var(--bgColor-accent-muted); color: var(--fgColor-accent); font-weight: 600; }

  .rect-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 800px) { .rect-pair { grid-template-columns: 1fr; } }

  .config-panel { background: var(--bgColor-muted); border: 1px solid var(--borderColor-default); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .config-panel label { font-size: 0.8rem; color: var(--fgColor-muted); display: block; margin-bottom: 4px; }
  .config-panel input { background: var(--bgColor-inset); color: var(--fgColor-default); border: 1px solid var(--borderColor-default); border-radius: 4px; padding: 4px 8px; font-size: 0.85rem; width: 120px; }
  .config-row { display: flex; flex-wrap: wrap; gap: 16px; align-items: end; }

  .estimate-card { border: 1px solid var(--borderColor-default); border-radius: 8px; padding: 12px 16px; cursor: pointer; transition: border-color 0.15s; }
  .estimate-card.selected { border-width: 2px; }
  .estimate-card .est-label { font-size: 0.75rem; color: var(--fgColor-muted); font-weight: 600; margin-bottom: 4px; }
  .estimate-card .est-value { font-size: 1.6rem; font-weight: 700; line-height: 1.2; }

  .loading { text-align: center; padding: 80px 0; color: var(--fgColor-muted); font-size: 1.1rem; }

  .highcharts-background { fill: transparent !important; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">

/* ═══════════════════════════════════════════════════════
   HIGHCHARTS DARK THEME
   ═══════════════════════════════════════════════════════ */
Highcharts.setOptions({
  chart: { backgroundColor: 'transparent', style: { fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif' } },
  colors: ['#58a6ff','#3fb950','#d29922','#f85149','#bc8cff','#f778ba'],
  title: { style: { color: '#e6edf3', fontSize: '14px', fontWeight: '600' } },
  subtitle: { style: { color: '#8b949e', fontSize: '12px' } },
  xAxis: { labels: { style: { color: '#8b949e' } }, gridLineColor: '#30363d', lineColor: '#30363d', tickColor: '#30363d' },
  yAxis: { labels: { style: { color: '#8b949e' } }, gridLineColor: '#30363d', title: { style: { color: '#8b949e' } } },
  legend: { itemStyle: { color: '#e6edf3' }, itemHoverStyle: { color: '#58a6ff' } },
  tooltip: { backgroundColor: '#161b22', borderColor: '#30363d', style: { color: '#e6edf3' } },
  plotOptions: { series: { animation: { duration: 600 } } },
  credits: { enabled: false },
});

/* ═══════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════ */
function safeDiv(a, b) { return b > 0 ? a / b : null; }
const fmt = (n) => n == null ? '—' : Math.round(n).toLocaleString();
const fmtDec = (n, d = 2) => n == null ? '—' : n.toFixed(d);
const fmtPct = (n) => n == null ? '—' : (n * 100).toFixed(1) + '%';
const fmtCompact = (n) => n == null ? '—' : n >= 1e6 ? (n / 1e6).toFixed(1) + 'M' : n >= 1e3 ? (n / 1e3).toFixed(1) + 'K' : Math.round(n).toLocaleString();

const ELEMENT_COLORS = {
  'ai-assisted-coding': { color: '#58a6ff', bg: 'rgba(88,166,255,0.18)' },
  'agentic-ai-coding':  { color: '#3fb950', bg: 'rgba(63,185,80,0.18)' },
};

const fmtCurrency = n => {
  if (n == null) return '—';
  if (Math.abs(n) >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'k';
  return '$' + Number(n).toLocaleString(undefined, { maximumFractionDigits: 0 });
};
const fmtShortDate = d => {
  if (!d) return '—';
  const dt = new Date(d + 'T12:00:00Z');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' });
};

function wipLabel(row) {
  const wp = row.wipPlus ?? 0;
  const wm = row.wipMinus ?? 0;
  const delta = row.wipDelta ?? (wp - wm);
  if (delta == null && wp === 0 && wm === 0) return { text: '—', cls: 'wip-neutral', sub: '' };
  const sign = delta > 0 ? '+' : delta < 0 ? '' : '';
  const cls = delta > 0 ? 'wip-growing' : delta < 0 ? 'wip-shrinking' : 'wip-neutral';
  return { text: `${sign}${fmt(delta)}`, cls, sub: `WIP+ ${fmt(wp)} / WIP− ${fmt(wm)}` };
}

const MODES = [
  { key: 'current', label: 'Current' },
  { key: 'unimproved', label: 'Unimproved' },
  { key: 'composite', label: 'Current Composite' },
  { key: 'projected', label: 'Projected' },
];
const MODE_DESCRIPTIONS = {
  current: 'Current modeled leverage for each element, shown against total organizational capacity.',
  unimproved: 'Counterfactual: AI-assisted time saved is added back to dev-hours. Agentic capacity would not exist without the agent.',
  composite: 'Current modeled leverage rectangles for each element only, without org capacity reference.',
  projected: 'Projects current leverage using the selected projection for each element.',
};

/* ═══════════════════════════════════════════════════════
   DATA LOADING
   ═══════════════════════════════════════════════════════ */
async function fetchLeverageSummary() {
  const bases = ['../../dataflow/data/', '../dataflow/data/'];
  for (const base of bases) {
    try {
      const r = await fetch(base + 'pipeline-manifest.json');
      if (!r.ok) continue;
      const manifest = await r.json();
      const artFile = (manifest.artifacts || []).find(f => f.startsWith('leverage-summary'));
      if (!artFile) continue;
      const art = await fetch(base + 'materialized/' + artFile).then(r => r.ok ? r.json() : null);
      if (art) return art;
    } catch(e) {}
  }
  return null;
}

async function fetchConfig() {
  try {
    const r = await fetch('./data/config.json');
    if (r.ok) return await r.json();
  } catch(e) {}
  return {};
}

/* ═══════════════════════════════════════════════════════
   REUSABLE COMPONENTS
   ═══════════════════════════════════════════════════════ */

function NarrativeSection({ number, title, intro, source, children, insight }) {
  return (
    <section className="narrative-section">
      <div className="section-number">Section {number}</div>
      <h2 className="section-title">{title}</h2>
      {intro && <p className="section-intro">{intro}</p>}
      {source && <p className="section-source">Source: {source}</p>}
      {children}
      {insight && <div className="section-insight"><p>{insight}</p></div>}
    </section>
  );
}

function KpiCard({ label, value, sub, unit, hero, color }) {
  return (
    <div className={`Box p-3 kpi-card${hero ? ' kpi-hero' : ''}`}>
      <div className="kpi-label color-fg-muted mb-1">{label}</div>
      <div className="kpi-value" style={color ? { color } : {}}>
        {value}{unit && <span className="kpi-unit">{unit}</span>}
      </div>
      {sub && <div className="kpi-sub color-fg-muted mt-1">{sub}</div>}
    </div>
  );
}

function useChart(renderFn, deps) {
  const ref = React.useRef(null);
  const chartRef = React.useRef(null);
  React.useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = renderFn(ref.current);
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, deps);
  return ref;
}

/* ═══════════════════════════════════════════════════════
   SECTION 1: EVIDENCE & LEVERAGE TABLE
   ═══════════════════════════════════════════════════════ */
function Section1({ elements, recomputeRow, selections, onSelectionChange }) {
  const rows = elements.map(el => {
    const sel = selections[el.elementKey] || {};
    return recomputeRow(el, sel.estimateId, sel.projectionId);
  });

  return (
    <NarrativeSection number={1} title="The Full Chain in One View"
      intro="The Evidence & Leverage table traces every area from raw capacity through attempts, completions, yield, and leverage — all the way to projected savings. This is the intent-to-value chain made visible."
      source="Integrated Leverage Dashboard (v2)"
      insight="Each row is a complete leverage story: hours consumed → work attempted → valid completions produced → yield rate → leverage ratio → projected improvement. The estimate and projection selectors let you test different assumptions.">
      <div className="Box mb-3" style={{ overflowX: 'auto' }}>
        <table className="evidence-table">
          <thead>
            <tr>
              <th>Area</th>
              <th>Attempts</th>
              <th>Completions</th>
              <th>WIP Δ</th>
              <th>Time Spent</th>
              <th>Time Saved</th>
              <th>Yield</th>
              <th>Leverage</th>
              <th>Proj. Savings</th>
              <th>Proj. Completions</th>
              <th>Proj. Yield</th>
              <th>Mode</th>
              <th>Estimate</th>
              <th>Projection</th>
            </tr>
          </thead>
          <tbody>
            {elements.map((el, i) => {
              const r = rows[i];
              const sel = selections[el.elementKey] || {};
              const elColor = (ELEMENT_COLORS[el.elementKey] || {}).color || '#8b949e';
              const wip = wipLabel(r);
              return (
                <tr key={el.elementKey}>
                  <td style={{ fontWeight: 600, color: elColor }}>{r.area}</td>
                  <td>
                    {fmt(r.attempts)}
                    <span className="cell-sublabel">{r.attemptType || ''}</span>
                  </td>
                  <td>
                    {fmt(r.completionCount)}
                    <span className="cell-sublabel">{r.completionType || ''}</span>
                  </td>
                  <td className={wip.cls}>
                    {wip.text}
                    <span className="cell-sublabel">{wip.sub}</span>
                  </td>
                  <td>
                    {fmt(r.timeSpentHours)}<span className="color-fg-muted"> hrs</span>
                    {r.timeSpentBasis && <span className="cell-sublabel">{r.timeSpentBasis}</span>}
                  </td>
                  <td style={{ color: '#3fb950' }}>
                    {fmt(r.timeSavedHours)}<span className="color-fg-muted"> hrs</span>
                    {r.estimateName && <span className="cell-sublabel">{r.estimateName}</span>}
                  </td>
                  <td>
                    {fmtPct(r.currentYield)}
                    <span className="cell-sublabel">completions / attempts</span>
                  </td>
                  <td>
                    {fmtDec(r.leverage, 3)}
                    <span className="cell-sublabel">completions / dev-hrs</span>
                  </td>
                  <td>{r.projTimeSavedHours != null ? fmt(r.projTimeSavedHours) + ' hrs' : '—'}</td>
                  <td>{r.projCompletionGain != null ? '+' + fmt(r.projCompletionGain) : '—'}</td>
                  <td>{r.projYield != null ? fmtPct(r.projYield) : '—'}</td>
                  <td className="color-fg-muted" style={{ fontSize: '0.75rem' }}>{r.modeNote}</td>
                  <td onClick={e => e.stopPropagation()}>
                    <select value={sel.estimateId || ''} onChange={e => onSelectionChange(el.elementKey, 'estimateId', e.target.value)}>
                      {el.worksheet.improvementEstimates.map(est => <option key={est.estimateId} value={est.estimateId}>{est.name}</option>)}
                    </select>
                  </td>
                  <td onClick={e => e.stopPropagation()}>
                    <select value={sel.projectionId || ''} onChange={e => onSelectionChange(el.elementKey, 'projectionId', e.target.value)}
                      disabled={el.worksheet.projectedImprovements.length === 0}>
                      {el.worksheet.projectedImprovements.length === 0
                        ? <option value="">none</option>
                        : el.worksheet.projectedImprovements.map(p => <option key={p.projectionId} value={p.projectionId}>{p.name}</option>)}
                    </select>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </NarrativeSection>
  );
}

/* ═══════════════════════════════════════════════════════
   SECTION 2: APERTURE KPIs
   ═══════════════════════════════════════════════════════ */
function Section2({ elements, rows, config }) {
  const timeWindow = elements?.[0]?.worksheet?.timeWindow || { label: 'Previous 28 Days', days: 28 };
  const windowDays = timeWindow.days || 28;
  const totalDevs = config.cfg_total_developers || 100;
  const hrsPerDay = config.cfg_hrs_per_dev_per_day || 8;
  const totalOrgDevHours = totalDevs * windowDays * hrsPerDay;
  const modeledHours = rows.reduce((s, r) => s + (r.timeSpentHours || 0), 0);
  const totalHoursSaved = rows.reduce((s, r) => s + (r.timeSavedHours || 0), 0);
  const aperture = safeDiv(modeledHours, totalOrgDevHours);
  const laborCost = config.cfg_labor_cost_per_hour;
  const economicValue = laborCost != null ? totalHoursSaved * laborCost : null;

  return (
    <NarrativeSection number={2} title="Where Is Developer Capacity Going?"
      intro="Before we can understand improvement, we need to understand the aperture — how much total capacity is represented and how it breaks down across areas."
      source="Integrated Leverage Dashboard (v2)"
      insight="Aperture shows what fraction of total org capacity the dashboard can see. A narrow aperture means most developer hours are outside the measurement system.">

      <div className="d-flex flex-items-center flex-wrap mb-3" style={{ gap: '8px' }}>
        <span className="time-window-badge">⏱ Time Window: {timeWindow.label}</span>
        {elements.map(el => {
          const dr = el.worksheet?.dateRange;
          if (!dr) return null;
          return (
            <span key={el.elementKey} className="f6 color-fg-muted">
              {el.row.area}: {fmtShortDate(dr.first)} → {fmtShortDate(dr.last)} ({dr.days}d)
            </span>
          );
        })}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(170px, 1fr))', gap: '12px' }}>
        <KpiCard label="Org Capacity" value={fmtCompact(totalOrgDevHours)} unit="hrs"
          sub={`${totalDevs} devs × ${windowDays}d × ${hrsPerDay}h`} />
        <KpiCard label="Modeled Dev-Hours" value={fmtCompact(modeledHours)} unit="hrs"
          sub="observed across elements" color="#58a6ff" />
        <KpiCard label="Aperture" value={fmtPct(aperture)}
          sub="modeled / org capacity" color="#d29922" />
        <KpiCard label="Total Hours Saved" value={fmtDec(totalHoursSaved, 0)} unit="hrs"
          sub="AI-assisted + agentic" color="#3fb950" />
        <KpiCard label="Economic Value"
          value={economicValue != null ? fmtCurrency(economicValue) : '—'}
          sub={economicValue != null ? `at $${laborCost}/hr` : 'set cfg_labor_cost_per_hour in config'}
          color={economicValue != null ? '#d29922' : undefined} />
      </div>
    </NarrativeSection>
  );
}

/* ═══════════════════════════════════════════════════════
   SECTION 3: COMPLETIONS — JTBD + CONFIG
   ═══════════════════════════════════════════════════════ */
function Section3({ elements, rows, config, onConfigChange }) {
  return (
    <NarrativeSection number={3} title="What Counts as a Completion?"
      intro="Each area defines its own completion — a PR merged, a review completed, a vulnerability resolved. The config panel sets organizational parameters used across all calculations."
      source="Element Dashboards (v2) — Job to Be Done definitions"
      insight="Defining completions explicitly prevents apples-to-oranges comparisons. The config panel (total developers, coding time %) feeds into every calculation on this page.">

      <div className="config-panel">
        <div className="f6 color-fg-muted text-bold mb-2">⚙️ Configuration</div>
        <div className="config-row">
          <div>
            <label>Total Developers</label>
            <input type="number" value={config.cfg_total_developers || ''} onChange={e => onConfigChange('cfg_total_developers', parseInt(e.target.value) || 0)} />
          </div>
          <div>
            <label>% Time Coding</label>
            <input type="number" step="0.05" value={config.cfg_pct_time_coding || ''} onChange={e => onConfigChange('cfg_pct_time_coding', parseFloat(e.target.value) || 0)} />
          </div>
          <div>
            <label>Est Hrs / KLoC</label>
            <input type="number" step="0.5" value={config.est_hrs_per_kloc || ''} onChange={e => onConfigChange('est_hrs_per_kloc', parseFloat(e.target.value) || 0)} />
          </div>
          <div>
            <label>Est Duration Factor</label>
            <input type="number" step="0.5" value={config.est_duration_factor || ''} onChange={e => onConfigChange('est_duration_factor', parseFloat(e.target.value) || 0)} />
          </div>
        </div>
      </div>

      <div className="d-flex flex-wrap" style={{ gap: 16 }}>
        {elements.map((el, i) => {
          const r = rows[i];
          const defs = el.worksheet?.definitions || {};
          const elColor = (ELEMENT_COLORS[el.elementKey] || {}).color || '#8b949e';
          return (
            <div key={el.elementKey} className="Box p-3" style={{ flex: '1 1 300px', borderLeft: `3px solid ${elColor}` }}>
              <div className="f5 text-bold mb-2" style={{ color: elColor }}>{r.area}</div>
              <table style={{ width: '100%', fontSize: '0.8rem', borderCollapse: 'collapse' }}>
                <tbody>
                  <tr><td className="color-fg-muted" style={{ padding: '4px 8px 4px 0', fontWeight: 600 }}>Job to Be Done</td>
                    <td style={{ padding: '4px 0' }}>{defs.jobToBeDone || '—'}</td></tr>
                  <tr><td className="color-fg-muted" style={{ padding: '4px 8px 4px 0', fontWeight: 600 }}>Completion</td>
                    <td style={{ padding: '4px 0' }}>{defs.completion || r.completionType || '—'}</td></tr>
                  <tr><td className="color-fg-muted" style={{ padding: '4px 8px 4px 0', fontWeight: 600 }}>Job Class</td>
                    <td style={{ padding: '4px 0' }}>{defs.jobClass || '—'}</td></tr>
                  <tr><td className="color-fg-muted" style={{ padding: '4px 8px 4px 0', fontWeight: 600 }}>Attempts</td>
                    <td style={{ padding: '4px 0' }}>{fmt(r.attempts)} {r.attemptType}</td></tr>
                  <tr><td className="color-fg-muted" style={{ padding: '4px 8px 4px 0', fontWeight: 600 }}>Completions</td>
                    <td style={{ padding: '4px 0', color: '#3fb950' }}>{fmt(r.completionCount)} {r.completionType}</td></tr>
                </tbody>
              </table>
            </div>
          );
        })}
      </div>
    </NarrativeSection>
  );
}

/* ═══════════════════════════════════════════════════════
   SECTION 4: YIELD — MERGE RATE DONUT
   ═══════════════════════════════════════════════════════ */
function Section4({ elements, rows }) {
  return (
    <NarrativeSection number={4} title="Yield — How Much Activity Becomes Valid Completion?"
      intro="Yield is the ratio of valid completions to attempts. This donut chart from the Agentic Element dashboard shows the merge rate — what percentage of agent-created PRs actually merged."
      source="Agentic Element Dashboard (v2) — Merge Rate donut"
      insight="A high number of attempts with low yield means wasted effort. Tracking yield separately from activity prevents inflating leverage with failed work.">
      <div className="d-flex flex-wrap" style={{ gap: 16, justifyContent: 'center' }}>
        {elements.map((el, i) => {
          const r = rows[i];
          const elColor = (ELEMENT_COLORS[el.elementKey] || {}).color || '#8b949e';
          return <YieldDonut key={el.elementKey} area={r.area} yield_={r.currentYield} color={elColor} attempts={r.attempts} completions={r.completionCount} />;
        })}
      </div>
    </NarrativeSection>
  );
}

function YieldDonut({ area, yield_, color, attempts, completions }) {
  const ref = useChart((el) => {
    const val = yield_ != null ? Math.min(yield_ * 100, 100) : 0;
    return Highcharts.chart(el, {
      chart: { type: 'pie', height: 200, margin: [0, 0, 40, 0] },
      title: { text: fmtPct(yield_), verticalAlign: 'middle', y: -12, style: { fontSize: '28px', fontWeight: '700', color: '#e6edf3' } },
      subtitle: { text: `${area}`, align: 'center', verticalAlign: 'bottom', y: -5, style: { fontSize: '11px' } },
      tooltip: { pointFormat: '<b>{point.percentage:.1f}%</b>' },
      plotOptions: { pie: { innerSize: '70%', borderWidth: 0, dataLabels: { enabled: false } } },
      series: [{ data: [{ name: 'Yield', y: val, color }, { name: 'Gap', y: Math.max(100 - val, 0), color: '#30363d' }] }],
    });
  }, [yield_, color]);

  return (
    <div style={{ flex: '0 1 220px', textAlign: 'center' }}>
      <div ref={ref} />
      <div style={{ fontSize: '0.75rem', color: 'var(--fgColor-muted)', marginTop: -4 }}>
        {fmt(completions)} completions / {fmt(attempts)} attempts
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   SECTION 5: LEVERAGE RECTANGLES — SIDE BY SIDE
   ═══════════════════════════════════════════════════════ */
function Section5({ elements, rows, selections, config }) {
  const [rectMode, setRectMode] = React.useState('current');

  const timeWindow = elements?.[0]?.worksheet?.timeWindow || { days: 28 };
  const windowDays = timeWindow.days || 28;
  const cfg = config || {};
  const totalDevs = cfg.cfg_total_developers || 100;
  const hrsPerDay = cfg.cfg_hrs_per_dev_per_day || 8;
  const totalOrgDevHours = totalDevs * windowDays * hrsPerDay;

  const rectData = React.useMemo(() => {
    return elements.map((el, i) => {
      const r = rows[i];
      const colors = ELEMENT_COLORS[el.elementKey] || { color: '#8b949e', bg: 'rgba(139,148,158,0.18)' };
      const isAgentic = el.elementKey === 'agentic-ai-coding';
      let devHours, completions;
      if (rectMode === 'current' || rectMode === 'composite') {
        devHours = r.timeSpentHours || 0;
        completions = r.completionCount || 0;
      } else if (rectMode === 'unimproved') {
        if (isAgentic) { devHours = 0; completions = 0; }
        else { devHours = (r.timeSpentHours || 0) + (r.timeSavedHours || 0); completions = r.completionCount || 0; }
      } else {
        devHours = r.projTimeSavedHours != null ? r.projTimeSavedHours : (r.timeSpentHours || 0);
        completions = (r.completionCount || 0) + (r.projCompletionGain || 0);
      }
      return { name: r.area, devHours, completions, ...colors, isAgentic };
    });
  }, [elements, rows, rectMode]);

  const capacity = React.useMemo(() => {
    if (rectMode !== 'current' || windowDays === 0) return null;
    const totalCompletions = rectData.reduce((s, e) => s + e.completions, 0);
    return { devHours: totalOrgDevHours, completions: totalCompletions };
  }, [rectMode, windowDays, totalOrgDevHours, rectData]);

  const fixedScales = React.useMemo(() => {
    let maxW = 0, maxH = 0;
    for (const m of ['current', 'unimproved', 'composite', 'projected']) {
      let w = 0, h = 0;
      for (let i = 0; i < elements.length; i++) {
        const r = rows[i];
        const isAg = elements[i].elementKey === 'agentic-ai-coding';
        if (m === 'unimproved' && isAg) continue;
        const dh = m === 'unimproved' && !isAg ? (r.timeSpentHours || 0) + (r.timeSavedHours || 0)
          : m === 'projected' && r.projTimeSavedHours != null ? r.projTimeSavedHours
          : (r.timeSpentHours || 0);
        const c = m === 'projected' ? (r.completionCount || 0) + (r.projCompletionGain || 0) : (r.completionCount || 0);
        w += dh; h += c;
      }
      if (m === 'current' && windowDays > 0) w = Math.max(w, totalOrgDevHours);
      if (w > maxW) maxW = w;
      if (h > maxH) maxH = h;
    }
    return { fixedXMax: maxW > 0 ? maxW * 1.15 : 10, fixedYMax: maxH > 0 ? maxH * 1.15 : 10 };
  }, [elements, rows, totalOrgDevHours, windowDays]);

  const totalDevHours = rectData.reduce((s, e) => s + e.devHours, 0);
  const totalCompletions = rectData.reduce((s, e) => s + e.completions, 0);
  const integratedLeverage = safeDiv(totalCompletions, totalDevHours);
  const aperturePct = capacity ? safeDiv(totalDevHours, capacity.devHours) : null;

  const series = [];
  if (capacity && capacity.devHours > 0 && capacity.completions > 0) {
    series.push({
      type: 'polygon', name: 'Org Capacity',
      data: [[0,0],[capacity.devHours,0],[capacity.devHours,capacity.completions],[0,capacity.completions]],
      color: 'rgba(139,148,158,0.06)', lineWidth: 2, lineColor: '#8b949e', dashStyle: 'ShortDash',
      enableMouseTracking: true,
      tooltip: { headerFormat: '', pointFormat: `<b>Org Capacity</b><br/>Dev-Hours: ${fmtCompact(capacity.devHours)}<br/>Aperture: ${fmtPct(aperturePct)}` },
    });
  }
  let xOffset = 0;
  for (const elem of rectData) {
    const w = elem.devHours, h = elem.completions;
    if (w > 0 && h > 0) {
      series.push({
        type: 'polygon', name: elem.name,
        data: [[xOffset,0],[xOffset+w,0],[xOffset+w,h],[xOffset,h]],
        color: elem.bg, lineWidth: 2, lineColor: elem.color,
        enableMouseTracking: true,
        tooltip: { headerFormat: '', pointFormat: `<b>${elem.name}</b><br/>Dev-Hours: ${fmtCompact(w)}<br/>Completions: ${fmtCompact(h)}<br/>Leverage: ${fmtDec(safeDiv(h,w),3)}` },
      });
    } else if (w === 0 && h === 0 && rectMode === 'unimproved' && elem.isAgentic) {
      series.push({
        type: 'scatter', name: `${elem.name} (zero)`,
        data: [{ x: xOffset, y: 0 }],
        color: elem.color,
        marker: { radius: 8, symbol: 'circle', lineWidth: 2, lineColor: elem.color, fillColor: 'rgba(63,185,80,0.3)' },
        tooltip: { headerFormat: '', pointFormat: `<b>${elem.name} (Counterfactual)</b><br/>Without the agent: 0 dev-hours, 0 completions.` },
      });
    }
    xOffset += w;
  }
  if (totalDevHours > 0 && totalCompletions > 0) {
    series.push({
      type: 'line', name: `Leverage = ${fmtDec(integratedLeverage, 3)}`,
      data: [[0,0],[totalDevHours, totalCompletions]],
      color: '#d29922', dashStyle: 'Dash', lineWidth: 2,
      marker: { enabled: true, radius: 5, symbol: 'circle' },
      enableMouseTracking: false,
    });
  }

  const chartRef = useChart((el) => {
    return Highcharts.chart(el, {
      chart: { type: 'scatter', height: 480 },
      title: { text: 'Integrated Leverage Rectangle' },
      xAxis: { title: { text: 'Dev-Hours', style: { fontSize: '13px', fontWeight: '600' } }, min: 0, max: fixedScales.fixedXMax, gridLineWidth: 1, labels: { formatter() { return fmtCompact(this.value); } } },
      yAxis: { title: { text: 'Completions', style: { fontSize: '13px', fontWeight: '600' } }, min: 0, max: fixedScales.fixedYMax, labels: { formatter() { return fmtCompact(this.value); } } },
      tooltip: { useHTML: true, headerFormat: '' },
      legend: { enabled: true, align: 'center', verticalAlign: 'bottom' },
      plotOptions: { series: { animation: { duration: 600 }, states: { inactive: { opacity: 0.6 } } } },
      series,
    });
  }, [rectData, capacity, rectMode, fixedScales]);

  return (
    <NarrativeSection number={5} title="Leverage Rectangles — Integrated View"
      intro="The leverage rectangle visualizes completions (height) against dev-hours (width). The integrated view stacks element rectangles side by side within the total org capacity. Switch modes to see counterfactual, composite, and projected views."
      source="Integrated Leverage Dashboard (v2) — Leverage Rectangle chart"
      insight="The mode toggle reveals different perspectives: Current shows elements within org capacity (aperture). Unimproved adds back time saved. Composite removes the org capacity reference. Projected shows the impact of structural improvements.">

      <div className="d-flex flex-items-center flex-wrap mb-3" style={{ gap: '12px' }}>
        <div className="mode-toggle">
          {MODES.map(m => (
            <button key={m.key} className={rectMode === m.key ? 'active' : ''} onClick={() => setRectMode(m.key)}>{m.label}</button>
          ))}
        </div>
        <span className="f6 color-fg-muted" style={{ fontStyle: 'italic' }}>{MODE_DESCRIPTIONS[rectMode]}</span>
      </div>

      <div className="d-flex flex-wrap mb-3" style={{ gap: '12px' }}>
        <div style={{ flex: '1 1 140px' }}>
          <KpiCard label="Total Dev-Hours" value={fmtCompact(totalDevHours)} sub="sum across elements" />
        </div>
        <div style={{ flex: '1 1 140px' }}>
          <KpiCard label="Total Completions" value={fmtCompact(totalCompletions)} sub="sum across elements" />
        </div>
        <div style={{ flex: '0 0 200px' }}>
          <KpiCard hero label="Integrated Leverage" value={fmtDec(integratedLeverage, 3)} sub="completions / dev-hours" color="#3fb950" />
        </div>
        {rectMode === 'current' && aperturePct != null && (
          <div style={{ flex: '1 1 140px' }}>
            <KpiCard label="Aperture" value={fmtPct(aperturePct)} sub="modeled / capacity" color="#d29922" />
          </div>
        )}
      </div>

      <div className="Box p-3">
        <div ref={chartRef} style={{ minHeight: 480 }} />
      </div>
    </NarrativeSection>
  );
}

function LeverageRect({ element, row, sel }) {
  const elColor = (ELEMENT_COLORS[element.elementKey] || {}).color || '#8b949e';
  const elBg = (ELEMENT_COLORS[element.elementKey] || {}).bg || 'rgba(139,148,158,0.15)';

  const est = element.worksheet.improvementEstimates.find(e => e.estimateId === (sel.estimateId || element.worksheet.improvementEstimates[0]?.estimateId));
  const proj = element.worksheet.projectedImprovements.find(p => p.projectionId === (sel.projectionId || element.worksheet.projectedImprovements[0]?.projectionId));

  const activeDevHours = row.timeSpentHours || 0;
  const completions = row.completionCount || 0;
  const timeSaved = est?.timeSavedHours || row.timeSavedHours || 0;
  const withoutAiHours = activeDevHours + timeSaved;
  const projSaved = proj?.projTimeSavedHours || 0;
  const projHours = Math.max(activeDevHours - projSaved, 0);
  const currentLeverage = safeDiv(completions, activeDevHours);

  const xMax = Math.max(withoutAiHours, activeDevHours) * 1.15;
  const yMax = completions * 1.5;

  const series = [];
  if (timeSaved > 0) {
    series.push({ type: 'polygon', name: 'Without AI',
      data: [[0,0],[withoutAiHours,0],[withoutAiHours,completions],[0,completions]],
      color: 'rgba(248,81,73,0.08)', lineWidth: 1, lineColor: '#f85149', dashStyle: 'ShortDot',
      enableMouseTracking: true,
      tooltip: { headerFormat: '', pointFormat: `<b>Without AI</b><br/>Hours: ${fmtCompact(withoutAiHours)}<br/>Leverage: ${fmtDec(safeDiv(completions, withoutAiHours), 3)}` },
    });
  }
  series.push({ type: 'polygon', name: 'Current',
    data: [[0,0],[activeDevHours,0],[activeDevHours,completions],[0,completions]],
    color: elBg, lineWidth: 2, lineColor: elColor,
    enableMouseTracking: true,
    tooltip: { headerFormat: '', pointFormat: `<b>Current</b><br/>Hours: ${fmtCompact(activeDevHours)}<br/>Completions: ${fmtCompact(completions)}<br/>Leverage: ${fmtDec(currentLeverage, 3)}` },
  });
  if (projSaved > 0) {
    series.push({ type: 'polygon', name: 'Projected',
      data: [[0,0],[projHours,0],[projHours,completions],[0,completions]],
      color: 'rgba(63,185,80,0.08)', lineWidth: 1, lineColor: '#3fb950', dashStyle: 'ShortDash',
      enableMouseTracking: true,
      tooltip: { headerFormat: '', pointFormat: `<b>Projected</b><br/>Hours: ${fmtCompact(projHours)}<br/>Leverage: ${fmtDec(safeDiv(completions, projHours), 3)}<br/>Savings: ${fmtCompact(projSaved)} hrs` },
    });
  }
  series.push({ type: 'line', name: `Leverage = ${fmtDec(currentLeverage, 3)}`,
    data: [[0,0],[activeDevHours,completions]], color: '#3fb950', dashStyle: 'Dash', lineWidth: 2,
    marker: { enabled: true, radius: 4, symbol: 'circle' }, enableMouseTracking: false,
  });

  const ref = useChart((el) => {
    return Highcharts.chart(el, {
      chart: { type: 'scatter', height: 340 },
      title: { text: row.area, style: { color: elColor } },
      subtitle: { text: `${fmtCompact(completions)} completions / ${fmtCompact(activeDevHours)} hrs` },
      xAxis: { title: { text: 'Dev Hours' }, min: 0, max: xMax, gridLineWidth: 1, labels: { formatter() { return fmtCompact(this.value); } } },
      yAxis: { title: { text: 'Completions' }, min: 0, max: yMax, labels: { formatter() { return fmtCompact(this.value); } } },
      tooltip: { useHTML: true },
      legend: { enabled: true, align: 'center', verticalAlign: 'bottom', itemStyle: { fontSize: '10px' } },
      series,
    });
  }, [row, sel]);

  return <div ref={ref} />;
}

/* ═══════════════════════════════════════════════════════
   SECTION 6: ESTIMATES & PROJECTIONS
   ═══════════════════════════════════════════════════════ */
function Section6({ elements, rows, selections, onSelectionChange }) {
  const el = elements.find(e => e.elementKey === 'ai-assisted') || elements[0];
  if (!el) return null;
  const elIdx = elements.indexOf(el);
  const r = rows[elIdx];
  const sel = selections[el.elementKey] || {};
  const elColor = (ELEMENT_COLORS[el.elementKey] || {}).color || '#58a6ff';

  const estimates = el.worksheet.improvementEstimates || [];
  const projections = el.worksheet.projectedImprovements || [];
  const selectedEstId = sel.estimateId || estimates[0]?.estimateId;
  const selectedProjId = sel.projectionId || projections[0]?.projectionId;

  const selectedEst = estimates.find(e => e.estimateId === selectedEstId);
  const selectedProj = projections.find(p => p.projectionId === selectedProjId);

  const estColors = ['#58a6ff', '#3fb950', '#d29922', '#bc8cff'];

  return (
    <NarrativeSection number={6} title="Intent and Justification — Estimates & Projections"
      intro="This section replicates the AI-Assisted Element dashboard's estimate and projection selectors. Click an estimate method to choose how time saved is calculated, then select a projection to see how structural improvements would scale that savings."
      source="AI-Assisted Element Dashboard (v2) — Estimate & Projection selectors"
      insight="The dashboard does not claim to know intent directly. It shows whether the observable consequences of decisions — shifts in hours, yield, and leverage — justify the intent behind them.">

      <h3 className="f5 color-fg-default mb-2" style={{ color: elColor }}>{r.area}</h3>

      <div className="f6 color-fg-muted text-bold mb-2">Time Saved Estimates <span className="f6 color-fg-muted" style={{ fontWeight: 400 }}>(click to select)</span></div>
      <div className="d-flex flex-wrap mb-3" style={{ gap: 12 }}>
        {estimates.map((est, i) => {
          const isSelected = est.estimateId === selectedEstId;
          const color = estColors[i % estColors.length];
          return (
            <div key={est.estimateId} className={`estimate-card${isSelected ? ' selected' : ''}`}
              style={{ flex: '1 1 200px', borderColor: isSelected ? color : undefined }}
              onClick={() => onSelectionChange(el.elementKey, 'estimateId', est.estimateId)}>
              <div className="est-label">{est.name}</div>
              <div className="est-value" style={{ color }}>{fmtCompact(est.timeSavedHours)}<span className="kpi-unit">hrs</span></div>
              <div className="f6 color-fg-muted mt-1">{est.formula || ''}</div>
              {isSelected && <div className="f6 mt-1" style={{ color }}>▲ Using for projections</div>}
            </div>
          );
        })}
      </div>

      {projections.length > 0 && (
        <>
          <div className="f6 color-fg-muted text-bold mb-2">Structural Projections <span className="f6 color-fg-muted" style={{ fontWeight: 400 }}>(select scaling factor)</span></div>
          <div className="d-flex flex-wrap mb-3" style={{ gap: 12 }}>
            {projections.map((proj) => {
              const isSelected = proj.projectionId === selectedProjId;
              return (
                <div key={proj.projectionId} className={`estimate-card${isSelected ? ' selected' : ''}`}
                  style={{ flex: '1 1 200px', borderColor: isSelected ? '#bc8cff' : undefined }}
                  onClick={() => onSelectionChange(el.elementKey, 'projectionId', proj.projectionId)}>
                  <div className="est-label">{proj.name}</div>
                  <div className="est-value" style={{ color: '#bc8cff' }}>{fmtCompact(proj.projTimeSavedHours)}<span className="kpi-unit">hrs saved</span></div>
                  <div className="f6 color-fg-muted mt-1">{proj.formula || ''}</div>
                  {isSelected && <div className="f6 mt-1" style={{ color: '#bc8cff' }}>▲ Selected projection</div>}
                </div>
              );
            })}
          </div>
        </>
      )}

      <div className="Box p-3">
        <div className="f6 color-fg-muted mb-2">Selected: <strong>{selectedEst?.name || '—'}</strong> estimate + <strong>{selectedProj?.name || 'none'}</strong> projection</div>
        <div className="d-flex flex-wrap" style={{ gap: 16 }}>
          <KpiCard label="Time Saved" value={fmtCompact(selectedEst?.timeSavedHours)} unit="hrs" />
          <KpiCard label="Proj. Savings" value={fmtCompact(selectedProj?.projTimeSavedHours)} unit="hrs" color="#bc8cff" />
          <KpiCard label="Proj. Completions" value={selectedProj?.projCompletionGain != null ? '+' + fmt(selectedProj.projCompletionGain) : '—'} />
          <KpiCard label="Proj. Yield" value={selectedProj?.projYield != null ? fmtPct(selectedProj.projYield) : '—'} />
        </div>
      </div>
    </NarrativeSection>
  );
}

/* ═══════════════════════════════════════════════════════
   APP
   ═══════════════════════════════════════════════════════ */
function recomputeRow(element, selectedEstimateId, selectedProjectionId) {
  const est = element.worksheet.improvementEstimates.find(e => e.estimateId === selectedEstimateId)
    || element.worksheet.improvementEstimates[0];
  const proj = element.worksheet.projectedImprovements.find(p => p.projectionId === selectedProjectionId)
    || element.worksheet.projectedImprovements[0];
  const fs = element.worksheet?.factSummary;
  return {
    ...element.row,
    timeSavedHours: est?.timeSavedHours ?? element.row.timeSavedHours,
    estimateName: est?.name || null,
    timeSpentBasis: fs?.timeSpentBasis || null,
    projTimeSavedHours: proj?.projTimeSavedHours ?? null,
    projCompletionGain: proj?.projCompletionGain ?? null,
    projYield: proj?.projYield ?? null,
    modeNote: proj?.name || 'no projection',
  };
}

function App() {
  const [data, setData] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [config, setConfig] = React.useState({});
  const [selections, setSelections] = React.useState({});

  React.useEffect(() => {
    Promise.all([fetchLeverageSummary(), fetchConfig()]).then(([art, cfg]) => {
      if (art) {
        setData(art);
        const initSel = {};
        for (const el of art.elements || []) {
          const est0 = el.worksheet?.improvementEstimates?.[0];
          const proj0 = el.worksheet?.projectedImprovements?.[0];
          initSel[el.elementKey] = { estimateId: est0?.estimateId, projectionId: proj0?.projectionId };
        }
        setSelections(initSel);
        // Merge artifact config (has cfg_hrs_per_dev_per_day, etc.)
        const artCfg = art.profile?.config_used || {};
        setConfig(prev => ({ ...artCfg, ...cfg, ...prev }));
      }
      if (cfg && Object.keys(cfg).length > 0) setConfig(prev => ({ ...prev, ...cfg }));
      setLoading(false);
    });
  }, []);

  if (loading) return <div className="demo-page"><div className="loading">Loading leverage data…</div></div>;
  if (!data) return <div className="demo-page"><div className="loading">No leverage-summary artifact found. Run the pipeline first.</div></div>;

  const elements = data.elements || [];
  const rows = elements.map(el => {
    const sel = selections[el.elementKey] || {};
    return recomputeRow(el, sel.estimateId, sel.projectionId);
  });

  const handleSelectionChange = (elementKey, field, value) => {
    setSelections(prev => ({ ...prev, [elementKey]: { ...prev[elementKey], [field]: value } }));
  };

  const handleConfigChange = (field, value) => {
    setConfig(prev => ({ ...prev, [field]: value }));
  };

  return (
    <div className="demo-page">
      <div className="page-header">
        <div className="live-badge">✦ Live Data from V2 Pipeline</div>
        <h1 className="page-title">Leverage in Practice</h1>
        <p className="page-subtitle">
          Real examples from the V2 dashboard system, showing how each concept from the leverage framework appears with live data.
        </p>
      </div>

      <Section1 elements={elements} recomputeRow={recomputeRow} selections={selections} onSelectionChange={handleSelectionChange} />
      <Section2 elements={elements} rows={rows} config={config} />
      <Section3 elements={elements} rows={rows} config={config} onConfigChange={handleConfigChange} />
      <Section4 elements={elements} rows={rows} />
      <Section5 elements={elements} rows={rows} selections={selections} config={config} />
      <Section6 elements={elements} rows={rows} selections={selections} onSelectionChange={handleSelectionChange} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
