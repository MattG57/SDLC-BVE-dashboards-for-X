<!DOCTYPE html>
<html lang="en" data-color-mode="dark" data-dark-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BVE — Integrated Leverage (v2)</title>

<!-- Primer CSS -->
<link rel="stylesheet" href="https://unpkg.com/@primer/css@21.3.1/dist/primer.css">

<!-- Highcharts -->
<script src="https://cdn.jsdelivr.net/npm/highcharts@11.4.8/highcharts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highcharts@11.4.8/highcharts-more.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highcharts@11.4.8/modules/accessibility.js"></script>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  body { background: var(--bgColor-default); }
  .integrated-page { max-width: 1280px; margin: 0 auto; padding: 24px 16px; }

  .kpi-card { text-align: center; }
  .kpi-value { font-size: 2rem; font-weight: 600; line-height: 1.2; }
  .kpi-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-sub { font-size: 0.75rem; }
  .kpi-unit { font-size: 1.1rem; font-weight: 400; opacity: 0.65; margin-left: 2px; }

  .kpi-hero .kpi-value { font-size: 3rem; }
  .kpi-hero .kpi-label { font-size: 0.85rem; }
  .kpi-hero .kpi-sub { font-size: 0.85rem; }
  .kpi-hero { border-top: 3px solid var(--borderColor-accent-emphasis); }

  .section-row { margin-bottom: 32px; padding-top: 8px; }
  .chart-container { min-height: 320px; }

  .mode-toggle { display: inline-flex; border: 1px solid var(--borderColor-default); border-radius: 6px; overflow: hidden; }
  .mode-toggle button {
    padding: 4px 16px; font-size: 0.85rem; border: none; cursor: pointer;
    background: var(--bgColor-muted); color: var(--fgColor-muted); transition: all 0.15s;
  }
  .mode-toggle button + button { border-left: 1px solid var(--borderColor-default); }
  .mode-toggle button.active { background: var(--bgColor-accent-muted); color: var(--fgColor-accent); font-weight: 600; }

  .highcharts-background { fill: transparent !important; }

  .evidence-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .evidence-table th { text-align: left; padding: 8px 10px; border-bottom: 2px solid var(--borderColor-default); color: var(--fgColor-muted); font-weight: 600; white-space: nowrap; }
  .evidence-table td { padding: 6px 10px; border-bottom: 1px solid var(--borderColor-muted); }
  .evidence-table tr.clickable { cursor: pointer; }
  .evidence-table tr.clickable:hover { background: var(--bgColor-muted); }
  .evidence-table tr.selected { background: var(--bgColor-accent-muted); }
  .evidence-table select { background: var(--bgColor-muted); color: var(--fgColor-default); border: 1px solid var(--borderColor-default); border-radius: 4px; padding: 2px 4px; font-size: 0.8rem; max-width: 150px; }

  .drill-panel { border: 1px solid var(--borderColor-accent-emphasis); border-radius: 6px; margin-top: 12px; }
  .drill-panel .drill-header { padding: 12px 16px; border-bottom: 1px solid var(--borderColor-default); display: flex; justify-content: space-between; align-items: center; }
  .drill-panel .drill-body { padding: 16px; }
  .drill-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-bottom: 12px; }
  .drill-table th { text-align: left; padding: 4px 8px; border-bottom: 1px solid var(--borderColor-default); color: var(--fgColor-muted); }
  .drill-table td { padding: 4px 8px; border-bottom: 1px solid var(--borderColor-muted); }
  .drill-table tr.active-row { background: var(--bgColor-accent-muted); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">

/* ═══════════════════════════════════════════════════════
   HIGHCHARTS DARK THEME
   ═══════════════════════════════════════════════════════ */
Highcharts.setOptions({
  chart: { backgroundColor: 'transparent', style: { fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif' } },
  colors: ['#58a6ff', '#3fb950', '#d29922', '#f85149', '#bc8cff', '#f778ba', '#79c0ff', '#56d364'],
  title: { style: { color: '#e6edf3', fontSize: '14px', fontWeight: '600' } },
  subtitle: { style: { color: '#8b949e', fontSize: '12px' } },
  xAxis: { labels: { style: { color: '#8b949e' } }, gridLineColor: '#30363d', lineColor: '#30363d', tickColor: '#30363d' },
  yAxis: { labels: { style: { color: '#8b949e' } }, gridLineColor: '#30363d', title: { style: { color: '#8b949e' } } },
  legend: { itemStyle: { color: '#e6edf3' }, itemHoverStyle: { color: '#58a6ff' } },
  tooltip: { backgroundColor: '#161b22', borderColor: '#30363d', style: { color: '#e6edf3' } },
  plotOptions: { series: { animation: { duration: 400 } } },
  credits: { enabled: false },
});


/* ═══════════════════════════════════════════════════════
   DATA LOADING — SINGLE LEVERAGE-SUMMARY ARTIFACT
   ═══════════════════════════════════════════════════════ */

async function fetchLeverageSummary() {
  const bases = ['../../dataflow/data/', '../dataflow/data/'];
  for (const base of bases) {
    try {
      const r = await fetch(base + 'pipeline-manifest.json');
      if (!r.ok) continue;
      const manifest = await r.json();
      const artFile = (manifest.artifacts || []).find(f => f.startsWith('leverage-summary'));
      if (!artFile) continue;
      const art = await fetch(base + 'materialized/' + artFile).then(r => r.ok ? r.json() : null);
      if (art) return art;
    } catch(e) {}
  }
  return null;
}


/* ═══════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════ */

function safeDiv(a, b) { return b > 0 ? a / b : null; }

function recomputeRow(element, selectedEstimateId, selectedProjectionId) {
  const est = element.worksheet.improvementEstimates.find(e => e.estimateId === selectedEstimateId)
    || element.worksheet.improvementEstimates[0];
  const proj = element.worksheet.projectedImprovements.find(p => p.projectionId === selectedProjectionId)
    || element.worksheet.projectedImprovements[0] || null;

  const timeSaved = est?.timeSavedHours || 0;
  const timeSpent = element.worksheet.factSummary.timeSpentHours;
  const completions = element.worksheet.factSummary.completionCount;

  let projTimeSaved = null, projCompletionGain = null, projYield = null;
  if (proj && proj.currentValue > 0) {
    const scale = 1 / proj.currentValue;
    projTimeSaved = Math.round(timeSaved * scale);
    if (proj.improvementType === 'mixed' || proj.improvementType === 'completion') {
      projCompletionGain = Math.round(completions * (scale - 1));
    }
    projYield = safeDiv(completions + (projCompletionGain || 0), timeSpent + projTimeSaved - timeSaved);
  }

  return {
    ...element.row,
    timeSavedHours: Math.round(timeSaved),
    currentYield: safeDiv(completions, timeSpent),
    projTimeSavedHours: projTimeSaved,
    projCompletionGain: projCompletionGain,
    projYield: projYield,
    modeNote: proj?.name || 'no projection',
  };
}

const ELEMENT_COLORS = {
  'ai-assisted-coding': { color: '#58a6ff', rgbaFill: 'rgba(88,166,255,0.18)' },
  'agentic-ai-coding':  { color: '#3fb950', rgbaFill: 'rgba(63,185,80,0.18)' },
};


/* ═══════════════════════════════════════════════════════
   REACT COMPONENTS
   ═══════════════════════════════════════════════════════ */
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ── Formatting helpers ── */
const fmt = n => n == null ? '—' : Number(n).toLocaleString(undefined, { maximumFractionDigits: 0 });
const fmtDec = (n, d=1) => n == null ? '—' : Number(n).toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d });
const fmtPct = n => n == null ? '—' : (n * 100).toFixed(1) + '%';
const fmtCompact = n => {
  if (n == null) return '—';
  if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(1) + 'k';
  return Number(n).toLocaleString(undefined, { maximumFractionDigits: 0 });
};
const fmtCurrency = n => {
  if (n == null) return '—';
  if (Math.abs(n) >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'k';
  return '$' + Number(n).toLocaleString(undefined, { maximumFractionDigits: 0 });
};
const fmtShortDate = d => {
  if (!d) return '—';
  const dt = new Date(d + 'T12:00:00Z');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' });
};

/* ── Highcharts wrapper ── */
function Chart({ options, className = 'chart-container' }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (ref.current) chartRef.current = Highcharts.chart(ref.current, options);
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(options)]);
  return <div ref={ref} className={className} />;
}

/* ── KPI Card ── */
function KpiCard({ label, value, unit, sub, color, hero }) {
  return (
    <div className={`Box p-3 kpi-card${hero ? ' kpi-hero' : ''}`}>
      <div className="kpi-label color-fg-muted mb-1">{label}</div>
      <div className="kpi-value" style={color ? { color } : {}}>
        {value}{unit && <span className="kpi-unit">{unit}</span>}
      </div>
      {sub && <div className="kpi-sub color-fg-muted mt-1">{sub}</div>}
    </div>
  );
}

/* ── Section Header ── */
function SectionHeader({ title, desc }) {
  return (
    <div className="mb-3 pb-2" style={{ borderBottom: '1px solid var(--borderColor-default)', borderTop: '2px solid var(--borderColor-muted)', paddingTop: '12px' }}>
      <h2 className="f2 color-fg-accent">{title}</h2>
      {desc && <p className="f6 color-fg-muted">{desc}</p>}
    </div>
  );
}


/* ═══════════════════════════════════════════════════════
   MODE DEFINITIONS
   ═══════════════════════════════════════════════════════ */
const MODES = [
  { key: 'aperture', label: 'Aperture' },
  { key: 'unimproved', label: 'Unimproved' },
  { key: 'projected', label: 'Projected' },
];

const MODE_DESCRIPTIONS = {
  aperture: 'Shows total organizational capacity vs the portion currently measured. The aperture is the fraction of dev-hours covered.',
  unimproved: 'Counterfactual: AI-assisted time saved is added back to dev-hours. Agentic capacity would not exist without the agent.',
  projected: 'Projects current leverage to full structural coverage — adoption, assist %, and merge rate all at 100%.',
};


/* ═══════════════════════════════════════════════════════
   SECTION 1 — SUMMARY
   ═══════════════════════════════════════════════════════ */
function SummarySection({ profile, rows }) {
  const cfg = profile.config_used;
  const dr = profile.date_range || {};
  const firstDay = dr.first;
  const lastDay = dr.last;
  const daysInRange = firstDay && lastDay
    ? Math.round((new Date(lastDay) - new Date(firstDay)) / 86400000) + 1 : 0;

  const totalDevs = cfg.cfg_total_developers || 100;
  const hrsPerDay = cfg.cfg_hrs_per_dev_per_day || 8;
  const totalOrgDevHours = totalDevs * daysInRange * hrsPerDay;

  const modeledDevHours = rows.reduce((s, r) => s + (r.timeSpentHours || 0), 0);
  const totalHoursSaved = rows.reduce((s, r) => s + (r.timeSavedHours || 0), 0);
  const aperture = safeDiv(modeledDevHours, totalOrgDevHours);
  const laborCost = cfg.cfg_labor_cost_per_hour;
  const economicValue = laborCost != null ? totalHoursSaved * laborCost : null;

  return (
    <div className="section-row">
      <SectionHeader title="Summary"
        desc="Summary of total organizational dev capacity, the fraction measured across leverage elements, and the estimated impact." />
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(170px, 1fr))', gap: '12px' }}>
        <KpiCard label="Time Range"
          value={firstDay ? `${fmtShortDate(firstDay)} – ${fmtShortDate(lastDay)}` : '—'}
          sub={daysInRange > 0 ? `${daysInRange} days` : 'no data'} />
        <KpiCard label="Org Capacity" value={fmtCompact(totalOrgDevHours)} unit="hrs"
          sub={`${totalDevs} devs × ${daysInRange}d × ${hrsPerDay}h`} />
        <KpiCard label="Modeled Dev-Hours" value={fmtCompact(modeledDevHours)} unit="hrs"
          sub="observed across elements" color="#58a6ff" />
        <KpiCard label="Aperture" value={fmtPct(aperture)}
          sub="modeled / org capacity" color="#d29922" />
        <KpiCard label="Total Hours Saved" value={fmtDec(totalHoursSaved, 0)} unit="hrs"
          sub="AI-assisted + agentic" color="#3fb950" />
        <KpiCard label="Economic Value"
          value={economicValue != null ? fmtCurrency(economicValue) : '—'}
          sub={economicValue != null ? `at $${laborCost}/hr` : 'set in config'}
          color={economicValue != null ? '#d29922' : undefined} />
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════════════════
   SECTION 2 — EVIDENCE TABLE + LEVERAGE RECTANGLE
   ═══════════════════════════════════════════════════════ */

function EvidenceTable({ elements, rows, selections, onSelectionChange, selectedKey, onRowClick }) {
  return (
    <div className="Box mb-3" style={{ overflowX: 'auto' }}>
      <table className="evidence-table">
        <thead>
          <tr>
            <th>Area</th>
            <th>Completion Type</th>
            <th>Completions</th>
            <th>Time Spent</th>
            <th>Time Saved</th>
            <th>Yield</th>
            <th>Proj. Savings</th>
            <th>Proj. Yield</th>
            <th>Mode</th>
            <th>Estimate</th>
            <th>Projection</th>
          </tr>
        </thead>
        <tbody>
          {elements.map((el, i) => {
            const r = rows[i];
            const sel = selections[el.elementKey] || {};
            return (
              <tr key={el.elementKey}
                  className={`clickable${selectedKey === el.elementKey ? ' selected' : ''}`}
                  onClick={() => onRowClick(el.elementKey)}>
                <td style={{ fontWeight: 600, color: (ELEMENT_COLORS[el.elementKey] || {}).color }}>
                  {r.area}
                </td>
                <td>{r.completionType}</td>
                <td>{fmt(r.completionCount)}</td>
                <td>{fmt(r.timeSpentHours)}<span className="color-fg-muted"> hrs</span></td>
                <td style={{ color: '#3fb950' }}>{fmt(r.timeSavedHours)}<span className="color-fg-muted"> hrs</span></td>
                <td>{fmtDec(r.currentYield, 3)}</td>
                <td>{r.projTimeSavedHours != null ? fmt(r.projTimeSavedHours) + ' hrs' : '—'}</td>
                <td>{fmtDec(r.projYield, 3)}</td>
                <td className="color-fg-muted" style={{ fontSize: '0.75rem' }}>{r.modeNote}</td>
                <td onClick={e => e.stopPropagation()}>
                  <select value={sel.estimateId || ''} onChange={e => onSelectionChange(el.elementKey, 'estimateId', e.target.value)}>
                    {el.worksheet.improvementEstimates.map(est => (
                      <option key={est.estimateId} value={est.estimateId}>{est.name}</option>
                    ))}
                  </select>
                </td>
                <td onClick={e => e.stopPropagation()}>
                  <select value={sel.projectionId || ''} onChange={e => onSelectionChange(el.elementKey, 'projectionId', e.target.value)}
                    disabled={el.worksheet.projectedImprovements.length === 0}>
                    {el.worksheet.projectedImprovements.length === 0
                      ? <option value="">none</option>
                      : el.worksheet.projectedImprovements.map(p => (
                          <option key={p.projectionId} value={p.projectionId}>{p.name}</option>
                        ))}
                  </select>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}


function LeverageRectangle({ elements, rows, profile, mode }) {
  const cfg = profile.config_used;
  const dr = profile.date_range || {};
  const daysInRange = dr.first && dr.last
    ? Math.round((new Date(dr.last) - new Date(dr.first)) / 86400000) + 1 : 0;

  const rectData = useMemo(() => {
    return elements.map((el, i) => {
      const r = rows[i];
      const colors = ELEMENT_COLORS[el.elementKey] || { color: '#8b949e', rgbaFill: 'rgba(139,148,158,0.18)' };
      const isAgentic = el.elementKey === 'agentic-ai-coding';
      let devHours, completions;

      if (mode === 'aperture') {
        devHours = r.timeSpentHours || 0;
        completions = r.completionCount || 0;
      } else if (mode === 'unimproved') {
        if (isAgentic) {
          devHours = 0;
          completions = 0;
        } else {
          devHours = (r.timeSpentHours || 0) + (r.timeSavedHours || 0);
          completions = r.completionCount || 0;
        }
      } else {
        devHours = r.projTimeSavedHours != null ? r.projTimeSavedHours : (r.timeSpentHours || 0);
        completions = (r.completionCount || 0) + (r.projCompletionGain || 0);
      }
      return { name: r.area, devHours, completions, ...colors, isAgentic };
    });
  }, [elements, rows, mode]);

  const capacity = useMemo(() => {
    if (mode !== 'aperture' || daysInRange === 0) return null;
    const totalOrgDevHours = (cfg.cfg_total_developers || 100) * daysInRange * (cfg.cfg_hrs_per_dev_per_day || 8);
    const totalCompletions = rectData.reduce((s, e) => s + e.completions, 0);
    return { devHours: totalOrgDevHours, completions: totalCompletions };
  }, [mode, daysInRange, cfg, rectData]);

  // Fixed axis scales across all modes
  const { fixedXMax, fixedYMax } = useMemo(() => {
    let maxW = 0, maxH = 0;
    for (const m of ['aperture', 'unimproved', 'projected']) {
      let w = 0, h = 0;
      for (let i = 0; i < elements.length; i++) {
        const r = rows[i];
        const isAg = elements[i].elementKey === 'agentic-ai-coding';
        if (m === 'unimproved' && isAg) continue;
        const dh = m === 'unimproved' && !isAg ? (r.timeSpentHours || 0) + (r.timeSavedHours || 0)
          : m === 'projected' && r.projTimeSavedHours != null ? r.projTimeSavedHours
          : (r.timeSpentHours || 0);
        const c = m === 'projected' ? (r.completionCount || 0) + (r.projCompletionGain || 0) : (r.completionCount || 0);
        w += dh; h += c;
      }
      if (m === 'aperture' && daysInRange > 0) {
        const orgW = (cfg.cfg_total_developers || 100) * daysInRange * (cfg.cfg_hrs_per_dev_per_day || 8);
        w = Math.max(w, orgW);
      }
      if (w > maxW) maxW = w;
      if (h > maxH) maxH = h;
    }
    return { fixedXMax: maxW > 0 ? maxW * 1.15 : 10, fixedYMax: maxH > 0 ? maxH * 1.15 : 10 };
  }, [elements, rows, cfg, daysInRange]);

  const totalDevHours = rectData.reduce((s, e) => s + e.devHours, 0);
  const totalCompletions = rectData.reduce((s, e) => s + e.completions, 0);
  const integratedLeverage = safeDiv(totalCompletions, totalDevHours);
  const aperturePct = capacity ? safeDiv(totalDevHours, capacity.devHours) : null;

  const series = [];

  if (capacity && capacity.devHours > 0 && capacity.completions > 0) {
    series.push({
      type: 'polygon', name: 'Org Capacity',
      data: [[0, 0], [capacity.devHours, 0], [capacity.devHours, capacity.completions], [0, capacity.completions]],
      color: 'rgba(139,148,158,0.06)', lineWidth: 2, lineColor: '#8b949e', dashStyle: 'ShortDash',
      enableMouseTracking: true,
      tooltip: { headerFormat: '', pointFormat: `<b>Org Capacity</b><br/>Dev-Hours: ${fmtCompact(capacity.devHours)}<br/>Aperture: ${fmtPct(aperturePct)}` },
    });
  }

  let xOffset = 0;
  for (const elem of rectData) {
    const w = elem.devHours, h = elem.completions;
    if (w > 0 && h > 0) {
      series.push({
        type: 'polygon', name: elem.name,
        data: [[xOffset, 0], [xOffset + w, 0], [xOffset + w, h], [xOffset, h]],
        color: elem.rgbaFill, lineWidth: 2, lineColor: elem.color,
        enableMouseTracking: true,
        tooltip: { headerFormat: '', pointFormat: `<b>${elem.name}</b><br/>Dev-Hours: ${fmtCompact(w)}<br/>Completions: ${fmtCompact(h)}<br/>Leverage: ${fmtDec(safeDiv(h, w), 3)}` },
      });
    } else if (w === 0 && h === 0 && mode === 'unimproved' && elem.isAgentic) {
      series.push({
        type: 'scatter', name: `${elem.name} (zero)`,
        data: [{ x: xOffset, y: 0 }],
        color: elem.color,
        marker: { radius: 8, symbol: 'circle', lineWidth: 2, lineColor: elem.color, fillColor: 'rgba(63,185,80,0.3)' },
        tooltip: { headerFormat: '', pointFormat: `<b>${elem.name} (Counterfactual)</b><br/>Without the agent: 0 dev-hours, 0 completions.<br/>This is purely additive capacity.` },
      });
    }
    xOffset += w;
  }

  if (totalDevHours > 0 && totalCompletions > 0) {
    series.push({
      type: 'line', name: `Leverage = ${fmtDec(integratedLeverage, 3)}`,
      data: [[0, 0], [totalDevHours, totalCompletions]],
      color: '#d29922', dashStyle: 'Dash', lineWidth: 2,
      marker: { enabled: true, radius: 5, symbol: 'circle' },
      enableMouseTracking: false,
    });
  }

  const chartOpts = {
    chart: { type: 'scatter', height: 480 },
    title: { text: 'Integrated Leverage Rectangle' },
    subtitle: { text: null },
    xAxis: { title: { text: 'Dev-Hours', style: { fontSize: '13px', fontWeight: '600' } }, min: 0, max: fixedXMax, gridLineWidth: 1, labels: { formatter: function() { return fmtCompact(this.value); } } },
    yAxis: { title: { text: 'Completions', style: { fontSize: '13px', fontWeight: '600' } }, min: 0, max: fixedYMax, labels: { formatter: function() { return fmtCompact(this.value); } } },
    tooltip: { useHTML: true, headerFormat: '' },
    legend: { enabled: true, align: 'center', verticalAlign: 'bottom' },
    plotOptions: { series: { animation: { duration: 600 }, states: { inactive: { opacity: 0.6 } } } },
    series,
  };

  return (
    <>
      <div className="d-flex flex-wrap mb-3" style={{ gap: '12px' }}>
        <div style={{ flex: '1 1 140px' }}>
          <KpiCard label="Total Dev-Hours" value={fmtCompact(totalDevHours)} sub="sum across elements" />
        </div>
        <div style={{ flex: '1 1 140px' }}>
          <KpiCard label="Total Completions" value={fmtCompact(totalCompletions)} sub="sum across elements" />
        </div>
        <div style={{ flex: '0 0 200px' }}>
          <KpiCard hero label="Integrated Leverage" value={fmtDec(integratedLeverage, 3)} sub="completions / dev-hours" color="#3fb950" />
        </div>
        {mode === 'aperture' && (
          <div style={{ flex: '1 1 140px' }}>
            <KpiCard label="Aperture" value={fmtPct(aperturePct)} sub="modeled / capacity" color="#d29922" />
          </div>
        )}
      </div>
      <div className="Box p-3">
        <Chart options={chartOpts} />
      </div>
    </>
  );
}


/* ═══════════════════════════════════════════════════════
   SECTION 3 — WORKSHEET DRILL-DOWN
   ═══════════════════════════════════════════════════════ */
function WorksheetDrilldown({ element, selections }) {
  const ws = element.worksheet;
  const fs = ws.factSummary;
  const sel = selections[element.elementKey] || {};

  const factEntries = Object.entries(fs).filter(([k]) => k !== 'completionType');

  return (
    <div className="drill-panel">
      <div className="drill-header">
        <h3 className="f4 mb-0" style={{ color: (ELEMENT_COLORS[element.elementKey] || {}).color }}>
          {element.row.area} — Worksheet
        </h3>
      </div>
      <div className="drill-body">
        {/* Facts */}
        <h4 className="f5 color-fg-muted mb-2">Facts</h4>
        <div className="d-flex flex-wrap mb-3" style={{ gap: '8px' }}>
          {factEntries.map(([k, v]) => (
            <div key={k} className="Box p-2" style={{ flex: '0 0 auto', minWidth: '120px' }}>
              <div className="f6 color-fg-muted">{k.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase())}</div>
              <div className="f5 text-bold">{typeof v === 'number' ? (v < 1 && v > 0 ? fmtPct(v) : fmtDec(v, 1)) : String(v ?? '—')}</div>
            </div>
          ))}
        </div>

        {/* Estimates */}
        <h4 className="f5 color-fg-muted mb-2">Improvement Estimates</h4>
        <table className="drill-table">
          <thead>
            <tr><th>Name</th><th>Method</th><th>Formula</th><th>Time Saved (hrs)</th><th>Per Dev/Day</th></tr>
          </thead>
          <tbody>
            {ws.improvementEstimates.map(est => (
              <tr key={est.estimateId} className={est.estimateId === sel.estimateId ? 'active-row' : ''}>
                <td style={{ fontWeight: est.estimateId === sel.estimateId ? 600 : 400 }}>
                  {est.estimateId === sel.estimateId ? '● ' : ''}{est.name}
                </td>
                <td className="color-fg-muted">{est.method}</td>
                <td className="color-fg-muted" style={{ fontFamily: 'monospace', fontSize: '0.75rem' }}>{est.formula}</td>
                <td>{fmtDec(est.timeSavedHours, 1)}</td>
                <td>{fmtDec(est.timeSavedPerDev, 2)}</td>
              </tr>
            ))}
          </tbody>
        </table>

        {/* Projections */}
        <h4 className="f5 color-fg-muted mb-2">Projected Improvements</h4>
        {ws.projectedImprovements.length === 0 ? (
          <p className="f6 color-fg-muted">No projections available for this element.</p>
        ) : (
          <table className="drill-table">
            <thead>
              <tr><th>Name</th><th>Factor</th><th>Current</th><th>Target</th><th>Proj. Saved (hrs)</th><th>Proj. Completions</th><th>Proj. Yield</th></tr>
            </thead>
            <tbody>
              {ws.projectedImprovements.map(p => (
                <tr key={p.projectionId} className={p.projectionId === sel.projectionId ? 'active-row' : ''}>
                  <td style={{ fontWeight: p.projectionId === sel.projectionId ? 600 : 400 }}>
                    {p.projectionId === sel.projectionId ? '● ' : ''}{p.name}
                  </td>
                  <td className="color-fg-muted">{p.structuralFactor}</td>
                  <td>{fmtPct(p.currentValue)}</td>
                  <td>{fmtPct(p.targetValue)}</td>
                  <td>{fmt(p.projTimeSavedHours)}</td>
                  <td>{p.projCompletionGain != null ? '+' + fmt(p.projCompletionGain) : '—'}</td>
                  <td>{fmtDec(p.projYield, 3)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════════════════
   SECTION 4 — CONFIG PANEL (read-only)
   ═══════════════════════════════════════════════════════ */
function ConfigPanel({ config, isOpen, onToggle }) {
  const entries = Object.entries(config).filter(([, v]) => v != null);
  const summary = `${config.cfg_total_developers} devs · ${config.cfg_hrs_per_dev_per_day || 8}h/d`;

  return (
    <div className="Box mt-4" style={{ borderColor: isOpen ? 'var(--borderColor-accent-emphasis)' : undefined }}>
      <div className="Box-header d-flex flex-items-center flex-justify-between" style={{ cursor: 'pointer' }} onClick={onToggle}>
        <div className="d-flex flex-items-center" style={{ gap: '8px' }}>
          <span style={{ transition: 'transform 0.15s', transform: isOpen ? 'rotate(90deg)' : 'rotate(0deg)', display: 'inline-block' }}>▶</span>
          <h4 className="f5 mb-0">Configuration (materialization-time)</h4>
        </div>
        <span className="f6 color-fg-muted">{summary}</span>
      </div>
      {isOpen && (
        <div className="Box-body">
          <p className="f6 color-fg-muted mb-3">
            These values were set at materialization time. To change, update <code>dashboard-config.json</code> and re-run the pipeline.
          </p>
          <div className="d-flex flex-wrap" style={{ gap: '12px' }}>
            {entries.map(([k, v]) => (
              <div key={k} className="Box p-2" style={{ flex: '1 1 180px' }}>
                <div className="f6 color-fg-muted">{k}</div>
                <div className="f5 text-bold">{typeof v === 'number' && v < 1 && v > 0 ? fmtPct(v) : String(v)}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}


/* ═══════════════════════════════════════════════════════
   DOWNLOAD
   ═══════════════════════════════════════════════════════ */
function downloadLeverageSummary(artifact, elements, selections) {
  const updated = {
    ...artifact,
    artifact: {
      ...artifact.artifact,
      exported_at: new Date().toISOString(),
      profile: {
        ...artifact.artifact.profile,
        selections_used: Object.fromEntries(
          elements.map(el => [el.elementKey, selections[el.elementKey] || {}])
        ),
      },
    },
    elements: elements.map(el => ({
      ...el,
      row: recomputeRow(el, selections[el.elementKey]?.estimateId, selections[el.elementKey]?.projectionId),
      worksheet: {
        ...el.worksheet,
        selection: {
          selectedEstimateId: selections[el.elementKey]?.estimateId || el.worksheet.selection.selectedEstimateId,
          selectedProjectionId: selections[el.elementKey]?.projectionId || el.worksheet.selection.selectedProjectionId,
          modeNote: selections[el.elementKey]?.projectionId
            ? (el.worksheet.projectedImprovements.find(p => p.projectionId === selections[el.elementKey].projectionId)?.name || 'custom')
            : el.worksheet.selection.modeNote,
        },
      },
    })),
  };
  const blob = new Blob([JSON.stringify(updated, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'leverage-summary.json';
  a.click();
  URL.revokeObjectURL(url);
}


/* ═══════════════════════════════════════════════════════
   APP
   ═══════════════════════════════════════════════════════ */
function App() {
  const [artifact, setArtifact] = useState(null);
  const [selections, setSelections] = useState({});
  const [configOpen, setConfigOpen] = useState(false);
  const [selectedKey, setSelectedKey] = useState(null);
  const [rectMode, setRectMode] = useState('aperture');
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    fetchLeverageSummary().then(art => {
      if (!art || !art.elements?.length) {
        setError('No leverage-summary artifact found.');
        setLoading(false);
        return;
      }
      setArtifact(art);
      const sel = {};
      for (const el of art.elements) {
        sel[el.elementKey] = {
          estimateId: el.worksheet.selection.selectedEstimateId,
          projectionId: el.worksheet.selection.selectedProjectionId,
        };
      }
      setSelections(sel);
      setLoading(false);
    }).catch(e => {
      console.error('Artifact load error:', e);
      setError('Failed to load leverage-summary: ' + e.message);
      setLoading(false);
    });
  }, []);

  const handleSelectionChange = useCallback((elKey, field, value) => {
    setSelections(prev => ({
      ...prev,
      [elKey]: { ...prev[elKey], [field]: value },
    }));
  }, []);

  const rows = useMemo(() => {
    if (!artifact) return [];
    return artifact.elements.map(el => {
      const sel = selections[el.elementKey] || {};
      return recomputeRow(el, sel.estimateId, sel.projectionId);
    });
  }, [artifact, selections]);

  const profile = artifact?.artifact?.profile;
  const elements = artifact?.elements || [];
  const hasData = elements.length > 0;

  const drillElement = selectedKey ? elements.find(e => e.elementKey === selectedKey) : null;

  return (
    <div className="integrated-page">
      <div className="d-flex flex-items-center flex-justify-between mb-4">
        <div>
          <h1 className="f1">BVE — Integrated Leverage <span className="Label Label--accent ml-2" style={{ verticalAlign: 'middle', fontSize: '0.5em' }}>v2</span></h1>
          <p className="f4 color-fg-muted">Organizational capacity, measurement aperture, and integrated leverage</p>
        </div>
        {hasData && (
          <button className="btn btn-sm btn-outline" onClick={() => downloadLeverageSummary(artifact, elements, selections)}>
            ⬇ Download leverage-summary.json
          </button>
        )}
      </div>

      {loading && (
        <div className="Box p-4 text-center color-fg-muted">
          <p className="f3 mb-2">⏳</p>
          <p className="f5">Loading leverage-summary…</p>
        </div>
      )}

      {error && !hasData && (
        <div className="flash flash-warn f5 mb-3">
          ⚠️ {error}
          <p className="f6 mt-2 color-fg-muted">Run the pipeline: <code>./scripts/collect-and-materialize.sh</code></p>
        </div>
      )}

      {hasData && (
        <>
          <SummarySection profile={profile} rows={rows} />

          {/* Section 2: Evidence + Leverage Rectangle */}
          <div className="section-row">
            <SectionHeader title="Evidence & Leverage"
              desc="Per-element evidence table with selectable estimates and projections. Click a row to drill into its worksheet." />

            <EvidenceTable elements={elements} rows={rows} selections={selections}
              onSelectionChange={handleSelectionChange} selectedKey={selectedKey}
              onRowClick={k => setSelectedKey(prev => prev === k ? null : k)} />

            {drillElement && (
              <WorksheetDrilldown element={drillElement} selections={selections} />
            )}

            <div className="mt-4">
              <div className="d-flex flex-items-center mb-2" style={{ gap: '12px' }}>
                <div className="mode-toggle">
                  {MODES.map(m => (
                    <button key={m.key} className={m.key === rectMode ? 'active' : ''} onClick={() => setRectMode(m.key)}>
                      {m.label}
                    </button>
                  ))}
                </div>
                <span className="f6 color-fg-muted">{MODE_DESCRIPTIONS[rectMode]}</span>
              </div>
              <LeverageRectangle elements={elements} rows={rows} profile={profile} mode={rectMode} />
            </div>
          </div>

          {/* Section 4: Config */}
          <ConfigPanel config={profile.config_used} isOpen={configOpen} onToggle={() => setConfigOpen(o => !o)} />
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
