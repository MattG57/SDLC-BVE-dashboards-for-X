<!DOCTYPE html>
<html lang="en" data-color-mode="dark" data-dark-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BVE — Integrated Leverage (v2)</title>

<!-- Primer CSS -->
<link rel="stylesheet" href="https://unpkg.com/@primer/css@21.3.1/dist/primer.css">

<!-- Highcharts -->
<script src="https://cdn.jsdelivr.net/npm/highcharts@11.4.8/highcharts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highcharts@11.4.8/highcharts-more.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highcharts@11.4.8/modules/accessibility.js"></script>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<style>
  body { background: var(--bgColor-default); }
  .integrated-page { max-width: 1280px; margin: 0 auto; padding: 24px 16px; }

  .kpi-card { text-align: center; }
  .kpi-value { font-size: 2rem; font-weight: 600; line-height: 1.2; }
  .kpi-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-sub { font-size: 0.75rem; }
  .kpi-unit { font-size: 1.1rem; font-weight: 400; opacity: 0.65; margin-left: 2px; }

  .kpi-hero .kpi-value { font-size: 3rem; }
  .kpi-hero .kpi-label { font-size: 0.85rem; }
  .kpi-hero .kpi-sub { font-size: 0.85rem; }
  .kpi-hero { border-top: 3px solid var(--borderColor-accent-emphasis); }

  .section-row { margin-bottom: 32px; padding-top: 8px; }
  .chart-container { min-height: 320px; }

  .mode-toggle { display: inline-flex; border: 1px solid var(--borderColor-default); border-radius: 6px; overflow: hidden; }
  .mode-toggle button {
    padding: 4px 16px; font-size: 0.85rem; border: none; cursor: pointer;
    background: var(--bgColor-muted); color: var(--fgColor-muted); transition: all 0.15s;
  }
  .mode-toggle button + button { border-left: 1px solid var(--borderColor-default); }
  .mode-toggle button.active { background: var(--bgColor-accent-muted); color: var(--fgColor-accent); font-weight: 600; }

  .highcharts-background { fill: transparent !important; }
</style>

<body>
<div id="root"></div>
<script type="text/babel" data-type="module">

/* ═══════════════════════════════════════════════════════
   HIGHCHARTS DARK THEME
   ═══════════════════════════════════════════════════════ */
Highcharts.setOptions({
  chart: { backgroundColor: 'transparent', style: { fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif' } },
  colors: ['#58a6ff', '#3fb950', '#d29922', '#f85149', '#bc8cff', '#f778ba', '#79c0ff', '#56d364'],
  title: { style: { color: '#e6edf3', fontSize: '14px', fontWeight: '600' } },
  subtitle: { style: { color: '#8b949e', fontSize: '12px' } },
  xAxis: { labels: { style: { color: '#8b949e' } }, gridLineColor: '#30363d', lineColor: '#30363d', tickColor: '#30363d' },
  yAxis: { labels: { style: { color: '#8b949e' } }, gridLineColor: '#30363d', title: { style: { color: '#8b949e' } } },
  legend: { itemStyle: { color: '#e6edf3' }, itemHoverStyle: { color: '#58a6ff' } },
  tooltip: { backgroundColor: '#161b22', borderColor: '#30363d', style: { color: '#e6edf3' } },
  plotOptions: { series: { animation: { duration: 400 } } },
  credits: { enabled: false },
});


/* ═══════════════════════════════════════════════════════
   DATA LOADING — MATERIALIZED ARTIFACTS ONLY
   ═══════════════════════════════════════════════════════ */

async function fetchArtifacts() {
  const bases = ['../../dataflow/data/', '../dataflow/data/'];
  for (const base of bases) {
    try {
      const r = await fetch(base + 'pipeline-manifest.json');
      if (!r.ok) continue;
      const manifest = await r.json();
      const dir = base + 'materialized/';
      const find = prefix => (manifest.artifacts || []).find(f => f.startsWith(prefix));
      const files = {
        aiEff: find('ai-assisted-efficiency-days'),
        aiStr: find('ai-assisted-structural-days'),
        agEff: find('agentic-efficiency-days'),
        agSess: find('agentic-pr-sessions'),
      };
      if (!files.aiEff && !files.agEff) continue;
      const results = {};
      for (const [key, file] of Object.entries(files)) {
        if (file) results[key] = await fetch(dir + file).then(r => r.ok ? r.json() : null);
      }
      if (results.aiEff || results.agEff) return results;
    } catch(e) {}
  }
  return null;
}


/* ═══════════════════════════════════════════════════════
   DATA PROCESSING LAYER
   ═══════════════════════════════════════════════════════ */

function safeDiv(a, b) { return b > 0 ? a / b : null; }
function mean(arr) { const v = arr.filter(x => x != null); return v.length ? v.reduce((a, b) => a + b, 0) / v.length : null; }

const DEFAULT_CONFIG = {
  cfg_total_developers: 100,
  cfg_hrs_per_dev_per_day: 8,
  cfg_total_repos: null,
  cfg_workdays_per_week: 5,
  cfg_labor_cost_per_hour: null,
  cfg_pct_time_coding: 0.5,
  est_interactions_per_hour: 20,
  est_hrs_per_kloc: 2,
  est_duration_factor: 2,
  cfg_projection_cap_ai: 5,
  cfg_projection_cap_agentic: 9,
};


/* ── AI-Assisted Estimation Methods ── */
const AI_ESTIMATION_METHODS = [
  { key: 'interactions', label: 'Interactions-Based',
    descFn: (cfg) => `1 hour saved per ${cfg.est_interactions_per_hour || 20} interactions`,
    calc: (d, cfg) => (d.user_initiated_interaction_count || 0) / (cfg.est_interactions_per_hour || 20) },
  { key: 'loc', label: 'LoC-Based',
    descFn: (cfg) => `${cfg.est_hrs_per_kloc || 2} hours saved per 1,000 LoC added`,
    calc: (d, cfg) => ((d.loc_added_sum || 0) / 1000) * (cfg.est_hrs_per_kloc || 2) },
  { key: 'manual_daily_pct', label: 'Manual Daily %',
    descFn: (cfg) => `${cfg.cfg_time_saved_pct_day != null ? (cfg.cfg_time_saved_pct_day * 100).toFixed(1) + '%' : '—'} × ${((cfg.cfg_pct_time_coding || 0.5) * 100).toFixed(0)}% coding time`,
    calc: (d, cfg) => {
      const p = cfg.cfg_time_saved_pct_day, b = cfg.cfg_baseline_hours_per_dev_per_week, w = cfg.cfg_workdays_per_week || 5;
      const c = cfg.cfg_pct_time_coding || 0.5;
      return (p != null && b != null) ? (p * c * b / w) * (d.daily_active_users || 0) : null;
    }},
];


/* ── Agentic Estimation Methods ── */
const AGENTIC_ESTIMATION_METHODS = [
  { key: 'duration', label: 'Duration-Based',
    descFn: (cfg) => `Agent PR duration × ${cfg.est_duration_factor || 2}`,
    calc: (d, cfg) => ((d.merged_session_minutes || 0) / 60) * (cfg.est_duration_factor || 2),
    calcTotal: (prSessions, cfg) => {
      const multiplier = cfg.est_duration_factor || 2;
      return prSessions.filter(pr => pr.duration_minutes != null).reduce((s, pr) => s + pr.duration_minutes, 0) * multiplier / 60;
    }},
  { key: 'loc', label: 'LoC-Based',
    descFn: (cfg) => `${cfg.est_hrs_per_kloc || 2} hours per 1,000 LoC merged`,
    calc: (d, cfg) => ((d.merged_loc_added || 0) / 1000) * (cfg.est_hrs_per_kloc || 2),
    calcTotal: (prSessions, cfg) => {
      const rate = cfg.est_hrs_per_kloc || 2;
      return prSessions.filter(pr => pr.merged).reduce((s, pr) => s + ((pr.additions || 0) + (pr.deletions || 0)) / 1000 * rate, 0);
    }},
];


/* ── computeDerived — AI-Assisted days ── */
function computeDerived(days, config, selectedMethod) {
  const method = AI_ESTIMATION_METHODS.find(m => m.key === selectedMethod) || AI_ESTIMATION_METHODS[0];
  return days.map(d => {
    const dau = d.daily_active_users || 0;
    const estimates = {};
    for (const m of AI_ESTIMATION_METHODS) {
      const raw = m.calc(d, config);
      estimates['est_' + m.key + '_hrs_day'] = raw;
      estimates['est_' + m.key + '_hrs_per_dev_day'] = safeDiv(raw, dau);
    }
    const selectedHrsDay = method.calc(d, config);
    return {
      ...d, ...estimates,
      acceptance_rate: safeDiv(d.code_acceptance_activity_count, d.code_generation_activity_count),
      time_saved_hours_total_day: selectedHrsDay,
      time_saved_hours_per_dev_per_day: safeDiv(selectedHrsDay, dau),
    };
  });
}


/* ── computeAgenticDerived — Agentic days ── */
function computeAgenticDerived(dayRows, config, selectedMethod) {
  const method = AGENTIC_ESTIMATION_METHODS.find(m => m.key === selectedMethod) || AGENTIC_ESTIMATION_METHODS[0];
  return dayRows.map(d => {
    const devs = d.active_devs;
    const estimates = {};
    for (const m of AGENTIC_ESTIMATION_METHODS) {
      const raw = m.calc(d, config);
      estimates['est_' + m.key + '_hrs_day'] = raw;
      estimates['est_' + m.key + '_hrs_per_dev_day'] = safeDiv(raw, devs);
    }
    const selectedHrsDay = method.calc(d, config);
    return {
      ...d, ...estimates,
      agent_session_hours: (d.agent_session_minutes || 0) / 60,
      time_saved_hours_total_day: selectedHrsDay,
      time_saved_hours_per_dev_per_day: safeDiv(selectedHrsDay, devs),
    };
  });
}


/* ── computeAiAssistedMetrics — aggregate metrics ── */
function computeAiAssistedMetrics(enrichedDays, structuralArt, config, aiMethod) {
  if (!enrichedDays || !enrichedDays.length) return null;
  const days = enrichedDays;
  const n = days.length;
  const totalDevs = config.cfg_total_developers || 100;
  const pctTimeCoding = config.cfg_pct_time_coding || 0.5;
  const avgDau = mean(days.map(d => d.daily_active_users));

  const activeDevHours = days.reduce((s, d) => s + (d.daily_active_users || 0) * pctTimeCoding * 8, 0);

  const strData = structuralArt?.data || [];
  const hasPrData = strData.some(d => d.has_pr_data || d.total_prs > 0);
  const totalCompletions = hasPrData
    ? strData.reduce((s, d) => s + (d.total_prs || 0), 0)
    : days.reduce((s, d) => s + (d.pr_total_created || 0), 0);

  const method = AI_ESTIMATION_METHODS.find(m => m.key === aiMethod) || AI_ESTIMATION_METHODS[0];
  const timeSaved = days.reduce((s, d) => s + (d['est_' + method.key + '_hrs_day'] || 0), 0);

  const adoptionPct = safeDiv(avgDau, totalDevs);
  const avgPrsAssisted = structuralArt?._periodPrsAssistedPct ?? mean(strData.map(d => d.prs_assisted_pct));
  const avgLocPct = structuralArt?._periodLocAssistedPct ?? mean(strData.map(d => d.ai_assisted_loc_pct));

  const factors = [
    { key: 'adoption', label: 'Adoption', current: adoptionPct },
    { key: 'prs_assisted', label: '% PRs Assisted', current: avgPrsAssisted },
    { key: 'loc_assisted', label: '% AI-Assisted LOC', current: avgLocPct },
  ];

  return { activeDevHours, totalCompletions, timeSaved, factors, avgDau, n };
}


/* ── computeAgenticMetrics — aggregate metrics ── */
function computeAgenticMetrics(enrichedDays, prSessions, config, agenticMethod) {
  if (!enrichedDays || !enrichedDays.length) return null;
  const days = enrichedDays;
  const sessions = prSessions || [];
  const n = days.length;
  const totalDevs = config.cfg_total_developers || 100;
  const totalRepos = config.cfg_total_repos;

  const estMethod = AGENTIC_ESTIMATION_METHODS.find(m => m.key === agenticMethod) || AGENTIC_ESTIMATION_METHODS[0];

  const activeDevHours = sessions.length > 0
    ? estMethod.calcTotal(sessions, config)
    : days.reduce((s, d) => s + (d['est_' + estMethod.key + '_hrs_day'] || 0), 0);

  const totalMerged = sessions.length > 0
    ? sessions.filter(pr => pr.merged).length
    : days.reduce((s, d) => s + (d.agent_prs_merged || 0), 0);
  const totalCreated = sessions.length > 0
    ? sessions.length
    : days.reduce((s, d) => s + (d.agent_prs_created || 0), 0);
  const totalCompletions = totalMerged;

  const avgActiveDevs = mean(days.map(d => d.active_devs));
  const adoptionPct = safeDiv(avgActiveDevs, totalDevs);
  const overallMergeRate = safeDiv(totalMerged, totalCreated);
  const activeRepos = sessions.length > 0
    ? new Set(sessions.map(pr => pr.repo).filter(Boolean)).size
    : null;
  const repoCoverage = totalRepos && activeRepos ? safeDiv(activeRepos, totalRepos) : null;

  const factors = [
    { key: 'adoption', label: 'Adoption', current: adoptionPct },
    { key: 'merge_rate', label: 'Merge Rate', current: overallMergeRate },
    { key: 'coverage', label: 'Repo Coverage', current: repoCoverage },
  ];

  return { activeDevHours, totalCompletions, timeSaved: activeDevHours, factors, totalMerged, totalCreated, avgActiveDevs, n };
}


/* ── computeElementAtMode — returns { elements, capacity } ── */
function computeElementAtMode(mode, aiMetrics, agenticMetrics, config, daysInRange) {
  const elements = [];
  let capacity = null;
  const projCapAi = config.cfg_projection_cap_ai || 5;
  const projCapAgentic = config.cfg_projection_cap_agentic || 9;

  if (aiMetrics) {
    let devHours, completions, chosenFactor = null;
    const currentLeverage = safeDiv(aiMetrics.totalCompletions, aiMetrics.activeDevHours);
    const leverageCap = (currentLeverage || 0) * projCapAi;

    if (mode === 'aperture' || mode === 'current') {
      devHours = aiMetrics.activeDevHours;
      completions = aiMetrics.totalCompletions;
    } else if (mode === 'unimproved') {
      devHours = aiMetrics.activeDevHours + aiMetrics.timeSaved;
      completions = aiMetrics.totalCompletions;
    } else if (mode === 'projected') {
      const validFactors = aiMetrics.factors.filter(f => f.current != null && f.current > 0 && f.current < 1);
      if (validFactors.length > 0) {
        const projections = validFactors.map(f => {
          const potentialAdditional = aiMetrics.timeSaved * ((1 / f.current) - 1);
          const improvedHours = Math.max(aiMetrics.activeDevHours - potentialAdditional, 0);
          const leverage = safeDiv(aiMetrics.totalCompletions, improvedHours);
          return { factor: f, potentialAdditional, improvedHours, leverage: leverage || 0 };
        });
        projections.sort((a, b) => a.leverage - b.leverage);
        const capped = projections.filter(p => p.leverage <= leverageCap);
        const pick = capped.length > 0 ? capped[capped.length - 1] : projections[0];
        devHours = pick.improvedHours;
        completions = aiMetrics.totalCompletions;
        chosenFactor = pick.factor.label;
      } else {
        devHours = aiMetrics.activeDevHours;
        completions = aiMetrics.totalCompletions;
      }
    }
    elements.push({ name: 'AI-Assisted', color: '#58a6ff', rgbaFill: 'rgba(88,166,255,0.18)', devHours, completions, chosenFactor });
  }

  if (agenticMetrics) {
    let devHours, completions, chosenFactor = null;
    const currentLeverage = safeDiv(agenticMetrics.totalCompletions, agenticMetrics.activeDevHours);
    const leverageCap = (currentLeverage || 0) * projCapAgentic;

    if (mode === 'aperture' || mode === 'current') {
      devHours = agenticMetrics.activeDevHours;
      completions = agenticMetrics.totalCompletions;
    } else if (mode === 'unimproved') {
      devHours = 0;
      completions = 0;
    } else if (mode === 'projected') {
      const validFactors = agenticMetrics.factors.filter(f => f.current != null && f.current > 0 && f.current < 1);
      if (validFactors.length > 0) {
        const projections = validFactors.map(f => {
          const scaleFactor = 1 / f.current;
          const projectedCompletions = Math.round(agenticMetrics.totalCompletions * scaleFactor);
          const projectedDevHours = agenticMetrics.activeDevHours * scaleFactor;
          return { factor: f, scaleFactor, projectedCompletions, projectedDevHours };
        });
        projections.sort((a, b) => a.scaleFactor - b.scaleFactor);
        const capped = projections.filter(p => p.scaleFactor <= projCapAgentic);
        const pick = capped.length > 0 ? capped[capped.length - 1] : projections[0];
        devHours = pick.projectedDevHours;
        completions = pick.projectedCompletions;
        chosenFactor = pick.factor.label;
      } else {
        devHours = agenticMetrics.activeDevHours;
        completions = agenticMetrics.totalCompletions;
      }
    }
    elements.push({ name: 'Agentic', color: '#3fb950', rgbaFill: 'rgba(63,185,80,0.18)', devHours, completions, chosenFactor });
  }

  // Aperture mode: include org capacity rectangle
  if (mode === 'aperture' && daysInRange > 0) {
    const totalOrgDevHours = (config.cfg_total_developers || 100) * daysInRange * (config.cfg_hrs_per_dev_per_day || 8);
    const totalCompletions = elements.reduce((s, e) => s + (e.completions || 0), 0);
    capacity = { devHours: totalOrgDevHours, completions: totalCompletions };
  }

  return { elements, capacity };
}


/* ═══════════════════════════════════════════════════════
   REACT COMPONENTS
   ═══════════════════════════════════════════════════════ */
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ── Formatting helpers ── */
const fmt = n => n == null ? '—' : Number(n).toLocaleString(undefined, { maximumFractionDigits: 0 });
const fmtDec = (n, d=1) => n == null ? '—' : Number(n).toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d });
const fmtPct = n => n == null ? '—' : (n * 100).toFixed(1) + '%';
const fmtPct0 = n => n == null ? '—' : Math.round(n * 100) + '%';
const fmtCompact = n => {
  if (n == null) return '—';
  if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(1) + 'k';
  return Number(n).toLocaleString(undefined, { maximumFractionDigits: 0 });
};
const fmtCurrency = n => {
  if (n == null) return '—';
  if (Math.abs(n) >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'k';
  return '$' + Number(n).toLocaleString(undefined, { maximumFractionDigits: 0 });
};
const fmtShortDate = d => {
  if (!d) return '—';
  const dt = new Date(d + 'T12:00:00Z');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' });
};

/* ── Highcharts wrapper ── */
function Chart({ options, className = 'chart-container' }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (ref.current) chartRef.current = Highcharts.chart(ref.current, options);
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(options)]);
  return <div ref={ref} className={className} />;
}

/* ── KPI Card ── */
function KpiCard({ label, value, unit, sub, color, hero }) {
  return (
    <div className={`Box p-3 kpi-card${hero ? ' kpi-hero' : ''}`}>
      <div className="kpi-label color-fg-muted mb-1">{label}</div>
      <div className="kpi-value" style={color ? { color } : {}}>
        {value}{unit && <span className="kpi-unit">{unit}</span>}
      </div>
      {sub && <div className="kpi-sub color-fg-muted mt-1">{sub}</div>}
    </div>
  );
}

/* ── Section Header ── */
function SectionHeader({ title, desc }) {
  return (
    <div className="mb-3 pb-2" style={{ borderBottom: '1px solid var(--borderColor-default)', borderTop: '2px solid var(--borderColor-muted)', paddingTop: '12px' }}>
      <h2 className="f2 color-fg-accent">{title}</h2>
      {desc && <p className="f6 color-fg-muted">{desc}</p>}
    </div>
  );
}


/* ═══════════════════════════════════════════════════════
   MODE DEFINITIONS
   ═══════════════════════════════════════════════════════ */
const MODES = [
  { key: 'aperture', label: 'Aperture' },
  { key: 'unimproved', label: 'Unimproved' },
  { key: 'projected', label: 'Projected' },
];

const MODE_DESCRIPTIONS = {
  aperture: 'Shows total organizational capacity vs the portion currently measured. The aperture is the fraction of dev-hours covered.',
  unimproved: 'Counterfactual: AI-assisted time saved is added back to dev-hours. Agentic capacity would not exist without the agent.',
  projected: 'Projects current leverage to full structural coverage — adoption, assist %, and merge rate all at 100%.',
};


/* ═══════════════════════════════════════════════════════
   SECTION 1 — SUMMARY
   ═══════════════════════════════════════════════════════ */
function SummarySection({ aiDays, agDays, config, aiMetrics, agenticMetrics }) {
  const allDays = [...(aiDays || []).map(d => d.day), ...(agDays || []).map(d => d.day)].filter(Boolean).sort();
  const firstDay = allDays[0];
  const lastDay = allDays[allDays.length - 1];
  const daysInRange = allDays.length > 0 ? Math.round((new Date(lastDay) - new Date(firstDay)) / 86400000) + 1 : 0;

  const totalOrgDevHours = (config.cfg_total_developers || 100) * daysInRange * (config.cfg_hrs_per_dev_per_day || 8);
  const modeledDevHours = (aiMetrics?.activeDevHours || 0) + (agenticMetrics?.activeDevHours || 0);
  const aperture = safeDiv(modeledDevHours, totalOrgDevHours);
  const totalHoursSaved = (aiMetrics?.timeSaved || 0) + (agenticMetrics?.timeSaved || 0);
  const economicValue = config.cfg_labor_cost_per_hour != null ? totalHoursSaved * config.cfg_labor_cost_per_hour : null;

  return (
    <div className="section-row">
      <SectionHeader title="Summary"
        desc="Summary of total organizational dev capacity, the fraction measured across leverage elements, and the estimated impact." />
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(170px, 1fr))', gap: '12px' }}>
        <KpiCard label="Time Range"
          value={firstDay ? `${fmtShortDate(firstDay)} – ${fmtShortDate(lastDay)}` : '—'}
          sub={daysInRange > 0 ? `${daysInRange} days` : 'no data'} />
        <KpiCard label="Org Capacity" value={fmtCompact(totalOrgDevHours)} unit="hrs"
          sub={`${config.cfg_total_developers} devs × ${daysInRange}d × ${config.cfg_hrs_per_dev_per_day || 8}h`} />
        <KpiCard label="Modeled Dev-Hours" value={fmtCompact(modeledDevHours)} unit="hrs"
          sub="observed across elements" color="#58a6ff" />
        <KpiCard label="Aperture" value={fmtPct(aperture)}
          sub="modeled / org capacity" color="#d29922" />
        <KpiCard label="Total Hours Saved" value={fmtDec(totalHoursSaved, 0)} unit="hrs"
          sub="AI-assisted + agentic" color="#3fb950" />
        <KpiCard label="Economic Value"
          value={economicValue != null ? fmtCurrency(economicValue) : '—'}
          sub={economicValue != null ? `at $${config.cfg_labor_cost_per_hour}/hr` : 'set in config'}
          color={economicValue != null ? '#d29922' : undefined} />
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════════════════
   SECTION 2 — INTEGRATED LEVERAGE RECTANGLE
   ═══════════════════════════════════════════════════════ */
function LeverageSection({ aiMetrics, agenticMetrics, aiDays, agDays, config }) {
  const [mode, setMode] = useState('aperture');

  const daysInRange = useMemo(() => {
    const allDays = [...(aiDays || []).map(d => d.day), ...(agDays || []).map(d => d.day)].filter(Boolean).sort();
    if (allDays.length === 0) return 0;
    return Math.round((new Date(allDays[allDays.length - 1]) - new Date(allDays[0])) / 86400000) + 1;
  }, [aiDays, agDays]);

  const { elements, capacity } = useMemo(
    () => computeElementAtMode(mode, aiMetrics, agenticMetrics, config, daysInRange),
    [mode, aiMetrics, agenticMetrics, config, daysInRange]
  );

  // Fixed axis scales across all modes
  const { fixedXMax, fixedYMax } = useMemo(() => {
    let maxW = 0, maxH = 0;
    for (const m of ['aperture', 'unimproved', 'projected']) {
      const { elements: els, capacity: cap } = computeElementAtMode(m, aiMetrics, agenticMetrics, config, daysInRange);
      const elW = els.reduce((s, e) => s + (e.devHours || 0), 0);
      const elH = els.reduce((s, e) => s + (e.completions || 0), 0);
      const w = cap ? Math.max(elW, cap.devHours) : elW;
      const h = cap ? Math.max(elH, cap.completions) : elH;
      if (w > maxW) maxW = w;
      if (h > maxH) maxH = h;
    }
    return { fixedXMax: maxW > 0 ? maxW * 1.15 : 10, fixedYMax: maxH > 0 ? maxH * 1.15 : 10 };
  }, [aiMetrics, agenticMetrics, config, daysInRange]);

  const totalDevHours = elements.reduce((s, e) => s + (e.devHours || 0), 0);
  const totalCompletions = elements.reduce((s, e) => s + (e.completions || 0), 0);
  const integratedLeverage = safeDiv(totalCompletions, totalDevHours);
  const aperturePct = capacity ? safeDiv(totalDevHours, capacity.devHours) : null;

  // Build chart series
  const series = [];

  // Capacity rectangle (aperture mode only)
  if (capacity && capacity.devHours > 0 && capacity.completions > 0) {
    series.push({
      type: 'polygon', name: 'Org Capacity',
      data: [[0, 0], [capacity.devHours, 0], [capacity.devHours, capacity.completions], [0, capacity.completions]],
      color: 'rgba(139,148,158,0.06)', lineWidth: 2, lineColor: '#8b949e', dashStyle: 'ShortDash',
      enableMouseTracking: true,
      tooltip: { headerFormat: '', pointFormat: `<b>Org Capacity</b><br/>Dev-Hours: ${fmtCompact(capacity.devHours)}<br/>Aperture: ${fmtPct(aperturePct)}` },
    });
  }

  // Element sub-rectangles side-by-side
  let xOffset = 0;
  for (const elem of elements) {
    const w = elem.devHours || 0;
    const h = elem.completions || 0;
    if (w > 0 && h > 0) {
      series.push({
        type: 'polygon', name: elem.name,
        data: [[xOffset, 0], [xOffset + w, 0], [xOffset + w, h], [xOffset, h]],
        color: elem.rgbaFill, lineWidth: 2, lineColor: elem.color,
        enableMouseTracking: true,
        tooltip: {
          headerFormat: '',
          pointFormat: `<b>${elem.name}</b><br/>Dev-Hours: ${fmtCompact(w)}<br/>Completions: ${fmtCompact(h)}<br/>Leverage: ${fmtDec(safeDiv(h, w), 3)}${elem.chosenFactor ? '<br/>Factor: ' + elem.chosenFactor + ' → 100%' : ''}`,
        },
      });
    } else if (w === 0 && h === 0 && mode === 'unimproved' && elem.name === 'Agentic') {
      series.push({
        type: 'scatter', name: `${elem.name} (zero)`,
        data: [{ x: xOffset, y: 0 }],
        color: elem.color,
        marker: { radius: 8, symbol: 'circle', lineWidth: 2, lineColor: elem.color, fillColor: 'rgba(63,185,80,0.3)' },
        tooltip: {
          headerFormat: '',
          pointFormat: `<b>${elem.name} (Counterfactual)</b><br/>Without the agent: 0 dev-hours, 0 completions.<br/>This is purely additive capacity.`,
        },
      });
    }
    xOffset += w;
  }

  // Diagonal leverage line from origin through the combined point
  if (totalDevHours > 0 && totalCompletions > 0) {
    series.push({
      type: 'line', name: `Leverage = ${fmtDec(integratedLeverage, 3)}`,
      data: [[0, 0], [totalDevHours, totalCompletions]],
      color: '#d29922', dashStyle: 'Dash', lineWidth: 2,
      marker: { enabled: true, radius: 5, symbol: 'circle' },
      enableMouseTracking: false,
    });
  }

  const chartOpts = {
    chart: { type: 'scatter', height: 480 },
    title: { text: 'Integrated Leverage Rectangle' },
    subtitle: { text: null },
    xAxis: {
      title: { text: 'Dev-Hours', style: { fontSize: '13px', fontWeight: '600' } },
      min: 0, max: fixedXMax, gridLineWidth: 1,
      labels: { formatter: function() { return fmtCompact(this.value); } },
    },
    yAxis: {
      title: { text: 'Completions', style: { fontSize: '13px', fontWeight: '600' } },
      min: 0, max: fixedYMax,
      labels: { formatter: function() { return fmtCompact(this.value); } },
    },
    tooltip: { useHTML: true, headerFormat: '' },
    legend: { enabled: true, align: 'center', verticalAlign: 'bottom' },
    plotOptions: { series: { animation: { duration: 600 }, states: { inactive: { opacity: 0.6 } } } },
    series,
  };

  return (
    <div className="section-row">
      <SectionHeader title="Integrated Leverage" desc="Leverage rectangle — completions per dev-hour across projection modes" />

      {/* Mode buttons */}
      <div className="mode-toggle mb-2">
        {MODES.map(m => (
          <button key={m.key} className={m.key === mode ? 'active' : ''} onClick={() => setMode(m.key)}>
            {m.label}
          </button>
        ))}
      </div>

      {/* Mode explanation */}
      <p className="f6 color-fg-muted mb-3">{MODE_DESCRIPTIONS[mode]}</p>

      {/* KPI row */}
      <div className="d-flex flex-wrap mb-3" style={{ gap: '12px' }}>
        <div style={{ flex: '1 1 140px' }}>
          <KpiCard label="Total Dev-Hours" value={fmtCompact(totalDevHours)} sub="sum across elements" />
        </div>
        <div style={{ flex: '1 1 140px' }}>
          <KpiCard label="Total Completions" value={fmtCompact(totalCompletions)} sub="sum across elements" />
        </div>
        <div style={{ flex: '0 0 200px' }}>
          <KpiCard hero label="Integrated Leverage" value={fmtDec(integratedLeverage, 3)} sub="completions / dev-hours" color="#3fb950" />
        </div>
        {mode === 'aperture' && (
          <div style={{ flex: '1 1 140px' }}>
            <KpiCard label="Aperture" value={fmtPct(aperturePct)} sub="modeled / capacity" color="#d29922" />
          </div>
        )}
      </div>

      {/* Chart */}
      <div className="Box p-3">
        <Chart options={chartOpts} />
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════════════════
   SECTION 3 — CONFIG PANEL
   ═══════════════════════════════════════════════════════ */
function ConfigPanel({ config, onApply, isOpen, onToggle, aiMethod, onAiMethodChange, agenticMethod, onAgenticMethodChange }) {
  const [cfg, setCfg] = useState(config);
  useEffect(() => setCfg(config), [config]);
  const set = (k, v) => setCfg(prev => ({ ...prev, [k]: v }));
  const apply = () => onApply(cfg);

  const fields = [
    { section: 'Organization', items: [
      { key: 'cfg_total_developers', label: 'Total Developers', type: 'number' },
      { key: 'cfg_hrs_per_dev_per_day', label: 'Hours per Dev per Day', type: 'number' },
      { key: 'cfg_labor_cost_per_hour', label: 'Labor Cost $/hr', type: 'number' },
      { key: 'cfg_workdays_per_week', label: 'Workdays / Week', type: 'number' },
    ]},
    { section: 'AI-Assisted Estimation', items: [
      { key: 'est_interactions_per_hour', label: 'Interactions per Hour Saved', type: 'number' },
      { key: 'est_hrs_per_kloc', label: 'Hrs Saved per 1K LoC', type: 'number', step: '0.5' },
      { key: 'cfg_pct_time_coding', label: '% Time Coding (0–1)', type: 'number', step: '0.05' },
    ]},
    { section: 'Manual Daily % Parameters', items: [
      { key: 'cfg_time_saved_pct_day', label: 'Time Saved % (0–1)', type: 'number', step: '0.01' },
      { key: 'cfg_baseline_hours_per_dev_per_week', label: 'Baseline Hrs / Dev / Week', type: 'number' },
    ]},
    { section: 'Agentic Estimation', items: [
      { key: 'est_duration_factor', label: 'Duration Multiplier', type: 'number', step: '1' },
    ]},
    { section: 'Projection Caps', items: [
      { key: 'cfg_projection_cap_ai', label: 'AI Leverage Cap (×)', type: 'number', step: '1' },
      { key: 'cfg_projection_cap_agentic', label: 'Agentic Scale Cap (×)', type: 'number', step: '1' },
    ]},
  ];

  const summary = `${cfg.cfg_total_developers} devs · ${cfg.cfg_hrs_per_dev_per_day || 8}h/d`;

  return (
    <div className="Box mt-4" style={{ borderColor: isOpen ? 'var(--borderColor-accent-emphasis)' : undefined }}>
      <div className="Box-header d-flex flex-items-center flex-justify-between" style={{ cursor: 'pointer' }} onClick={onToggle}>
        <div className="d-flex flex-items-center" style={{ gap: '8px' }}>
          <span style={{ transition: 'transform 0.15s', transform: isOpen ? 'rotate(90deg)' : 'rotate(0deg)', display: 'inline-block' }}>▶</span>
          <h4 className="f5 mb-0">Configuration</h4>
        </div>
        <span className="f6 color-fg-muted">{summary}</span>
      </div>
      {isOpen && (
        <div className="Box-body">
          {fields.map(section => (
            <div key={section.section} className="mb-3">
              <h5 className="f6 color-fg-muted text-bold mb-2">{section.section}</h5>
              <div className="d-flex flex-wrap" style={{ gap: '12px', alignItems: 'flex-end' }}>
                {section.items.map(f => (
                  <div key={f.key} className="form-group mb-0" style={{ flex: '1 1 160px' }}>
                    <label className="f6 color-fg-muted">{f.label}</label>
                    <input type={f.type} className="form-control input-sm" step={f.step || '1'}
                      value={cfg[f.key] ?? ''} onChange={e => set(f.key, e.target.value === '' ? null : parseFloat(e.target.value))} />
                  </div>
                ))}
              </div>
            </div>
          ))}

          <div className="mb-3">
            <h5 className="f6 color-fg-muted text-bold mb-2">AI-Assisted Time Saved Method</h5>
            <div className="d-flex flex-wrap" style={{ gap: '8px' }}>
              {AI_ESTIMATION_METHODS.map(m => (
                <button key={m.key} className={`btn btn-sm${m.key === aiMethod ? ' btn-primary' : ''}`}
                  onClick={() => onAiMethodChange(m.key)}>{m.label}</button>
              ))}
            </div>
          </div>

          <div className="mb-3">
            <h5 className="f6 color-fg-muted text-bold mb-2">Agentic Dev-Hours Method</h5>
            <div className="d-flex flex-wrap" style={{ gap: '8px' }}>
              {AGENTIC_ESTIMATION_METHODS.map(m => (
                <button key={m.key} className={`btn btn-sm${m.key === agenticMethod ? ' btn-primary' : ''}`}
                  onClick={() => onAgenticMethodChange(m.key)}>{m.label}</button>
              ))}
            </div>
          </div>

          <div className="d-flex flex-items-center mt-3" style={{ gap: '8px' }}>
            <button className="btn btn-sm btn-primary" onClick={apply}>Apply & Recalculate</button>
            <button className="btn btn-sm btn-outline" onClick={() => {
              const blob = new Blob([JSON.stringify(cfg, null, 2)], { type: 'application/json' });
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a'); a.href = url; a.download = 'integrated-config.json'; a.click();
              URL.revokeObjectURL(url);
            }}>💾 Save config.json</button>
          </div>
        </div>
      )}
    </div>
  );
}


/* ═══════════════════════════════════════════════════════
   APP
   ═══════════════════════════════════════════════════════ */
function App() {
  const [rawArts, setRawArts] = useState(null);
  const [aiDays, setAiDays] = useState(null);
  const [aiBaseDays, setAiBaseDays] = useState(null);
  const [agDays, setAgDays] = useState(null);
  const [agBaseDays, setAgBaseDays] = useState(null);
  const [config, setConfig] = useState({ ...DEFAULT_CONFIG });
  const [configOpen, setConfigOpen] = useState(false);
  const [aiMethod, setAiMethod] = useState('interactions');
  const [agenticMethod, setAgenticMethod] = useState('duration');
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    fetchArtifacts().then(arts => {
      if (!arts) {
        setError('No materialized artifacts found.');
        setLoading(false);
        return;
      }
      setRawArts(arts);

      let baseDaysAi = null;
      if (arts.aiEff?.data?.length) {
        baseDaysAi = [...arts.aiEff.data].sort((a, b) => (a.day||'').localeCompare(b.day||''));
        setAiBaseDays(baseDaysAi);
        setAiDays(computeDerived(baseDaysAi, DEFAULT_CONFIG, 'interactions'));
      }

      let baseDaysAg = null;
      if (arts.agEff?.data?.length) {
        baseDaysAg = [...arts.agEff.data].sort((a, b) => (a.day||'').localeCompare(b.day||''));

        const needsMerged = baseDaysAg.length > 0 &&
          baseDaysAg[0].merged_session_minutes == null &&
          baseDaysAg[0].merged_loc_added == null;
        if (needsMerged && arts.agSess?.data) {
          const mergedByDay = {};
          for (const pr of arts.agSess.data) {
            if (!pr.merged) continue;
            const day = pr.day || '';
            if (!day) continue;
            if (!mergedByDay[day]) mergedByDay[day] = { mins: 0, loc: 0 };
            mergedByDay[day].mins += (pr.duration_minutes || 0);
            mergedByDay[day].loc += (pr.additions || 0);
          }
          baseDaysAg = baseDaysAg.map(d => ({
            ...d,
            merged_session_minutes: d.merged_session_minutes ?? (mergedByDay[d.day]?.mins || 0),
            merged_loc_added: d.merged_loc_added ?? (mergedByDay[d.day]?.loc || 0),
          }));
        }

        setAgBaseDays(baseDaysAg);
        setAgDays(computeAgenticDerived(baseDaysAg, DEFAULT_CONFIG, 'duration'));
      }

      if (!baseDaysAi && !baseDaysAg) setError('No data found in artifacts.');
      setLoading(false);
    }).catch(e => {
      console.error('Artifact load error:', e);
      setError('Failed to load artifacts: ' + e.message);
      setLoading(false);
    });
  }, []);

  const handleAiMethodChange = useCallback((m) => {
    setAiMethod(m);
    if (aiBaseDays) setAiDays(computeDerived(aiBaseDays, config, m));
  }, [aiBaseDays, config]);

  const handleAgenticMethodChange = useCallback((m) => {
    setAgenticMethod(m);
    if (agBaseDays) setAgDays(computeAgenticDerived(agBaseDays, config, m));
  }, [agBaseDays, config]);

  const handleConfigApply = useCallback((cfg) => {
    setConfig(cfg);
    if (aiBaseDays) setAiDays(computeDerived(aiBaseDays, cfg, aiMethod));
    if (agBaseDays) setAgDays(computeAgenticDerived(agBaseDays, cfg, agenticMethod));
  }, [aiBaseDays, agBaseDays, aiMethod, agenticMethod]);

  const aiMetrics = useMemo(
    () => computeAiAssistedMetrics(aiDays, rawArts?.aiStr, config, aiMethod),
    [aiDays, rawArts, config, aiMethod]
  );
  const agenticMetrics = useMemo(
    () => computeAgenticMetrics(agDays, rawArts?.agSess?.data, config, agenticMethod),
    [agDays, rawArts, config, agenticMethod]
  );

  const hasData = aiDays || agDays;

  return (
    <div className="integrated-page">
      <div className="mb-4">
        <h1 className="f1">BVE — Integrated Leverage <span className="Label Label--accent ml-2" style={{ verticalAlign: 'middle', fontSize: '0.5em' }}>v2</span></h1>
        <p className="f4 color-fg-muted">Organizational capacity, measurement aperture, and integrated leverage</p>
      </div>

      {loading && (
        <div className="Box p-4 text-center color-fg-muted">
          <p className="f3 mb-2">⏳</p>
          <p className="f5">Loading materialized artifacts…</p>
        </div>
      )}

      {error && !hasData && (
        <div className="flash flash-warn f5 mb-3">
          ⚠️ {error}
          <p className="f6 mt-2 color-fg-muted">Run the pipeline: <code>./scripts/collect-and-materialize.sh</code></p>
        </div>
      )}

      {hasData && (
        <>
          <SummarySection aiDays={aiDays} agDays={agDays} config={config}
            aiMetrics={aiMetrics} agenticMetrics={agenticMetrics} />

          <LeverageSection aiMetrics={aiMetrics} agenticMetrics={agenticMetrics}
            aiDays={aiDays} agDays={agDays} config={config} />

          <ConfigPanel config={config} onApply={handleConfigApply}
            isOpen={configOpen} onToggle={() => setConfigOpen(o => !o)}
            aiMethod={aiMethod} onAiMethodChange={handleAiMethodChange}
            agenticMethod={agenticMethod} onAgenticMethodChange={handleAgenticMethodChange} />
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
