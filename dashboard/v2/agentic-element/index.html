<!DOCTYPE html>

<body>
<div id="root"></div>
<script type="text/babel" data-type="module">

/* ═══════════════════════════════════════════════════════
   HIGHCHARTS DARK THEME (GitHub-aligned)
   ═══════════════════════════════════════════════════════ */
Highcharts.setOptions({
  chart: { backgroundColor: 'transparent', style: { fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif' } },
  colors: ['#58a6ff', '#3fb950', '#d29922', '#f85149', '#bc8cff', '#f778ba', '#79c0ff', '#56d364'],
  title: { style: { color: '#e6edf3', fontSize: '14px', fontWeight: '600' } },
  subtitle: { style: { color: '#8b949e', fontSize: '12px' } },
  xAxis: { labels: { style: { color: '#8b949e' } }, gridLineColor: '#30363d', lineColor: '#30363d', tickColor: '#30363d' },
  yAxis: { labels: { style: { color: '#8b949e' } }, gridLineColor: '#30363d', title: { style: { color: '#8b949e' } } },
  legend: { itemStyle: { color: '#e6edf3' }, itemHoverStyle: { color: '#58a6ff' } },
  tooltip: { backgroundColor: '#161b22', borderColor: '#30363d', style: { color: '#e6edf3' } },
  plotOptions: { series: { animation: { duration: 400 } } },
  credits: { enabled: false },
});

/* ═══════════════════════════════════════════════════════
   DATA LOADING — MATERIALIZED ARTIFACTS ONLY
   ═══════════════════════════════════════════════════════ */

async function fetchArtifacts() {
  const bases = ['../../dataflow/data/', '../dataflow/data/'];
  for (const base of bases) {
    try {
      const r = await fetch(base + 'pipeline-manifest.json');
      if (!r.ok) continue;
      const manifest = await r.json();
      const effFile = (manifest.artifacts || []).find(f => f.startsWith('agentic-efficiency-days'));
      const sessFile = (manifest.artifacts || []).find(f => f.startsWith('agentic-pr-sessions'));
      if (!effFile) continue;
      const dir = base + 'materialized/';
      const [eff, sess] = await Promise.all([
        fetch(dir + effFile).then(r => r.ok ? r.json() : null),
        sessFile ? fetch(dir + sessFile).then(r => r.ok ? r.json() : null) : null,
      ]);
      if (eff) return { efficiency: eff, sessions: sess };
    } catch(e) {}
  }
  return null;
}

/* ═══════════════════════════════════════════════════════
   DATA PROCESSING LAYER
   ═══════════════════════════════════════════════════════ */

function safeDiv(a, b) { return b > 0 ? a / b : null; }

const DEFAULT_CONFIG = {
  cfg_total_developers: 100,
  cfg_total_repos: null,
  cfg_workdays_per_week: 5,
  cfg_labor_cost_per_hour: null,
  est_duration_factor: 2,
  est_hrs_per_kloc: 2,
};

/* ── Estimation method definitions ── */
const ESTIMATION_METHODS = [
  { key: 'duration', label: 'Duration-Based (Merged)',
    descFn: (cfg) => `${cfg.est_duration_factor || 2}× duration multiplier applied to merged PR session minutes`,
    formulaFn: (cfg) => `hrs_saved = (merged_session_minutes / 60) × ${cfg.est_duration_factor || 2}`,
    calc: (d, cfg) => ((d.merged_session_minutes || 0) / 60) * (cfg.est_duration_factor || 2) },
  { key: 'loc', label: 'LoC-Based (Merged)',
    descFn: (cfg) => `${cfg.est_hrs_per_kloc || 2} hours saved per 1,000 merged LoC added`,
    formulaFn: (cfg) => `hrs_saved = (merged_loc_added / 1000) × ${cfg.est_hrs_per_kloc || 2}`,
    calc: (d, cfg) => ((d.merged_loc_added || 0) / 1000) * (cfg.est_hrs_per_kloc || 2) },
];

function computeDerived(dayRows, config, selectedMethod) {
  const method = ESTIMATION_METHODS.find(m => m.key === selectedMethod) || ESTIMATION_METHODS[0];
  return dayRows.map(d => {
    const devs = d.active_devs;

    const estimates = {};
    for (const m of ESTIMATION_METHODS) {
      const raw = m.calc(d, config);
      estimates['est_' + m.key + '_hrs_day'] = raw;
      estimates['est_' + m.key + '_hrs_per_dev_day'] = safeDiv(raw, devs);
    }

    const selectedHrsDay = method.calc(d, config);
    const selectedHrsPerDevDay = safeDiv(selectedHrsDay, devs);

    return {
      ...d,
      ...estimates,
      agent_session_hours: (d.agent_session_minutes || 0) / 60,
      time_saved_hours_total_day: selectedHrsDay,
      time_saved_hours_per_dev_per_day: selectedHrsPerDevDay,
    };
  });
}

/* ── Fill missing days with zeros across the full window ── */
function fillDayGaps(dayRows, windowDays = 28) {
  if (!dayRows.length) return dayRows;
  const existing = {};
  for (const r of dayRows) existing[r.day] = r;

  const end = new Date();
  end.setHours(0, 0, 0, 0);
  const start = new Date(end);
  start.setDate(start.getDate() - windowDays + 1);

  const zeroRow = (day) => ({
    day,
    active_devs: 0,
    total_agent_requests: 0, sessions_started: 0,
    agent_prs_created: 0, agent_prs_merged: 0,
    agent_loc_added: 0, agent_loc_deleted: 0,
    agent_session_minutes: 0,
    merged_loc_added: 0, merged_loc_deleted: 0, merged_session_minutes: 0,
    requests_per_dev: 0, sessions_per_dev: 0,
    prs_created_per_dev: 0, prs_merged_per_dev: 0,
    loc_added_per_dev: 0, session_mins_per_dev: 0,
    merge_rate: 0,
  });

  const result = [];
  const cur = new Date(start);
  while (cur <= end) {
    const ds = cur.toISOString().substring(0, 10);
    result.push(existing[ds] || zeroRow(ds));
    cur.setDate(cur.getDate() + 1);
  }
  return result;
}

/* ── Math utilities ── */
function mean(arr) { const v = arr.filter(x => x != null); return v.length ? v.reduce((a, b) => a + b, 0) / v.length : null; }

function linearRegression(points) {
  const n = points.length;
  if (n < 3) return null;
  let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
  for (const [x, y] of points) { sumX += x; sumY += y; sumXY += x * y; sumX2 += x * x; }
  const denom = n * sumX2 - sumX * sumX;
  if (Math.abs(denom) < 1e-10) return null;
  const slope = (n * sumXY - sumX * sumY) / denom;
  const intercept = (sumY - slope * sumX) / n;
  const xMin = Math.min(...points.map(p => p[0]));
  const xMax = Math.max(...points.map(p => p[0]));
  return { slope, intercept, line: [[xMin, slope * xMin + intercept], [xMax, slope * xMax + intercept]] };
}

function smooth7(arr) {
  return arr.map((_, i) => {
    const start = Math.max(0, i - 6);
    const slice = arr.slice(start, i + 1).filter(v => v != null);
    return slice.length > 0 ? slice.reduce((a, b) => a + b, 0) / slice.length : null;
  });
}

/* ═══════════════════════════════════════════════════════
   DRIVER SERIES
   ═══════════════════════════════════════════════════════ */

const DRIVER_SERIES = [
  { key: 'total_agent_requests', perDev: 'requests_per_dev', label: 'Agent Requests', color: '#58a6ff' },
  { key: 'sessions_started', perDev: 'sessions_per_dev', label: 'Sessions', color: '#3fb950' },
  { key: 'agent_prs_created', perDev: 'prs_created_per_dev', label: 'PRs Created', color: '#d29922' },
  { key: 'agent_prs_merged', perDev: 'prs_merged_per_dev', label: 'PRs Merged', color: '#bc8cff' },
  { key: 'agent_loc_added', perDev: 'loc_added_per_dev', label: 'LoC Added (÷100)', color: '#f778ba', scale: 100 },
  { key: 'agent_session_minutes', perDev: 'session_mins_per_dev', label: 'Session Min', color: '#79c0ff' },
];

/* ═══════════════════════════════════════════════════════
   REACT COMPONENTS
   ═══════════════════════════════════════════════════════ */
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ── Formatting helpers ── */
const fmt = n => n == null ? '—' : Number(n).toLocaleString(undefined, { maximumFractionDigits: 0 });
const fmtDec = (n, d=1) => n == null ? '—' : Number(n).toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d });
const fmtKloc = n => n == null ? '—' : fmtDec(n / 1000, 1) + 'K';
const fmtCurrency = n => n == null ? '—' : '$' + Number(n).toLocaleString(undefined, { maximumFractionDigits: 0 });
const fmtPct = n => n == null ? '—' : (n * 100).toFixed(1) + '%';
const fmtPct0 = n => n == null ? '—' : Math.round(n * 100) + '%';
const fmtCompact = n => {
  if (n == null) return '—';
  if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(0) + 'K';
  return fmt(n);
};
const fmtMin = n => n == null ? '—' : n < 60 ? fmt(n) + 'm' : fmtDec(n / 60, 1) + 'h';

/* ── Highcharts wrapper ── */
function Chart({ options, className = 'chart-container' }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (ref.current) {
      chartRef.current = Highcharts.chart(ref.current, options);
    }
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(options)]);
  return <div ref={ref} className={className} />;
}

/* ── KPI Card ── */
function KpiCard({ label, value, unit, sub, color, hero }) {
  return (
    <div className={`Box p-3 kpi-card${hero ? ' kpi-hero' : ''}`}>
      <div className="kpi-label color-fg-muted">{label}</div>
      <div className="kpi-value" style={color ? { color } : {}}>{value}{unit && <span className="kpi-unit">{unit}</span>}</div>
      {sub && <div className="kpi-sub color-fg-muted">{sub}</div>}
    </div>
  );
}

/* ── Definition Card ── */
function DefinitionCard({ label, value, description, icon }) {
  return (
    <div className="Box p-3 def-card">
      <div className="def-card-label color-fg-muted mb-1">{icon && <span className="mr-1">{icon}</span>}{label}</div>
      <div className="def-card-value color-fg-default">{value}</div>
      {description && <div className="def-card-sub color-fg-muted mt-2">{description}</div>}
    </div>
  );
}

/* ── Section Header ── */
function SectionHeader({ title, desc }) {
  return (
    <div className="mb-3 pb-2" style={{ borderBottom: '1px solid var(--borderColor-default)', borderTop: '2px solid var(--borderColor-muted)', paddingTop: '12px' }}>
      <h2 className="f2 color-fg-accent">{title}</h2>
      <p className="f6 color-fg-muted">{desc}</p>
    </div>
  );
}

/* ── Source summary bar ── */
function SourceSummary({ efficiency, sessions, days }) {
  const profile = efficiency?.artifact?.profile || {};
  const n = days.length;
  const range = n > 0 ? `${days[0].day} → ${days[n-1].day}` : 'none';
  const uniqueDevs = profile.unique_people || new Set((efficiency?._devDays || []).map(d => d.developer)).size;
  const devDayCount = profile.detail_row_count || (efficiency?._devDays || []).length;
  const sessionCount = sessions?.data?.length || 0;

  return (
    <div className="flash flash-success f6 mb-3">
      ✅ Loaded <strong>agentic-efficiency-days</strong> · {n} days ({range}) · {fmt(uniqueDevs)} developers · {fmt(devDayCount)} dev-days · {fmt(sessionCount)} PR sessions
    </div>
  );
}

/* ── Developer Search ── */
function DevSearch({ devDays, selectedUser, onSelect }) {
  const [query, setQuery] = useState('');
  const [open, setOpen] = useState(false);
  const logins = useMemo(() => [...new Set(devDays.map(d => d.developer))].filter(Boolean).sort(), [devDays]);
  const filtered = query ? logins.filter(l => l.toLowerCase().includes(query.toLowerCase())).slice(0, 10) : logins.slice(0, 10);

  const select = (login) => { onSelect(login); setQuery(''); setOpen(false); };
  const clear = () => { onSelect(null); setQuery(''); };

  if (!devDays.length) return null;

  return (
    <div className="d-flex flex-items-center mb-3" style={{ gap: '8px', position: 'relative' }}>
      <span className="f6 color-fg-muted text-bold">Developer:</span>
      <span className="f6 color-fg-muted" style={{ fontStyle: 'italic' }}>Overlay individual developer data to compare to Org averages</span>
      {selectedUser ? (
        <div className="d-flex flex-items-center" style={{ gap: '6px' }}>
          <span className="Label Label--accent">{selectedUser}</span>
          <button className="btn-octicon" onClick={clear} title="Clear" style={{ color: 'var(--fgColor-muted)', cursor: 'pointer', background: 'none', border: 'none', fontSize: '14px' }}>✕</button>
        </div>
      ) : (
        <div style={{ position: 'relative', width: '220px' }}>
          <input
            type="text" className="form-control input-sm" placeholder="Search by login…"
            value={query} onChange={e => { setQuery(e.target.value); setOpen(true); }}
            onFocus={() => setOpen(true)} onBlur={() => setTimeout(() => setOpen(false), 150)}
          />
          {open && filtered.length > 0 && (
            <div className="Box color-shadow-large" style={{ position: 'absolute', top: '100%', left: 0, right: 0, zIndex: 100, maxHeight: '200px', overflow: 'auto' }}>
              {filtered.map(l => (
                <div key={l} className="Box-row px-3 py-1 f6" style={{ cursor: 'pointer' }} onMouseDown={() => select(l)}>
                  {l}
                </div>
              ))}
            </div>
          )}
        </div>
      )}
      {selectedUser && <span className="f6 color-fg-muted">(dashed lines on charts)</span>}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   SECTION A — IMPACT (compact)
   ═══════════════════════════════════════════════════════ */
function ImpactSection({ days, config, method, onMethodChange, devDays, selectedUser }) {
  const n = days.length;
  const methodDef = ESTIMATION_METHODS.find(m => m.key === method) || ESTIMATION_METHODS[0];

  const totalHoursSaved = days.reduce((s, d) => s + (d.time_saved_hours_total_day || 0), 0);
  const avgHrsPerDevDay = (() => { const v = days.map(d => d.time_saved_hours_per_dev_per_day).filter(v => v != null); return v.length ? v.reduce((a,b)=>a+b,0)/v.length : null; })();
  const avgActiveDevs = Math.round(days.reduce((s, d) => s + (d.active_devs || 0), 0) / n);
  const laborCost = config.cfg_labor_cost_per_hour != null ? totalHoursSaved * config.cfg_labor_cost_per_hour : null;
  const orgHrsSavedPerDay = totalHoursSaved / n;
  const wdays = config.cfg_workdays_per_week || 5;
  const baselineHrsPerDay = 40 / wdays;
  const pctTimeSavedPerDev = avgHrsPerDevDay != null ? avgHrsPerDevDay / baselineHrsPerDay : null;

  // User overlay series
  const userDayMap = {};
  if (selectedUser && devDays) {
    devDays.filter(u => u.developer === selectedUser).forEach(u => { userDayMap[u.date || u.day] = u; });
  }
  const hasUserData = Object.keys(userDayMap).length > 0;
  const userHrsSeries = hasUserData ? days.map(d => {
    const u = userDayMap[d.day];
    if (!u) return null;
    return methodDef.calc({ merged_session_minutes: u.agent_session_minutes || 0, merged_loc_added: u.agent_loc_added || 0 }, config);
  }) : null;

  const chartOpts = {
    chart: { type: 'areaspline', height: 300 },
    title: { text: null },
    subtitle: { text: methodDef.label + ': ' + methodDef.descFn(config) },
    xAxis: { categories: days.map(d => d.day), labels: { rotation: -45, style: { fontSize: '10px' } } },
    yAxis: [
      { title: { text: 'Hrs Saved / Dev / Day' }, min: 0 },
      { title: { text: 'Total Hours Saved' }, opposite: true, min: 0 },
    ],
    tooltip: { shared: true, valueDecimals: 1 },
    legend: { symbolWidth: 16 },
    series: [
      { name: 'Avg Hrs / Dev / Day', data: days.map(d => d.time_saved_hours_per_dev_per_day), yAxis: 0, color: '#58a6ff', fillOpacity: 0.08, marker: { radius: 3 } },
      { name: 'Org Total Hrs', data: days.map(d => d.time_saved_hours_total_day != null ? Math.round(d.time_saved_hours_total_day * 10) / 10 : null), type: 'column', yAxis: 1, color: '#3fb950', opacity: 0.7, pointPadding: 0.1 },
      ...(userHrsSeries ? [{ name: selectedUser + ' Hrs', data: userHrsSeries, type: 'spline', yAxis: 0, color: '#f78166', dashStyle: 'ShortDash', marker: { radius: 4, symbol: 'diamond', lineWidth: 1, lineColor: '#f78166', fillColor: '#0d1117' }, lineWidth: 2.5 }] : []),
    ],
  };

  return (
    <div className="section-row">
      <div className="mb-3 pb-2 d-flex flex-items-end flex-justify-between" style={{ borderBottom: '1px solid var(--borderColor-default)', borderTop: '2px solid var(--borderColor-muted)', paddingTop: '12px' }}>
        <div>
          <h2 className="f2 color-fg-accent">Impact</h2>
          <p className="f6 color-fg-muted">Estimated Individual and Total Agent Efficiency Impact for your organization</p>
        </div>
        <div className="d-flex flex-items-center" style={{ gap: '8px' }}>
          <span className="f6 color-fg-muted">Method:</span>
          <select className="form-select form-select-sm" value={method} onChange={e => onMethodChange(e.target.value)} style={{ width: 'auto', background: 'var(--bgColor-muted)', color: 'var(--fgColor-default)', border: '1px solid var(--borderColor-default)' }}>
            {ESTIMATION_METHODS.map(m => <option key={m.key} value={m.key}>{m.label}</option>)}
          </select>
        </div>
      </div>

      <div className="d-flex flex-wrap mb-3" style={{ gap: '12px', alignItems: 'stretch' }}>
        <div style={{ flex: '0 0 200px' }}><KpiCard hero label="Human Hrs Saved" value={fmtDec(totalHoursSaved, 0)} unit="hrs" sub={`across ${n} days`} color="#58a6ff" /></div>
        <div style={{ flex: '1 1 0', display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: '12px' }}>
          <KpiCard label="Org Hrs / Day" value={fmtDec(orgHrsSavedPerDay, 1)} unit="hrs" sub={`${avgActiveDevs} devs avg`} />
          <KpiCard label="Hrs / Dev / Day" value={fmtDec(avgHrsPerDevDay, 2)} unit="hrs" sub={pctTimeSavedPerDev != null ? fmtPct(pctTimeSavedPerDev) + ` of ${baselineHrsPerDay.toFixed(0)}h workday` : 'per active developer'} />
          <KpiCard label="Economic Value" value={fmtCurrency(laborCost)} sub={laborCost != null ? `at $${config.cfg_labor_cost_per_hour}/hr` : 'set labor cost in config'} color="#3fb950" />
        </div>
      </div>

      <div className="Box p-3">
        <Chart options={chartOpts} />
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   SECTION B — DRIVERS (Grid default)
   ═══════════════════════════════════════════════════════ */

function DriversSection({ days, devDays, selectedUser }) {
  const [toggles, setToggles] = useState(() => {
    const t = {};
    DRIVER_SERIES.forEach(s => t[s.key] = true);
    return t;
  });
  const [viewMode, setViewMode] = useState('grid');

  const n = days.length;
  const labels = days.map(d => d.day);
  const sum = (k) => days.reduce((s, d) => s + (d[k] || 0), 0);
  const avgDevs = days.reduce((s, d) => s + (d.active_devs || 0), 0) / n;

  const totalPRsCreated = sum('agent_prs_created');
  const totalPRsMerged = sum('agent_prs_merged');
  const mergeRate = safeDiv(totalPRsMerged, totalPRsCreated);

  // Build user day map from devDays
  const userDayMap = {};
  if (selectedUser && devDays) {
    devDays.filter(u => u.developer === selectedUser).forEach(u => { userDayMap[u.date || u.day] = u; });
  }
  const hasUserData = Object.keys(userDayMap).length > 0;

  const activeDrivers = DRIVER_SERIES.filter(s => s.perDev && toggles[s.key] && sum(s.key) > 0);
  const toggle = (key) => setToggles(prev => ({ ...prev, [key]: !prev[key] }));

  // User field mapping for overlay
  const USER_FIELDS = [
    { key: 'total_agent_requests', driverKey: 'total_agent_requests', label: 'Requests', color: '#58a6ff', scale: 1 },
    { key: 'sessions_started', driverKey: 'sessions_started', label: 'Sessions', color: '#3fb950', scale: 1 },
    { key: 'agent_prs_created', driverKey: 'agent_prs_created', label: 'PRs Created', color: '#d29922', scale: 1 },
    { key: 'agent_prs_merged', driverKey: 'agent_prs_merged', label: 'PRs Merged', color: '#bc8cff', scale: 1 },
    { key: 'agent_loc_added', driverKey: 'agent_loc_added', label: 'LoC/100', color: '#f778ba', scale: 100 },
    { key: 'agent_session_minutes', driverKey: 'agent_session_minutes', label: 'Sess Mins', color: '#79c0ff', scale: 1 },
  ];

  // === COMBINED VIEW ===
  function renderCombinedView() {
    const perDevSeries = activeDrivers.map(s => ({
      name: s.label + ' / Dev',
      data: days.map(d => d[s.perDev] != null ? Math.round(d[s.perDev] * 100) / 100 : null),
      color: s.color,
    }));

    if (hasUserData) {
      for (const s of activeDrivers) {
        const uf = USER_FIELDS.find(f => f.driverKey === s.key);
        if (!uf) continue;
        perDevSeries.push({
          name: selectedUser + ' ' + s.label,
          data: days.map(d => {
            const u = userDayMap[d.day];
            if (!u) return null;
            return Math.round(((u[uf.key] || 0) / (uf.scale || 1)) * 100) / 100;
          }),
          color: s.color,
          dashStyle: 'Dash',
          marker: { radius: 3, symbol: 'diamond' },
          lineWidth: 2,
        });
      }
    }

    const trendOpts = {
      chart: { type: 'spline', height: 320 },
      title: { text: null },
      xAxis: { categories: labels, labels: { rotation: -45, style: { fontSize: '10px' } } },
      yAxis: { title: { text: 'Per Active Dev' }, min: 0 },
      tooltip: { shared: true, valueDecimals: 2 },
      series: perDevSeries,
    };

    const avgPerDevData = activeDrivers.map(s => {
      const vals = days.map(d => d[s.perDev]).filter(v => v != null);
      return vals.length ? Math.round((vals.reduce((a,b) => a+b, 0) / vals.length) * 100) / 100 : 0;
    });

    const userAvgData = hasUserData ? activeDrivers.map(s => {
      const uf = USER_FIELDS.find(f => f.driverKey === s.key);
      const userDays = days.map(d => userDayMap[d.day]).filter(Boolean);
      if (!userDays.length || !uf) return 0;
      const vals = userDays.map(u => (u[uf.key] || 0) / (uf.scale || 1));
      return Math.round((vals.reduce((a,b) => a+b, 0) / vals.length) * 100) / 100;
    }) : null;

    const profileSeries = [
      { name: 'Org Avg / Dev / Day', data: avgPerDevData.map((y, i) => ({ y, color: activeDrivers[i].color })) },
    ];
    if (userAvgData) {
      profileSeries.push({
        name: selectedUser + ' Avg / Day',
        data: userAvgData.map((y, i) => ({ y, color: 'transparent', borderColor: activeDrivers[i].color })),
        borderWidth: 2,
        dashStyle: 'Dash',
      });
    }

    const barHeight = Math.max(200, activeDrivers.length * (hasUserData ? 60 : 44) + 80);
    const totalsOpts = {
      chart: { type: 'bar', height: barHeight },
      title: { text: null },
      xAxis: { categories: activeDrivers.map(s => s.label), labels: { style: { fontSize: '12px' } } },
      yAxis: { title: { text: 'Daily Avg' } },
      tooltip: { shared: true, valueSuffix: ' / day', valueDecimals: 1 },
      plotOptions: { bar: { borderRadius: 3, groupPadding: 0.15, dataLabels: { enabled: true, format: '{y:,.1f}', style: { color: '#e6edf3', textOutline: 'none', fontSize: '11px' } } } },
      series: profileSeries,
    };

    return (
      <div className="d-flex flex-wrap" style={{ gap: '16px' }}>
        <div className="Box p-3" style={{ flex: '2 1 480px' }}>
          <h4 className="f6 color-fg-muted mb-1">Daily Trend — Per Active Developer</h4>
          <Chart options={trendOpts} />
        </div>
        <div className="Box p-3" style={{ flex: '1 1 300px' }}>
          <h4 className="f6 color-fg-muted mb-1">Daily Avg / Dev{selectedUser ? ` vs ${selectedUser}` : ''}</h4>
          <Chart options={totalsOpts} />
        </div>
      </div>
    );
  }

  // === GRID VIEW (default) ===
  function renderGridView() {
    return (
      <div className="drivers-grid">
        {activeDrivers.map(s => {
          const series = [
            {
              name: s.label + ' / Dev',
              data: days.map(d => d[s.perDev] != null ? Math.round(d[s.perDev] * 100) / 100 : null),
              color: s.color,
            },
          ];

          if (hasUserData) {
            const uf = USER_FIELDS.find(f => f.driverKey === s.key);
            if (uf) {
              series.push({
                name: selectedUser + ' ' + s.label,
                data: days.map(d => {
                  const u = userDayMap[d.day];
                  if (!u) return null;
                  return Math.round(((u[uf.key] || 0) / (uf.scale || 1)) * 100) / 100;
                }),
                color: s.color,
                dashStyle: 'Dash',
                marker: { radius: 3, symbol: 'diamond' },
                lineWidth: 2,
              });
            }
          }

          const chartOpts = {
            chart: { type: 'spline', height: 220 },
            title: { text: s.label, style: { fontSize: '13px' } },
            xAxis: { categories: labels, labels: { rotation: -45, style: { fontSize: '9px' } }, tickInterval: Math.max(1, Math.floor(labels.length / 6)) },
            yAxis: { title: { text: null }, min: 0 },
            tooltip: { shared: true, valueDecimals: 2 },
            legend: { enabled: hasUserData, itemStyle: { fontSize: '10px' } },
            series,
          };

          return (
            <div key={s.key} className="Box p-3">
              <Chart options={chartOpts} className="chart-container-sm" />
            </div>
          );
        })}
      </div>
    );
  }

  return (
    <div className="section-row">
      <SectionHeader title="Drivers" desc="Activity Levels for Upstream Drivers" />

      <div className="d-flex flex-wrap mb-3" style={{ gap: '12px' }}>
        <div style={{ flex: '1 1 150px' }}><KpiCard label="Active Devs / Day" value={fmt(Math.round(avgDevs))} unit="avg" sub={`across ${n} days`} /></div>
        <div style={{ flex: '1 1 150px' }}><KpiCard label="PRs Created" value={fmtCompact(totalPRsCreated)} sub={fmtDec(safeDiv(totalPRsCreated, n), 1) + ' / day'} /></div>
        <div style={{ flex: '1 1 150px' }}><KpiCard label="PRs Merged" value={fmtCompact(totalPRsMerged)} sub={mergeRate != null ? fmtPct(mergeRate) + ' merge rate' : ''} color="#3fb950" /></div>
      </div>

      <div className="d-flex flex-items-center flex-wrap mb-3 px-2" style={{ gap: '12px' }}>
        <span className="f6 color-fg-muted text-bold">Show:</span>
        <div className="driver-toggles">
          {DRIVER_SERIES.filter(s => s.perDev && sum(s.key) > 0).map(s => (
            <label key={s.key} className="color-fg-default">
              <input type="checkbox" checked={toggles[s.key]} onChange={() => toggle(s.key)} />
              <span className="ml-1" style={{ color: s.color }}>●</span> {s.label}
            </label>
          ))}
        </div>
        <div className="view-toggle ml-auto">
          <button className={viewMode === 'grid' ? 'active' : ''} onClick={() => setViewMode('grid')}>Grid</button>
          <button className={viewMode === 'combined' ? 'active' : ''} onClick={() => setViewMode('combined')}>Combined</button>
        </div>
      </div>

      {viewMode === 'grid' ? renderGridView() : renderCombinedView()}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   LEVERAGE RECTANGLE SECTION
   ═══════════════════════════════════════════════════════ */

function LeverageRectangleSection({ days, prSessions, config, selectedEstimate, onEstimateChange, structuralFactor, onStructuralFactorChange }) {
  const n = days.length;
  const totalDevs = config.cfg_total_developers || 100;
  const totalRepos = config.cfg_total_repos;

  // Compute estimates by each method using day-level data
  const estByMethod = {};
  for (const m of ESTIMATION_METHODS) {
    estByMethod[m.key] = days.reduce((s, d) => s + (d['est_' + m.key + '_hrs_day'] || 0), 0);
  }

  const activeDevHours = estByMethod[selectedEstimate] || estByMethod['duration'] || 0;
  const totalMerged = days.reduce((s, d) => s + (d.agent_prs_merged || 0), 0);
  const totalCreated = days.reduce((s, d) => s + (d.agent_prs_created || 0), 0);
  const totalCompletions = totalMerged;
  const currentLeverage = safeDiv(totalCompletions, activeDevHours);
  const hoursPerCompletion = safeDiv(activeDevHours, totalCompletions);

  // Agent duration
  const totalAgentMinutes = days.reduce((s, d) => s + (d.agent_session_minutes || 0), 0);
  const totalAgentDurationHrs = totalAgentMinutes / 60;

  // Average dev-hours per PR
  const avgDevHoursPerPr = totalCreated > 0 ? activeDevHours / totalCreated : 0;

  // Structural factors
  const avgActiveDevs = mean(days.map(d => d.active_devs));
  const adoptionPct = safeDiv(avgActiveDevs, totalDevs);
  const overallMergeRate = safeDiv(totalMerged, totalCreated);
  const activeRepos = new Set((prSessions || []).map(pr => pr.repo).filter(Boolean)).size;
  const repoCoverage = totalRepos ? safeDiv(activeRepos, totalRepos) : null;

  const STRUCTURAL_FACTORS = [
    { key: 'adoption', label: 'Adoption', current: adoptionPct, color: '#58a6ff',
      detail: `${fmtDec(avgActiveDevs, 0)} of ${totalDevs} devs using agent` },
    { key: 'merge_rate', label: 'Merge Rate', current: overallMergeRate, color: '#3fb950',
      detail: `${totalMerged} of ${totalCreated} PRs merged` },
    { key: 'coverage', label: 'Repo Coverage', current: repoCoverage, color: '#bc8cff',
      detail: `${activeRepos} of ${totalRepos || activeRepos} repos with agent activity` },
  ];

  const selectedFactor = STRUCTURAL_FACTORS.find(f => f.key === structuralFactor) || STRUCTURAL_FACTORS[0];
  const currentLevel = selectedFactor.current || 0;

  // Projected: scale UP if factor → 100%
  const scaleFactor = currentLevel > 0 ? (1 / currentLevel) : 1;
  const projectedCompletions = currentLevel > 0 ? Math.round(totalCompletions * scaleFactor) : totalCompletions;
  const projectedPRs = currentLevel > 0 ? Math.round(totalCreated * scaleFactor) : totalCreated;
  const projectedDevHours = currentLevel > 0 ? (projectedPRs * avgDevHoursPerPr) : activeDevHours;
  const projectedLeverage = safeDiv(projectedCompletions, projectedDevHours);

  // Leverage rectangle chart
  const xMax = Math.max(activeDevHours, projectedDevHours) * 1.15;
  const yMax = Math.max(totalCompletions, projectedCompletions) * 1.3;

  const rectSeries = [];

  if (currentLevel > 0 && currentLevel < 1) {
    rectSeries.push({
      type: 'polygon', name: `Projected (${selectedFactor.label} → 100%)`,
      data: [[0, 0], [projectedDevHours, 0], [projectedDevHours, projectedCompletions], [0, projectedCompletions]],
      color: `rgba(${selectedFactor.color === '#58a6ff' ? '88,166,255' : selectedFactor.color === '#3fb950' ? '63,185,80' : '188,140,255'},0.08)`,
      lineWidth: 1, lineColor: selectedFactor.color, dashStyle: 'ShortDash',
      enableMouseTracking: true,
      tooltip: { headerFormat: '', pointFormat: `<b>Projected (${selectedFactor.label} → 100%)</b><br/>Dev-Hours: ${fmtCompact(projectedDevHours)}<br/>Completions: ${fmtCompact(projectedCompletions)}<br/>Leverage: ${fmtDec(projectedLeverage, 3)}<br/>${fmtDec(scaleFactor, 1)}× current volume` },
    });
  }

  rectSeries.push({
    type: 'polygon', name: 'Existing (measured)',
    data: [[0, 0], [activeDevHours, 0], [activeDevHours, totalCompletions], [0, totalCompletions]],
    color: 'rgba(88,166,255,0.15)', lineWidth: 2, lineColor: '#58a6ff',
    enableMouseTracking: true,
    tooltip: { headerFormat: '', pointFormat: `<b>Existing</b><br/>Dev-Hours: ${fmtCompact(activeDevHours)}<br/>Completions: ${fmtCompact(totalCompletions)}<br/>Leverage: ${fmtDec(currentLeverage, 3)}` },
  });

  rectSeries.push({
    type: 'scatter', name: 'Counterfactual (without AI)',
    data: [{ x: 0, y: 0 }],
    color: '#f85149',
    marker: { radius: 8, symbol: 'circle', lineWidth: 2, lineColor: '#f85149', fillColor: 'rgba(248,81,73,0.5)' },
    tooltip: { headerFormat: '', pointFormat: '<b>Counterfactual (without AI)</b><br/>Without the agent: 0 completions, 0 dev-hours<br/>This is purely additive capacity.' },
  });

  rectSeries.push({
    type: 'line', name: `Leverage = ${fmtDec(currentLeverage, 3)}`,
    data: [[0, 0], [Math.max(activeDevHours, projectedDevHours), Math.max(totalCompletions, projectedCompletions)]],
    color: '#3fb950', dashStyle: 'Dash', lineWidth: 2,
    marker: { enabled: true, radius: 5, symbol: 'circle' },
    enableMouseTracking: false,
  });

  const rectChartOpts = {
    chart: { type: 'scatter', height: 420 },
    title: { text: 'Leverage Rectangle' },
    subtitle: { text: 'More completions at minimal dev time → higher leverage' },
    xAxis: { title: { text: 'Est. Human Dev-Hours', style: { fontSize: '13px', fontWeight: '600' } }, min: 0, max: xMax, gridLineWidth: 1, labels: { formatter: function() { return fmtCompact(this.value); } } },
    yAxis: { title: { text: 'Completions (Merged Agent PRs)', style: { fontSize: '13px', fontWeight: '600' } }, min: 0, max: yMax, labels: { formatter: function() { return fmtCompact(this.value); } } },
    tooltip: { useHTML: true, headerFormat: '' },
    legend: { enabled: true, align: 'center', verticalAlign: 'bottom' },
    plotOptions: { series: { animation: { duration: 600 }, states: { inactive: { opacity: 0.6 } } } },
    series: rectSeries,
  };

  // Structural factor donuts
  function completenessDonutOpts(title, pct, color, isSelected) {
    const val = pct != null ? Math.min(pct * 100, 100) : 0;
    return {
      chart: { type: 'pie', height: 160, margin: [0, 0, 30, 0] },
      title: { text: fmtPct0(pct), verticalAlign: 'middle', y: -8, style: { fontSize: '22px', fontWeight: '700', color: '#e6edf3' } },
      subtitle: { text: title, align: 'center', verticalAlign: 'bottom', y: -5, style: { fontSize: '10px' } },
      tooltip: { pointFormat: '<b>{point.percentage:.1f}%</b>' },
      plotOptions: { pie: { innerSize: '70%', borderWidth: isSelected ? 3 : 0,
        borderColor: isSelected ? color : 'transparent', dataLabels: { enabled: false } } },
      series: [{ data: [{ name: title, y: val, color }, { name: 'Gap', y: Math.max(100 - val, 0), color: '#30363d' }] }],
    };
  }

  return (
    <div className="leverage-section">
      <h2 className="f2 color-fg-accent">Leverage Summary</h2>
      <p className="f6 color-fg-muted mb-3">Period aggregates: human dev-hours, merged agent PRs, leverage, and structural projections.</p>

      <div className="d-flex flex-wrap mb-3" style={{ gap: '12px' }}>
        <div style={{ flex: '1 1 140px' }}>
          <KpiCard label="Agent Duration Hours" value={fmtCompact(totalAgentDurationHrs)}
            sub={`sum of session minutes`} />
        </div>
        <div style={{ flex: '1 1 140px' }}>
          <KpiCard label="Est. Human Dev-Hours" value={fmtCompact(activeDevHours)}
            sub={`via ${(ESTIMATION_METHODS.find(m => m.key === selectedEstimate) || ESTIMATION_METHODS[0]).label}`} />
        </div>
        <div style={{ flex: '1 1 140px' }}>
          <KpiCard label="Completions (Merged Agent PRs)" value={fmtCompact(totalCompletions)}
            sub={`${n} day period · ${totalCreated} total PRs created`} />
        </div>
        <div style={{ flex: '0 0 200px' }}>
          <KpiCard hero label="Current Leverage" value={fmtDec(currentLeverage, 3)}
            sub="merged PRs / human dev-hour" color="#3fb950" />
        </div>
        <div style={{ flex: '1 1 140px' }}>
          <KpiCard label="Hrs / Completion" value={fmtDec(hoursPerCompletion, 2)} unit="hrs"
            sub="inverse leverage" />
        </div>
      </div>

      <h3 className="f5 color-fg-default mb-2">Human Dev-Hours Estimate <span className="f6 color-fg-muted">(click to change)</span></h3>
      <div className="d-flex flex-wrap mb-3" style={{ gap: '12px' }}>
        {ESTIMATION_METHODS.map((m, i) => {
          const total = estByMethod[m.key];
          const isSelected = m.key === selectedEstimate;
          const color = ['#58a6ff', '#3fb950'][i];
          return (
            <div key={m.key} className="Box p-3" onClick={() => onEstimateChange(m.key)}
              style={{ flex: '1 1 200px', cursor: 'pointer',
                borderColor: isSelected ? color : undefined, borderWidth: isSelected ? '2px' : undefined,
                transition: 'border-color 0.15s' }}>
              <div className="f6 color-fg-muted text-bold mb-1">{m.label}</div>
              <div className="f2 text-bold" style={{ color }}>{fmtCompact(total)}<span className="kpi-unit">hrs</span></div>
              <div className="f6 color-fg-muted mt-1">{m.descFn(config)}</div>
              {isSelected && <div className="f6 mt-1" style={{ color }}>▲ Using for leverage</div>}
            </div>
          );
        })}
      </div>

      <div className="Box p-3 mb-3">
        <div className="d-flex flex-items-center flex-justify-between mb-2">
          <div className="f5 text-bold color-fg-default" style={{ fontStyle: 'italic' }}>
            More completions at minimal dev time → higher leverage
          </div>
          <div className="d-flex flex-items-center" style={{ gap: '8px' }}>
            {(() => {
              const mDef = ESTIMATION_METHODS.find(m => m.key === selectedEstimate) || ESTIMATION_METHODS[0];
              return <span className="Label d-flex flex-items-center" style={{ color: '#58a6ff', borderColor: '#58a6ff', gap: '4px', fontSize: '12px', padding: '4px 10px' }}>
                Estimate: {mDef.label} ({fmtCompact(activeDevHours)} hrs)
              </span>;
            })()}
            {currentLevel > 0 && currentLevel < 1 &&
              <span className="Label d-flex flex-items-center" style={{ color: selectedFactor.color, borderColor: selectedFactor.color, gap: '4px', fontSize: '12px', padding: '4px 10px' }}>
                Projection: {selectedFactor.label} ({fmtPct(currentLevel)}) → 100% ({fmtDec(scaleFactor, 1)}×)
              </span>
            }
          </div>
        </div>
        <Chart options={rectChartOpts} />
      </div>

      <h3 className="f5 color-fg-default mb-2">Structural Factors <span className="f6 color-fg-muted">(click to change projection)</span></h3>
      <div className="d-flex flex-wrap mb-3" style={{ gap: '12px', alignItems: 'stretch' }}>
        {STRUCTURAL_FACTORS.map(f => {
          const isSelected = f.key === structuralFactor;
          return (
            <div key={f.key} className="Box p-3" onClick={() => onStructuralFactorChange(f.key)}
              style={{ flex: '1 1 180px', cursor: 'pointer', borderColor: isSelected ? f.color : undefined,
                borderWidth: isSelected ? '2px' : undefined, transition: 'border-color 0.15s' }}>
              <Chart options={completenessDonutOpts(f.label, f.current, f.color, isSelected)} className="donut-container" />
              <div className="text-center f6 color-fg-muted mt-1">{f.detail}</div>
              {isSelected && <div className="text-center f6 mt-1" style={{ color: f.color }}>▲ Projecting from this factor</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   TREND CHART (reusable)
   ═══════════════════════════════════════════════════════ */

function TrendChart({ title, days, orgKey, userDayMap, selectedUser, smoothing, color, yLabel, isPercent, chartType }) {
  const orgRaw = days.map(d => {
    const v = d[orgKey];
    return v != null ? (isPercent ? v * 100 : v) : null;
  });
  const orgData = smoothing ? smooth7(orgRaw) : orgRaw;

  const series = [{
    name: 'Org Average',
    type: chartType || 'spline',
    data: orgData,
    color: color,
    marker: { radius: 2 },
  }];

  if (selectedUser && userDayMap) {
    const userRaw = days.map(d => {
      const rec = userDayMap[d.day];
      if (!rec) return null;
      const v = rec[orgKey];
      return v != null ? (isPercent ? v * 100 : v) : null;
    });
    const userData = smoothing ? smooth7(userRaw) : userRaw;
    series.push({
      name: selectedUser,
      type: chartType || 'spline',
      data: userData,
      color: '#d29922',
      dashStyle: 'ShortDash',
      marker: { radius: 3, symbol: 'diamond' },
      lineWidth: 2,
    });
  }

  const opts = {
    chart: { height: 260 },
    title: { text: title, style: { fontSize: '13px' } },
    xAxis: { categories: days.map(d => d.day), labels: { rotation: -45, style: { fontSize: '9px' }, step: Math.max(1, Math.floor(days.length / 8)) } },
    yAxis: { title: { text: yLabel || '' }, min: 0, labels: isPercent ? { format: '{value}%' } : {} },
    tooltip: { shared: true, valueDecimals: isPercent ? 1 : 2, valueSuffix: isPercent ? '%' : '' },
    legend: { enabled: !!selectedUser },
    series,
  };

  return <Chart options={opts} className="chart-container-sm" />;
}

/* ═══════════════════════════════════════════════════════
   COMPLETIONS TREND CHART
   ═══════════════════════════════════════════════════════ */

function CompletionsTrendChart({ title, days, dataMap, selectedUser, userDataMap, smoothing, color, yLabel, chartType }) {
  const orgRaw = days.map(d => {
    const entry = dataMap[d.day];
    return entry != null ? entry : 0;
  });
  const orgData = smoothing ? smooth7(orgRaw) : orgRaw;

  const series = [{
    name: 'Org',
    type: chartType || 'spline',
    data: orgData,
    color: color,
    marker: { radius: 2 },
  }];

  if (selectedUser && userDataMap) {
    const userRaw = days.map(d => {
      const v = userDataMap[d.day];
      return v != null ? v : 0;
    });
    const userData = smoothing ? smooth7(userRaw) : userRaw;
    series.push({
      name: selectedUser,
      type: chartType || 'spline',
      data: userData,
      color: '#d29922',
      dashStyle: 'ShortDash',
      marker: { radius: 3, symbol: 'diamond' },
      lineWidth: 2,
    });
  }

  const opts = {
    chart: { height: 260 },
    title: { text: title, style: { fontSize: '13px' } },
    xAxis: { categories: days.map(d => d.day), labels: { rotation: -45, style: { fontSize: '9px' }, step: Math.max(1, Math.floor(days.length / 8)) } },
    yAxis: { title: { text: yLabel || '' }, min: 0 },
    tooltip: { shared: true, valueDecimals: 1 },
    legend: { enabled: !!selectedUser },
    series,
  };

  return <Chart options={opts} className="chart-container-sm" />;
}

/* ═══════════════════════════════════════════════════════
   LEVERAGE INSIGHTS SECTION
   ═══════════════════════════════════════════════════════ */

function LeverageInsightsSection({ days, prSessions, devDays, config, selectedUser, onSelectUser, selectedEstimate, structuralFactor }) {
  const [smoothing, setSmoothing] = useState(false);
  const n = days.length;
  const totalDevs = config.cfg_total_developers || 100;
  const totalRepos = config.cfg_total_repos;

  // User day map for selected user (from devDays)
  const userDayMap = useMemo(() => {
    if (!selectedUser || !devDays.length) return null;
    const map = {};
    for (const dd of devDays) {
      if (dd.developer === selectedUser) {
        map[dd.day || dd.date] = {
          ...dd,
          requests_per_dev: dd.total_agent_requests,
          sessions_per_dev: dd.sessions_started,
          prs_created_per_dev: dd.agent_prs_created,
          prs_merged_per_dev: dd.agent_prs_merged,
          loc_added_per_dev: (dd.agent_loc_added || 0) / 100,
          session_mins_per_dev: dd.agent_session_minutes,
          changes_requested_per_dev: dd.changes_requested_total,
        };
      }
    }
    return Object.keys(map).length > 0 ? map : null;
  }, [selectedUser, devDays]);

  // Dev structural metrics for overlay
  const userStructuralMap = useMemo(() => {
    if (!selectedUser || !devDays.length) return null;
    const map = {};
    const devRecords = devDays.filter(u => u.developer === selectedUser);
    for (const dd of devRecords) {
      const isActive = (dd.total_agent_requests || 0) > 0;
      map[dd.day || dd.date] = { adoption_pct: isActive ? 1.0 : 0.0 };
    }
    return Object.keys(map).length > 0 ? map : null;
  }, [selectedUser, devDays]);

  // PR-related data maps from prSessions
  const { mergedByDay, userMergedByDay, incompletionsByDay, userIncompletionsByDay } = useMemo(() => {
    const mergedByDay = {};
    const userMergedByDay = {};
    const incompletionsByDay = {};
    const userIncompletionsByDay = {};

    for (const pr of (prSessions || [])) {
      if (!pr.day) continue;

      if (pr.merged) {
        const mergeDay = pr.merged_at?.slice(0, 10) || pr.day;
        mergedByDay[mergeDay] = (mergedByDay[mergeDay] || 0) + 1;
        if (selectedUser && (pr.origin_requested_by === selectedUser || pr.author === selectedUser)) {
          userMergedByDay[mergeDay] = (userMergedByDay[mergeDay] || 0) + 1;
        }
      }

      if (!pr.merged && (pr.state === 'closed' || pr.state === 'CLOSED' || pr.state === 'Closed')) {
        const closeDay = pr.closed_at?.slice(0, 10) || pr.day;
        incompletionsByDay[closeDay] = (incompletionsByDay[closeDay] || 0) + 1;
        if (selectedUser && (pr.origin_requested_by === selectedUser || pr.author === selectedUser)) {
          userIncompletionsByDay[closeDay] = (userIncompletionsByDay[closeDay] || 0) + 1;
        }
      }
    }
    return { mergedByDay, userMergedByDay, incompletionsByDay, userIncompletionsByDay };
  }, [prSessions, selectedUser]);

  // Merge rate per user
  const userMergeRateMap = useMemo(() => {
    if (!selectedUser || !devDays.length) return null;
    const map = {};
    for (const dd of devDays) {
      if (dd.developer === selectedUser) {
        map[dd.day || dd.date] = { merge_rate: safeDiv(dd.agent_prs_merged, dd.agent_prs_created) };
      }
    }
    return Object.keys(map).length > 0 ? map : null;
  }, [selectedUser, devDays]);

  // Adoption % per day (org)
  const adoptionDays = useMemo(() => {
    return days.map(d => ({ ...d, adoption_pct: safeDiv(d.active_devs, totalDevs) }));
  }, [days, totalDevs]);

  // Changes requested per dev per day
  const changesRequestedDays = useMemo(() => {
    return days.map(d => ({ ...d, changes_requested_per_dev: safeDiv(d.changes_requested_total, d.active_devs) }));
  }, [days]);

  const userChangesReqMap = useMemo(() => {
    if (!selectedUser || !devDays.length) return null;
    const map = {};
    for (const dd of devDays) {
      if (dd.developer === selectedUser) {
        map[dd.day || dd.date] = { changes_requested_per_dev: dd.changes_requested_total };
      }
    }
    return Object.keys(map).length > 0 ? map : null;
  }, [selectedUser, devDays]);

  // Diagnostic leverage rectangle — normalized per developer
  const estByMethod = {};
  for (const m of ESTIMATION_METHODS) {
    estByMethod[m.key] = days.reduce((s, d) => s + (d['est_' + m.key + '_hrs_day'] || 0), 0);
  }
  const activeDevHours = estByMethod[selectedEstimate] || estByMethod['duration'] || 0;
  const totalMerged = days.reduce((s, d) => s + (d.agent_prs_merged || 0), 0);
  const totalCreated = days.reduce((s, d) => s + (d.agent_prs_created || 0), 0);
  const totalCompletions = totalMerged;
  const avgDevHoursPerPr = totalCreated > 0 ? activeDevHours / totalCreated : 0;

  const uniqueDevs = useMemo(() => {
    const logins = new Set();
    for (const dd of devDays) {
      if (dd.developer) logins.add(dd.developer);
    }
    return Math.max(logins.size, 1);
  }, [devDays]);

  const orgHoursPerDev = activeDevHours / uniqueDevs;
  const orgCompletionsPerDev = totalCompletions / uniqueDevs;
  const currentLeverage = safeDiv(totalCompletions, activeDevHours);

  // Structural factor values
  const avgActiveDevs = mean(days.map(d => d.active_devs));
  const adoptionPct = safeDiv(avgActiveDevs, totalDevs);
  const overallMergeRate = safeDiv(totalMerged, totalCreated);
  const activeRepos = new Set((prSessions || []).map(pr => pr.repo).filter(Boolean)).size;
  const repoCoverage = totalRepos ? safeDiv(activeRepos, totalRepos) : null;

  const factorMap = { adoption: adoptionPct, merge_rate: overallMergeRate, coverage: repoCoverage };
  const factorLabelMap = { adoption: 'Adoption', merge_rate: 'Merge Rate', coverage: 'Repo Coverage' };
  const factorColorMap = { adoption: '#58a6ff', merge_rate: '#3fb950', coverage: '#bc8cff' };
  const currentLevel = factorMap[structuralFactor] || 0;

  const scaleFactor = currentLevel > 0 ? (1 / currentLevel) : 1;
  const projectedCompletionsPerDev = currentLevel > 0 ? orgCompletionsPerDev * scaleFactor : orgCompletionsPerDev;
  const projectedPRsTotal = currentLevel > 0 ? Math.round(totalCreated * scaleFactor) : totalCreated;
  const projectedHoursPerDev = currentLevel > 0 ? (projectedPRsTotal * avgDevHoursPerPr / uniqueDevs) : orgHoursPerDev;
  const projectedLeverage = safeDiv(projectedCompletionsPerDev, projectedHoursPerDev);

  const devStats = useMemo(() => {
    if (!selectedUser) return null;
    const devRecords = devDays.filter(u => u.developer === selectedUser);
    const activeDays = devRecords.filter(u => (u.total_agent_requests || 0) > 0).length;
    const devPrsCreated = devRecords.reduce((s, dd) => s + (dd.agent_prs_created || 0), 0);
    const devHourProxy = devPrsCreated * avgDevHoursPerPr;
    const devCompletions = devRecords.reduce((s, dd) => s + (dd.agent_prs_merged || 0), 0);
    const devLeverage = safeDiv(devCompletions, devHourProxy);
    return { activeDays, devHourProxy, devCompletions, devLeverage };
  }, [selectedUser, devDays, avgDevHoursPerPr]);

  const xMax = Math.max(orgHoursPerDev, projectedHoursPerDev, (devStats?.devHourProxy || 0) * 1.2) * 1.15;
  const yMax = Math.max(orgCompletionsPerDev, projectedCompletionsPerDev, (devStats?.devCompletions || 0) * 1.2) * 1.3;

  const diagRectSeries = [];

  if (currentLevel > 0 && currentLevel < 1) {
    diagRectSeries.push({
      type: 'polygon', name: `Projected (${factorLabelMap[structuralFactor]} → 100%)`,
      data: [[0, 0], [projectedHoursPerDev, 0], [projectedHoursPerDev, projectedCompletionsPerDev], [0, projectedCompletionsPerDev]],
      color: `rgba(${factorColorMap[structuralFactor] === '#58a6ff' ? '88,166,255' : factorColorMap[structuralFactor] === '#3fb950' ? '63,185,80' : '188,140,255'},0.08)`,
      lineWidth: 1, lineColor: factorColorMap[structuralFactor] || '#bc8cff', dashStyle: 'ShortDash',
      enableMouseTracking: true,
      tooltip: { headerFormat: '', pointFormat: `<b>Projected (${factorLabelMap[structuralFactor]} → 100%)</b><br/>Hours/Dev: ${fmtDec(projectedHoursPerDev, 1)}<br/>Completions/Dev: ${fmtDec(projectedCompletionsPerDev, 1)}<br/>Leverage: ${fmtDec(projectedLeverage, 3)}<br/>${fmtDec(scaleFactor, 1)}× current volume` },
    });
  }

  diagRectSeries.push({
    type: 'polygon', name: 'Org Existing',
    data: [[0, 0], [orgHoursPerDev, 0], [orgHoursPerDev, orgCompletionsPerDev], [0, orgCompletionsPerDev]],
    color: 'rgba(88,166,255,0.12)', lineWidth: 2, lineColor: '#58a6ff',
    enableMouseTracking: true,
    tooltip: { headerFormat: '', pointFormat: `<b>Existing (per dev)</b><br/>Hours/Dev: ${fmtDec(orgHoursPerDev, 1)}<br/>Completions/Dev: ${fmtDec(orgCompletionsPerDev, 1)}<br/>Leverage: ${fmtDec(currentLeverage, 3)}<br/>${uniqueDevs} developers` },
  });

  diagRectSeries.push({
    type: 'scatter', name: 'Counterfactual (without AI)',
    data: [{ x: 0, y: 0 }],
    color: '#f85149',
    marker: { radius: 6, symbol: 'circle', lineWidth: 2, lineColor: '#f85149', fillColor: 'rgba(248,81,73,0.5)' },
    tooltip: { headerFormat: '', pointFormat: '<b>Without agent: 0 completions, 0 dev-hours</b>' },
  });

  const slopeEndX = Math.max(orgHoursPerDev, projectedHoursPerDev);
  const slopeEndY = Math.max(orgCompletionsPerDev, projectedCompletionsPerDev);
  diagRectSeries.push({
    type: 'line', name: `Leverage = ${fmtDec(currentLeverage, 3)}`,
    data: [[0, 0], [slopeEndX, slopeEndY]],
    color: '#3fb950', dashStyle: 'Dash', lineWidth: 2,
    marker: { enabled: false }, enableMouseTracking: false,
  });

  // Developer scatter point
  if (devStats && devStats.devHourProxy > 0) {
    diagRectSeries.push({
      type: 'scatter', name: `${selectedUser}`,
      data: [{ x: devStats.devHourProxy, y: devStats.devCompletions,
        custom: { leverage: devStats.devLeverage, activeDays: devStats.activeDays } }],
      color: '#d29922',
      marker: { radius: 10, symbol: 'diamond', lineWidth: 2, lineColor: '#d29922', fillColor: 'rgba(210,153,34,0.7)' },
      tooltip: { headerFormat: '', pointFormat:
        `<b>${selectedUser}</b><br/>Hours: ${fmtDec(devStats.devHourProxy, 1)}<br/>Completions: ${devStats.devCompletions}<br/>Leverage: ${fmtDec(devStats.devLeverage, 3)}<br/>Active Days: ${devStats.activeDays}` },
    });
    if (devStats.devCompletions > 0) {
      const devSlope = devStats.devCompletions / devStats.devHourProxy;
      const extendX = Math.min(devStats.devHourProxy * 1.3, xMax);
      diagRectSeries.push({
        type: 'line', name: `Dev Leverage = ${fmtDec(devStats.devLeverage, 3)}`,
        data: [[0, 0], [extendX, devSlope * extendX]],
        color: '#d29922', dashStyle: 'ShortDot', lineWidth: 1,
        marker: { enabled: false }, enableMouseTracking: false,
      });
    }
  }

  const diagRectOpts = {
    chart: { type: 'scatter', height: 420 },
    title: { text: 'Diagnostic Leverage Rectangle' },
    subtitle: { text: selectedUser ? `Per-developer view · Org vs ${selectedUser}` : 'Per-developer view · Select a developer to overlay their position' },
    xAxis: { title: { text: 'Hours / Dev', style: { fontSize: '13px', fontWeight: '600' } }, min: 0, max: xMax, gridLineWidth: 1, labels: { formatter: function() { return fmtCompact(this.value); } } },
    yAxis: { title: { text: 'Completions / Dev', style: { fontSize: '13px', fontWeight: '600' } }, min: 0, max: yMax, labels: { formatter: function() { return fmtCompact(this.value); } } },
    tooltip: { useHTML: true, headerFormat: '' },
    legend: { enabled: true, align: 'center', verticalAlign: 'bottom' },
    plotOptions: { series: { animation: { duration: 600 }, states: { inactive: { opacity: 0.6 } } } },
    series: diagRectSeries,
  };

  return (
    <div className="insights-section">
      <h2 className="f2 color-fg-accent">Leverage Insights</h2>
      <p className="f6 color-fg-muted mb-3">Daily trends + developer overlay. (Trends are signals; estimates are aggregate.)</p>

      <DevSearch devDays={devDays} selectedUser={selectedUser} onSelect={onSelectUser} />

      <label className="d-flex flex-items-center mb-3" style={{ gap: '6px', cursor: 'pointer' }}>
        <input type="checkbox" checked={smoothing} onChange={e => setSmoothing(e.target.checked)} />
        <span className="f6 color-fg-muted">7-day rolling average</span>
      </label>

      <div className="Box p-3 mb-4">
        <div className="d-flex flex-items-center flex-justify-between mb-2">
          <div className="f5 text-bold color-fg-default" style={{ fontStyle: 'italic' }}>
            More completions at minimal dev time → higher leverage
          </div>
          <div className="d-flex flex-items-center" style={{ gap: '8px' }}>
            {(() => {
              const mDef = ESTIMATION_METHODS.find(m => m.key === selectedEstimate) || ESTIMATION_METHODS[0];
              return <span className="Label d-flex flex-items-center" style={{ color: '#58a6ff', borderColor: '#58a6ff', gap: '4px', fontSize: '12px', padding: '4px 10px' }}>
                Estimate: {mDef.label} ({fmtCompact(activeDevHours / uniqueDevs)} hrs/dev)
              </span>;
            })()}
            {currentLevel > 0 && currentLevel < 1 &&
              <span className="Label d-flex flex-items-center" style={{ color: factorColorMap[structuralFactor] || '#bc8cff', borderColor: factorColorMap[structuralFactor] || '#bc8cff', gap: '4px', fontSize: '12px', padding: '4px 10px' }}>
                Projection: {factorLabelMap[structuralFactor]} ({fmtPct(currentLevel)}) → 100% ({fmtDec(scaleFactor, 1)}×)
              </span>
            }
          </div>
        </div>
        <Chart options={diagRectOpts} />
      </div>

      <h3 className="f5 color-fg-default mb-2">Activity Signals <span className="f6 color-fg-muted">(per active dev)</span></h3>
      <div className="trend-grid mb-4">
        <div className="Box p-3">
          <TrendChart title="Agent Requests / Dev" days={days} orgKey="requests_per_dev"
            userDayMap={userDayMap} selectedUser={selectedUser} smoothing={smoothing} color="#58a6ff" yLabel="Count" />
        </div>
        <div className="Box p-3">
          <TrendChart title="Sessions / Dev" days={days} orgKey="sessions_per_dev"
            userDayMap={userDayMap} selectedUser={selectedUser} smoothing={smoothing} color="#3fb950" yLabel="Count" />
        </div>
        <div className="Box p-3">
          <TrendChart title="PRs Created / Dev" days={days} orgKey="prs_created_per_dev"
            userDayMap={userDayMap} selectedUser={selectedUser} smoothing={smoothing} color="#d29922" yLabel="Count" />
        </div>
        <div className="Box p-3">
          <TrendChart title="Agent LoC Added / Dev (÷100)" days={days} orgKey="loc_added_per_dev"
            userDayMap={userDayMap} selectedUser={selectedUser} smoothing={smoothing} color="#bc8cff" yLabel="LoC/100" />
        </div>
      </div>

      <h3 className="f5 color-fg-default mb-2">Structural Factors <span className="f6 color-fg-muted">(%)</span></h3>
      <div className="trend-grid mb-4">
        <div className="Box p-3">
          <TrendChart title="Adoption %" days={adoptionDays} orgKey="adoption_pct"
            userDayMap={userStructuralMap} selectedUser={selectedUser} smoothing={smoothing}
            color="#58a6ff" yLabel="%" isPercent />
        </div>
        <div className="Box p-3">
          <TrendChart title="Merge Rate %" days={days} orgKey="merge_rate"
            userDayMap={userMergeRateMap} selectedUser={selectedUser} smoothing={smoothing}
            color="#3fb950" yLabel="%" isPercent />
        </div>
      </div>

      <h3 className="f5 color-fg-default mb-2">Quality / Turbulence Signals</h3>
      <div className="trend-grid mb-4">
        <div className="Box p-3">
          <TrendChart title="Median Duration to Merge (minutes)" days={days} orgKey="median_merge_minutes"
            userDayMap={userDayMap} selectedUser={selectedUser} smoothing={smoothing}
            color="#79c0ff" yLabel="Minutes" />
        </div>
        <div className="Box p-3">
          <TrendChart title="Changes Requested / Dev" days={changesRequestedDays} orgKey="changes_requested_per_dev"
            userDayMap={userChangesReqMap} selectedUser={selectedUser} smoothing={smoothing}
            color="#f85149" yLabel="Count" />
        </div>
      </div>

      <h3 className="f5 color-fg-default mb-2">Completions</h3>
      <div className="trend-grid mb-3">
        <div className="Box p-3">
          <CompletionsTrendChart title="Valid Completions (Merged Agent PRs)" days={days}
            dataMap={mergedByDay} selectedUser={selectedUser} userDataMap={selectedUser ? userMergedByDay : null}
            smoothing={smoothing} color="#58a6ff" yLabel="PRs" />
        </div>
        <div className="Box p-3">
          <CompletionsTrendChart title="Failed Completions (Closed w/o Merge)" days={days}
            dataMap={incompletionsByDay} selectedUser={selectedUser} userDataMap={selectedUser ? userIncompletionsByDay : null}
            smoothing={smoothing} color="#f85149" yLabel="PRs" chartType="column" />
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   CONFIDENCE SECTION
   ═══════════════════════════════════════════════════════ */
function ConfidenceSection({ days, config, method, onMethodChange }) {
  const n = days.length;
  const methodDef = ESTIMATION_METHODS.find(m => m.key === method) || ESTIMATION_METHODS[0];

  const methodComparison = ESTIMATION_METHODS.map(m => {
    const field = 'est_' + m.key + '_hrs_per_dev_day';
    const vals = days.map(d => d[field]).filter(v => v != null);
    const avg = vals.length ? vals.reduce((a,b) => a+b, 0) / vals.length : null;
    const totalField = 'est_' + m.key + '_hrs_day';
    const totalHrs = days.reduce((s, d) => s + (d[totalField] || 0), 0);
    return { ...m, avgPerDevDay: avg, totalHrs, isSelected: m.key === method };
  });

  return (
    <div className="section-row">
      <SectionHeader title="Confidence" desc="How the estimate is made and what it assumes." />
      <div className="d-flex flex-wrap" style={{ gap: '16px' }}>

        <div className="Box p-3" style={{ flex: '1 1 380px' }}>
          <h4 className="f5 mb-2">Estimation Method</h4>

          <div className="d-flex flex-items-center mb-2" style={{ gap: '8px' }}>
            <span className="Label Label--accent">{methodDef.key}</span>
            <span className="f6 color-fg-muted">{methodDef.descFn(config)}</span>
          </div>
          <p className="f6 color-fg-muted mb-3" style={{ fontFamily: 'monospace', background: 'var(--bgColor-muted)', padding: '8px', borderRadius: '6px' }}>
            {methodDef.formulaFn(config)}
          </p>

          <h5 className="f6 color-fg-muted text-bold mt-3 mb-1">Shared Configuration</h5>
          <table className="width-full f6">
            <tbody>
              <tr><td className="color-fg-muted py-1">Total Developers</td><td className="py-1 text-bold">{config.cfg_total_developers ?? '—'}</td></tr>
              <tr><td className="color-fg-muted py-1">Workdays / Week</td><td className="py-1 text-bold">{config.cfg_workdays_per_week ?? 5}</td></tr>
              <tr><td className="color-fg-muted py-1">Labor Cost / Hour</td><td className="py-1 text-bold">{config.cfg_labor_cost_per_hour != null ? fmtCurrency(config.cfg_labor_cost_per_hour) : '—'}</td></tr>
            </tbody>
          </table>

          <h5 className="f6 color-fg-muted text-bold mt-3 mb-1">Definitions</h5>
          <p className="f6 color-fg-muted"><strong>Duration-Based (Merged):</strong> Multiplies merged PR session hours by a duration factor (default {config.est_duration_factor || 2}×). Only counts sessions that resulted in a merged PR.</p>
          <p className="f6 color-fg-muted"><strong>LoC-Based (Merged):</strong> {config.est_hrs_per_kloc || 2} hours of time saved per 1,000 lines of merged code added by agent PRs.</p>
          <p className="f6 color-fg-muted"><strong>Active Dev:</strong> Developer with agent activity for that day.</p>
        </div>

        <div className="Box p-3" style={{ flex: '1 1 380px' }}>
          <h4 className="f5 mb-2">Method Comparison</h4>
          <table className="width-full f6 mb-3">
            <thead>
              <tr>
                <th className="color-fg-muted py-1 f6" style={{ fontWeight: 500 }}>Method</th>
                <th className="color-fg-muted py-1 f6 text-right" style={{ fontWeight: 500 }}>Avg Hrs/Dev/Day</th>
                <th className="color-fg-muted py-1 f6 text-right" style={{ fontWeight: 500 }}>Total Hrs ({n}d)</th>
              </tr>
            </thead>
            <tbody>
              {methodComparison.map(m => (
                <tr key={m.key} className={m.isSelected ? 'method-row-selected' : ''}>
                  <td className="py-1" style={{ paddingLeft: m.isSelected ? '9px' : '12px' }}>
                    {m.isSelected && <span style={{ color: '#58a6ff', marginRight: '4px' }}>●</span>}
                    {m.label}
                  </td>
                  <td className="py-1 text-right text-bold">{fmtDec(m.avgPerDevDay, 2)}</td>
                  <td className="py-1 text-right">{fmtDec(m.totalHrs, 0)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   CONFIG PANEL
   ═══════════════════════════════════════════════════════ */

function ConfigPanel({ config, onApply, isOpen, onToggle }) {
  const [totalDevs, setTotalDevs] = useState(config.cfg_total_developers ?? 100);
  const [totalRepos, setTotalRepos] = useState(config.cfg_total_repos ?? '');
  const [factor, setFactor] = useState(config.est_duration_factor ?? 2);
  const [hrsPerKloc, setHrsPerKloc] = useState(config.est_hrs_per_kloc ?? 2);
  const [wdays, setWdays] = useState(config.cfg_workdays_per_week ?? 5);
  const [cost, setCost] = useState(config.cfg_labor_cost_per_hour ?? '');

  useEffect(() => {
    setTotalDevs(config.cfg_total_developers ?? 100);
    setTotalRepos(config.cfg_total_repos ?? '');
    setFactor(config.est_duration_factor ?? 2);
    setHrsPerKloc(config.est_hrs_per_kloc ?? 2);
    setWdays(config.cfg_workdays_per_week ?? 5);
    setCost(config.cfg_labor_cost_per_hour ?? '');
  }, [config]);

  const apply = () => {
    onApply({
      cfg_total_developers: parseFloat(totalDevs) || 100,
      cfg_total_repos: parseFloat(totalRepos) || null,
      cfg_workdays_per_week: parseFloat(wdays) || 5,
      cfg_labor_cost_per_hour: parseFloat(cost) || null,
      est_duration_factor: parseFloat(factor) || 2,
      est_hrs_per_kloc: parseFloat(hrsPerKloc) || 2,
    });
  };

  const summary = `${totalDevs} devs · ×${config.est_duration_factor || 2} factor · ${config.est_hrs_per_kloc || 2} hrs/KLoC`
    + (config.cfg_labor_cost_per_hour != null ? ` · $${config.cfg_labor_cost_per_hour}/hr` : '');

  return (
    <div className="Box mt-4" style={{ borderColor: isOpen ? 'var(--borderColor-accent-emphasis)' : undefined }}>
      <div className="Box-header d-flex flex-items-center flex-justify-between" style={{ cursor: 'pointer' }} onClick={onToggle}>
        <div className="d-flex flex-items-center" style={{ gap: '8px' }}>
          <span style={{ transition: 'transform 0.15s', transform: isOpen ? 'rotate(90deg)' : 'rotate(0deg)', display: 'inline-block' }}>▶</span>
          <h4 className="f5 mb-0">Configuration</h4>
          <span className="Label Label--secondary f6">estimation params</span>
        </div>
        <span className="f6 color-fg-muted">{summary}</span>
      </div>

      {isOpen && (
        <div className="Box-body">
          <p className="f6 color-fg-muted mb-3">Edit the estimation parameters below. Changes take effect when you click Apply.</p>

          <h5 className="f6 color-fg-muted text-bold mb-2">Organization</h5>
          <div className="d-flex flex-wrap mb-3" style={{ gap: '12px', alignItems: 'flex-end' }}>
            <div className="form-group mb-0" style={{ flex: '1 1 160px' }}>
              <label className="f6 color-fg-muted">Total Developers</label>
              <input type="number" className="form-control input-sm" step="1" min="1" value={totalDevs} onChange={e => setTotalDevs(e.target.value)} />
            </div>
            <div className="form-group mb-0" style={{ flex: '1 1 160px' }}>
              <label className="f6 color-fg-muted">Total Repos</label>
              <input type="number" className="form-control input-sm" step="1" min="1" value={totalRepos} onChange={e => setTotalRepos(e.target.value)} placeholder="auto" />
            </div>
          </div>

          <h5 className="f6 color-fg-muted text-bold mb-2">Estimation Constants</h5>
          <div className="d-flex flex-wrap mb-3" style={{ gap: '12px', alignItems: 'flex-end' }}>
            <div className="form-group mb-0" style={{ flex: '1 1 200px' }}>
              <label className="f6 color-fg-muted">Duration Multiplier (×)</label>
              <input type="number" className="form-control input-sm" step="0.5" min="0.5" value={factor} onChange={e => setFactor(e.target.value)} />
            </div>
            <div className="form-group mb-0" style={{ flex: '1 1 200px' }}>
              <label className="f6 color-fg-muted">Hrs Saved per 1K LoC Added</label>
              <input type="number" className="form-control input-sm" step="0.5" min="0" value={hrsPerKloc} onChange={e => setHrsPerKloc(e.target.value)} />
            </div>
          </div>

          <h5 className="f6 color-fg-muted text-bold mb-2">Shared</h5>
          <div className="d-flex flex-wrap" style={{ gap: '12px', alignItems: 'flex-end' }}>
            <div className="form-group mb-0" style={{ flex: '1 1 120px' }}>
              <label className="f6 color-fg-muted">Workdays / Week</label>
              <input type="number" className="form-control input-sm" step="1" min="1" max="7" value={wdays} onChange={e => setWdays(e.target.value)} />
            </div>
            <div className="form-group mb-0" style={{ flex: '1 1 140px' }}>
              <label className="f6 color-fg-muted">Labor Cost $/hr</label>
              <input type="number" className="form-control input-sm" step="1" min="0" value={cost} onChange={e => setCost(e.target.value)} placeholder="75" />
            </div>
          </div>
          <div className="d-flex flex-items-center mt-3" style={{ gap: '8px' }}>
            <button className="btn btn-sm btn-primary" onClick={apply}>Apply &amp; Recalculate</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   APP
   ═══════════════════════════════════════════════════════ */
function App() {
  const [artifacts, setArtifacts] = useState(null);
  const [data, setData] = useState(null);
  const [config, setConfig] = useState({ ...DEFAULT_CONFIG });
  const [configOpen, setConfigOpen] = useState(false);
  const [method, setMethod] = useState('duration');
  const [selectedUser, setSelectedUser] = useState(null);
  const [selectedEstimate, setSelectedEstimate] = useState('duration');
  const [structuralFactor, setStructuralFactor] = useState('adoption');
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const recompute = useCallback((baseDays, cfg, m) => {
    return computeDerived(baseDays, cfg, m);
  }, []);

  // Auto-load materialized artifacts on mount
  useEffect(() => {
    fetchArtifacts().then(arts => {
      if (!arts || !arts.efficiency || !arts.efficiency.data || !arts.efficiency.data.length) {
        setError('Materialized artifact not found or empty.');
        setLoading(false);
        return;
      }
      setArtifacts(arts);

      const eff = arts.efficiency;
      const sess = arts.sessions;

      // Ensure merged_session_minutes and merged_loc_added exist on day rows
      let baseDays = eff.data.sort((a, b) => (a.day || '').localeCompare(b.day || ''));
      const needsMergedFields = baseDays.length > 0 &&
        baseDays[0].merged_session_minutes == null &&
        baseDays[0].merged_loc_added == null;

      if (needsMergedFields && sess && sess.data) {
        const mergedByDay = {};
        for (const pr of sess.data) {
          if (!pr.merged) continue;
          const day = pr.day || '';
          if (!day) continue;
          if (!mergedByDay[day]) mergedByDay[day] = { mins: 0, loc: 0 };
          mergedByDay[day].mins += (pr.duration_minutes || 0);
          mergedByDay[day].loc += (pr.additions || 0);
        }
        baseDays = baseDays.map(d => ({
          ...d,
          merged_session_minutes: d.merged_session_minutes ?? (mergedByDay[d.day]?.mins || 0),
          merged_loc_added: d.merged_loc_added ?? (mergedByDay[d.day]?.loc || 0),
        }));
      }

      const devDays = eff._devDays || [];
      const prSessions = sess?.data || [];
      const enriched = computeDerived(baseDays, DEFAULT_CONFIG, 'duration');

      setData({ enterprise: enriched, baseDays, devDays, prSessions });
      setLoading(false);
    }).catch(e => {
      console.error('Artifact load error:', e);
      setError('Failed to load artifact: ' + e.message);
      setLoading(false);
    });
  }, []);

  const handleMethodChange = useCallback((newMethod) => {
    setMethod(newMethod);
    if (data) {
      const enriched = recompute(data.baseDays, config, newMethod);
      setData(prev => ({ ...prev, enterprise: enriched }));
    }
  }, [data, config, recompute]);

  const handleConfigApply = useCallback((newCfg) => {
    setConfig(newCfg);
    if (data) {
      const enriched = recompute(data.baseDays, newCfg, method);
      setData(prev => ({ ...prev, enterprise: enriched }));
    }
  }, [data, method, recompute]);

  return (
    <div className="element-page">
      <div className="mb-4">
        <h1 className="f1">Agentic AI Coding — Element <span className="Label Label--accent ml-2" style={{ verticalAlign: 'middle', fontSize: '0.5em' }}>v2</span></h1>
        <p className="f4 color-fg-muted">Element of Leverage</p>
      </div>

      {loading && (
        <div className="Box p-4 text-center color-fg-muted">
          <p className="f3 mb-2">⏳</p>
          <p className="f5">Loading materialized artifacts…</p>
        </div>
      )}

      {error && (
        <div className="flash flash-warn f5 mb-3">
          ⚠️ {error}
          <p className="f6 mt-2 color-fg-muted">Run the pipeline: <code>./scripts/collect-and-materialize.sh</code></p>
        </div>
      )}

      {data && (
        <>
          <SourceSummary efficiency={artifacts.efficiency} sessions={artifacts.sessions} days={data.enterprise} />

          <div className="definition-row">
            <DefinitionCard icon="🎯" label="Job to Be Done"
              value="Autonomously implement code changes from issue descriptions"
              description="Developers assign issues to Copilot, which creates PRs. Humans review and merge." />
            <DefinitionCard icon="✅" label="What Counts as a Completion"
              value="A Copilot-authored PR that gets merged"
              description="Valid = PR achieved its purpose and was merged by a human reviewer. Failed = PR closed without merge." />
            <DefinitionCard icon="📋" label="Job Class"
              value="Value-creating (delegated)"
              description="The agent creates code autonomously; humans guide via issue descriptions and review feedback." />
          </div>

          <LeverageRectangleSection days={data.enterprise} prSessions={data.prSessions} config={config}
            selectedEstimate={selectedEstimate} onEstimateChange={setSelectedEstimate}
            structuralFactor={structuralFactor} onStructuralFactorChange={setStructuralFactor} />

          <ImpactSection days={data.enterprise} config={config} method={method} onMethodChange={handleMethodChange} devDays={data.devDays} selectedUser={selectedUser} />
          <DriversSection days={data.enterprise} devDays={data.devDays} selectedUser={selectedUser} />

          <LeverageInsightsSection days={data.enterprise} prSessions={data.prSessions} devDays={data.devDays}
            config={config} selectedUser={selectedUser} onSelectUser={setSelectedUser}
            selectedEstimate={selectedEstimate} structuralFactor={structuralFactor} />

          <ConfidenceSection days={data.enterprise} config={config} method={method} onMethodChange={handleMethodChange} />
          <ConfigPanel config={config} onApply={handleConfigApply} isOpen={configOpen} onToggle={() => setConfigOpen(o => !o)} />
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
